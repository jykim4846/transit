<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f2ece1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Transit">
<title>Transit</title>
<link rel="icon" href="data:,">
<link rel="manifest" href="/site.webmanifest">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --bg: #fff8f5;
    --bg-strong: #ffeee7;
    --paper: rgba(255, 255, 255, 0.92);
    --paper-strong: #ffffff;
    --line: rgba(255, 169, 173, 0.18);
    --text: #3a2c2b;
    --text-muted: #8a7674;
    --accent: #79cdb8;
    --accent-strong: #56b39c;
    --accent-soft: rgba(121, 205, 184, 0.18);
    --orange: #ffb479;
    --orange-soft: rgba(255, 180, 121, 0.22);
    --blue: #93bcff;
    --blue-soft: rgba(147, 188, 255, 0.22);
    --danger: #ff8a9a;
    --shadow: 0 22px 50px rgba(255, 169, 173, 0.18);
    --radius-xl: 28px;
    --radius-lg: 20px;
    --radius-md: 14px;
    --mono: "Space Mono", monospace;
    /* 코지팝 파스텔 팔레트 — 더 밝고 비비드 */
    --pastel-pink: #ffe3ec;
    --pastel-pink-strong: #ffc1d4;
    --pastel-sky: #dff0ff;
    --pastel-sky-strong: #b8dcff;
    --pastel-yellow: #fff4c4;
    --pastel-mint: #d5f3e6;
    --pastel-lavender: #ece1ff;
    --cheek-pink: #ffc0cf;
  }

  * {
    box-sizing: border-box;
  }

  html, body {
    margin: 0;
    min-height: 100%;
    background: var(--bg);
    overflow-x: hidden;
  }

  body {
    font-family: "Gowun Dodum", "IBM Plex Sans KR", sans-serif;
    color: var(--text);
    min-height: 100dvh;
    overscroll-behavior-y: none;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    background:
      radial-gradient(circle at top left, rgba(147, 188, 255, 0.18), transparent 30%),
      radial-gradient(circle at top right, rgba(255, 195, 212, 0.22), transparent 28%),
      radial-gradient(circle at bottom right, rgba(213, 243, 230, 0.25), transparent 32%),
      linear-gradient(180deg, #fff8f5 0%, #fffaf6 100%);
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image:
      linear-gradient(rgba(255, 255, 255, 0.15) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255, 255, 255, 0.15) 1px, transparent 1px);
    background-size: 28px 28px;
    mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.25), transparent 80%);
    opacity: 0.25;
  }

  .app-shell {
    width: min(860px, calc(100vw - 28px));
    margin: 0 auto;
    padding: calc(26px + env(safe-area-inset-top, 0px)) 0 calc(48px + env(safe-area-inset-bottom, 0px));
    position: relative;
    z-index: 1;
    overflow-x: clip;
  }

  body.is-standalone .app-shell {
    padding-top: calc(18px + env(safe-area-inset-top, 0px));
  }

  .hero {
    background: linear-gradient(135deg, rgba(255, 250, 242, 0.92), rgba(255, 246, 232, 0.82));
    border: 1px solid rgba(71, 57, 29, 0.08);
    border-radius: 32px;
    padding: 26px 24px 22px;
    box-shadow: var(--shadow);
    backdrop-filter: blur(18px);
  }

  .hero-top {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    align-items: flex-start;
    margin-bottom: 22px;
  }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.7);
    color: var(--text-muted);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .hero h1 {
    margin: 12px 0 10px;
    font-size: clamp(30px, 6vw, 46px);
    line-height: 1.03;
    letter-spacing: -0.04em;
  }

  .hero p {
    margin: 0;
    max-width: 560px;
    color: var(--text-muted);
    line-height: 1.6;
    font-size: 14px;
  }

  .hero-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
  }

  .clock-badge {
    font-family: var(--mono);
    font-size: 13px;
    padding: 12px 14px;
    border-radius: 16px;
    background: rgba(32, 24, 16, 0.05);
    color: var(--accent-strong);
    border: 1px solid rgba(30, 122, 95, 0.12);
    min-width: 104px;
    text-align: center;
  }

  .hero-note {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 10px;
  }

  .hero-note-card {
    background: rgba(255, 255, 255, 0.7);
    border: 1px solid rgba(71, 57, 29, 0.08);
    border-radius: 18px;
    padding: 14px;
  }

  .hero-note-card strong {
    display: block;
    margin-bottom: 6px;
    font-size: 13px;
  }

  .hero-note-card span {
    color: var(--text-muted);
    font-size: 13px;
    line-height: 1.45;
  }

  .section {
    margin-top: 24px;
  }

  .section-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }

  .section-head h2 {
    margin: 0;
    font-size: 18px;
    letter-spacing: -0.03em;
  }

  .section-head span {
    color: var(--text-muted);
    font-size: 13px;
  }

  .route-list {
    display: block;
  }

  @keyframes card-fade-in {
    from {
      opacity: 0;
      transform: translateY(6px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .route-list > .route-card {
    display: none;
  }

  .route-list > .route-card.active {
    display: block;
    animation: card-fade-in 0.24s ease both;
  }

  .route-tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin: 8px 0 12px;
  }

  .route-tabs:empty { display: none; }

  .route-tab {
    flex: 0 0 auto;
    padding: 8px 14px;
    border-radius: 999px;
    background: rgba(255, 252, 247, 0.82);
    border: 1px solid var(--line);
    color: var(--text-muted);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.16s ease, color 0.16s ease, border-color 0.16s ease, transform 0.14s ease;
  }

  .route-tab:hover {
    background: rgba(255, 252, 247, 0.96);
    border-color: rgba(71, 57, 29, 0.22);
    color: var(--text);
    transform: translateY(-1px);
  }

  .route-tab:active {
    transform: translateY(0);
  }

  .route-tab.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
    box-shadow: 0 6px 16px rgba(30, 122, 95, 0.24);
    transform: none;
  }

  .route-card {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow);
    backdrop-filter: blur(14px);
    overflow: hidden;
  }

  .route-card.loading {
    opacity: 0.76;
  }

  .route-card.collapsed .route-main {
    padding-bottom: 22px;
  }

  .route-card.commute-pinned {
    border-color: rgba(59, 130, 246, 0.55);
    box-shadow: 0 8px 24px rgba(59, 130, 246, 0.18), var(--shadow);
  }

  .commute-pin-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 8px;
    margin-left: 6px;
    border-radius: 999px;
    background: rgba(59, 130, 246, 0.12);
    color: #1d4ed8;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: -0.2px;
  }

  .route-main {
    padding: 22px 22px 18px;
  }

  .route-main-top {
    display: flex;
    justify-content: space-between;
    gap: 14px;
    align-items: flex-start;
  }

  .route-names {
    min-width: 0;
  }

  .route-kicker {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 10px;
  }

  .pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
    line-height: 1;
    border: 1px solid transparent;
  }

  .pill.label {
    background: rgba(32, 24, 16, 0.06);
    color: var(--text);
  }

  .pill.priority-fastest,
  .pill.priority-best_eta {
    background: var(--accent-soft);
    color: var(--accent-strong);
    border-color: rgba(30, 122, 95, 0.12);
  }

  .pill.priority-fewest_transfers {
    background: var(--blue-soft);
    color: var(--blue);
    border-color: rgba(28, 91, 183, 0.12);
  }

  .pill.transport {
    background: var(--orange-soft);
    color: var(--orange);
    border-color: rgba(197, 99, 31, 0.12);
  }

  .route-title {
    font-size: clamp(21px, 4vw, 28px);
    line-height: 1.18;
    letter-spacing: -0.04em;
    word-break: keep-all;
  }

  .route-title .arrow {
    color: var(--text-muted);
    margin: 0 8px;
  }

  .route-subtitle {
    margin-top: 10px;
    color: var(--text-muted);
    font-size: 14px;
    line-height: 1.5;
  }

  .route-overview {
    align-items: center;
  }

  .route-overview-copy {
    min-width: 0;
  }

  .route-overview-copy p {
    margin: 6px 0 0;
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.5;
  }

  .route-footer {
    margin-top: 24px;
    padding: 18px;
    border-radius: 18px;
    background: var(--paper);
    border: 1px solid var(--line);
  }

  .route-footer h2 {
    margin: 0;
    font-size: 16px;
    letter-spacing: -0.03em;
  }

  .route-footer h2 span {
    font-size: 13px;
    font-weight: 400;
    color: var(--text-muted);
    margin-left: 8px;
  }

  .route-footer p {
    margin: 6px 0 0;
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.5;
  }

  .route-toolbar {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    justify-content: flex-end;
  }

  .route-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: flex-end;
  }

  button {
    font: inherit;
  }

  .btn {
    border: none;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease, border-color 0.15s ease, opacity 0.15s ease;
  }

  .btn:hover {
    transform: translateY(-1px);
  }

  .btn:active {
    transform: translateY(0) scale(0.98);
    transition-duration: 0.08s;
  }

  .btn:disabled {
    cursor: wait;
    opacity: 0.64;
    transform: none;
  }

  .btn-primary {
    background: var(--accent);
    color: white;
    padding: 14px 18px;
    border-radius: 16px;
    font-weight: 700;
  }

  .btn-secondary,
  .btn-ghost {
    background: rgba(255, 255, 255, 0.75);
    color: var(--text);
    border: 1px solid var(--line);
    padding: 11px 14px;
    border-radius: 14px;
    font-weight: 600;
  }

  .btn-ghost {
    padding: 10px 12px;
    font-size: 13px;
  }

  .btn-danger {
    color: var(--danger);
  }

  .summary-board {
    margin-top: 18px;
    background: var(--paper-strong);
    border: 1px solid rgba(71, 57, 29, 0.08);
    border-radius: 22px;
    padding: 18px;
  }

  .summary-head {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    align-items: flex-start;
  }

  .summary-head strong {
    display: block;
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .summary-line {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
  }

  .score-inline {
    text-align: right;
    flex-shrink: 0;
  }

  .score-inline .label {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .score-inline .value {
    font-family: var(--mono);
    font-size: clamp(22px, 4vw, 30px);
    font-weight: 700;
    line-height: 1.1;
  }

  .summary-line .transit-label {
    font-size: clamp(28px, 6vw, 38px);
    font-weight: 700;
    line-height: 1.1;
    letter-spacing: -0.02em;
  }

  .summary-line .transit-label.bus {
    color: var(--blue);
  }

  .summary-line .transit-label.subway {
    color: var(--accent);
  }

  .summary-stop-flow {
    margin-top: 8px;
    font-size: 14px;
    color: var(--text);
    line-height: 1.5;
    padding: 8px 12px;
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.72);
    border: 1px solid rgba(71, 57, 29, 0.08);
  }

  .summary-stop-flow .flow-arrow {
    color: var(--text-muted);
    margin: 0 2px;
  }

  .summary-note {
    margin-top: 10px;
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.5;
  }

  .summary-subline {
    margin-top: 10px;
    padding: 10px 12px;
    border-radius: 14px;
    background: rgba(255, 255, 255, 0.72);
    border: 1px solid rgba(71, 57, 29, 0.08);
    font-size: 13px;
    color: var(--text);
    line-height: 1.45;
  }

  .summary-subline strong {
    color: var(--text-muted);
    margin-right: 6px;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .score-badge {
    min-width: 120px;
    padding: 10px 12px;
    border-radius: 16px;
    background: rgba(32, 24, 16, 0.05);
    text-align: right;
  }

  .score-badge .label {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .score-badge .value {
    display: block;
    margin-top: 6px;
    font-family: var(--mono);
    font-size: 24px;
    font-weight: 700;
  }

  .metric-grid {
    display: flex;
    margin-top: 16px;
    border-radius: 14px;
    background: rgba(255, 255, 255, 0.72);
    border: 1px solid rgba(71, 57, 29, 0.08);
    overflow: hidden;
  }

  .metric {
    flex: 1;
    padding: 10px 0;
    text-align: center;
    min-width: 0;
  }

  .metric + .metric {
    border-left: 1px solid rgba(71, 57, 29, 0.08);
  }

  .metric .label {
    display: block;
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    padding: 0 6px;
  }

  .metric .value {
    display: block;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.03em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    padding: 0 6px;
  }

  .metric-inline {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 10px;
    padding: 6px 12px;
    border-radius: 10px;
    background: rgba(255, 255, 255, 0.5);
    font-size: 13px;
    color: var(--text-muted);
  }

  .metric-inline .stamp {
    font-family: var(--mono);
    font-size: 11px;
    flex-shrink: 0;
    margin-left: 12px;
  }

  .boarding-card { margin-top: 12px; padding: 12px; border-radius: 12px; background: rgba(30,122,95,.08); border:1px solid rgba(30,122,95,.2);}
  .boarding-title { font-size:12px; color:var(--text-muted); font-weight:600; }
  .boarding-main { margin-top:4px; font-weight:700; font-size:14px; }
  .boarding-pill { display:inline-block; margin-top:8px; padding:4px 10px; border-radius:999px; background:rgba(197,99,31,.14); color:var(--orange); font-weight:700; font-size:12px;}
  .compact-details { margin-top: 12px; }
  .compact-details summary { cursor:pointer; font-size:13px; font-weight:600; color:var(--blue);}
  .compact-details .segment-list { margin-top:8px; }

  .arrival-headline {
    margin-top: 12px;
    padding: 14px 16px;
    border-radius: 16px;
    background: linear-gradient(135deg, rgba(30, 122, 95, 0.12), rgba(28, 91, 183, 0.10));
    border: 1px solid rgba(30, 122, 95, 0.18);
  }

  .arrival-headline .row-main {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }

  .arrival-headline .depart {
    font-family: var(--mono);
    font-size: 14px;
    color: var(--text-muted);
    letter-spacing: 0.02em;
  }

  .arrival-headline .arrow {
    flex: 1;
    position: relative;
    min-width: 40px;
    height: 2px;
    margin: 0 10px;
    background: linear-gradient(90deg, rgba(30, 122, 95, 0.35), rgba(28, 91, 183, 0.45));
    border-radius: 1px;
    align-self: center;
  }

  .arrival-headline .arrow::after {
    content: "";
    position: absolute;
    right: -2px;
    top: -3px;
    width: 0;
    height: 0;
    border-top: 4px solid transparent;
    border-bottom: 4px solid transparent;
    border-left: 6px solid rgba(28, 91, 183, 0.55);
  }

  .arrival-headline .arrive {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 700;
    color: var(--text-strong, #1f2937);
    letter-spacing: 0.01em;
  }

  .arrival-headline .row-sub {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-top: 8px;
    font-size: 12px;
    color: var(--text-muted);
  }

  .arrival-headline .countdown {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-muted);
  }

  .arrival-headline .countdown.urgent {
    color: var(--orange);
    font-weight: 600;
  }

  .arrival-headline .countdown.missed {
    color: #9b1c1c;
    font-weight: 600;
  }

  .arrival-headline.promoted {
    background: linear-gradient(135deg, rgba(197, 99, 31, 0.14), rgba(28, 91, 183, 0.10));
    border-color: rgba(197, 99, 31, 0.35);
  }

  .arrival-headline .promoted-tag {
    display: none;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--orange);
    padding: 2px 8px;
    border-radius: 999px;
    background: rgba(197, 99, 31, 0.14);
    margin-right: 8px;
  }

  .arrival-headline.promoted .promoted-tag {
    display: inline-block;
  }

  .alt-row.fallback.consumed {
    display: none;
  }

  .alt-row {
    grid-template-columns: auto 1fr auto auto;
    grid-template-rows: auto auto;
  }

  .alt-row > .alt-line {
    grid-column: 1 / -1;
    grid-row: 2;
    margin-top: 10px;
  }

  .journey-line {
    position: relative;
    display: flex;
    width: 100%;
    height: 18px;
    border-radius: 999px;
    overflow: hidden;
    background: rgba(71, 57, 29, 0.06);
  }

  .journey-line .seg {
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 600;
    color: rgba(255, 255, 255, 0.95);
    min-width: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: clip;
  }

  .journey-line .seg.wait {
    background: repeating-linear-gradient(
      45deg,
      rgba(71, 57, 29, 0.10),
      rgba(71, 57, 29, 0.10) 4px,
      rgba(71, 57, 29, 0.22) 4px,
      rgba(71, 57, 29, 0.22) 8px
    );
    color: rgba(55, 55, 55, 0.88);
    font-weight: 600;
  }

  .journey-line .seg.walk {
    background: rgba(120, 120, 120, 0.5);
    color: rgba(55, 55, 55, 0.9);
  }

  .journey-line .seg.bus {
    background: linear-gradient(90deg, rgba(197, 99, 31, 0.9), rgba(197, 99, 31, 0.75));
  }

  .journey-line .seg.subway {
    background: linear-gradient(90deg, rgba(28, 91, 183, 0.9), rgba(28, 91, 183, 0.75));
  }

  .journey-line .seg:not(:last-child) {
    border-right: 1px solid rgba(255, 255, 255, 0.6);
  }

  .journey-line-caption {

    box-shadow: 0 26px 70px rgba(68, 51, 30, 0.14);

    content: "";
    position: absolute;
    border-radius: 999px;
    pointer-events: none;
  }

  .fast-phone::before {
    width: 210px;
    height: 210px;
    right: -76px;
    top: -56px;
    background: rgba(30, 122, 95, 0.09);
    animation: ambient-drift-a 10s ease-in-out infinite;
  }

  .fast-phone::after {
    width: 180px;
    height: 180px;

    background: rgba(28, 91, 183, 0.07);
    animation: ambient-drift-b 12s ease-in-out infinite;

    50% { transform: translate3d(-10px, 12px, 0) scale(1.04); }
  }

  @keyframes ambient-drift-b {
    0%, 100% { transform: translate3d(0, 0, 0) scale(1); }

    background:

      radial-gradient(ellipse 4px 5px at 16px 17px, #1d3a6b 0%, #1d3a6b 60%, transparent 70%),
      /* 눈 오른쪽 */

      /* 눈 하이라이트 왼쪽 */
      radial-gradient(circle at 18px 14px, rgba(255,255,255,0.9) 0 1.2px, transparent 2px),
      /* 눈 하이라이트 오른쪽 */

    background: var(--accent);
    box-shadow: 0 0 0 3px rgba(30, 122, 95, 0.14);
  }

  .fast-flow-timeline {
    position: relative;
    margin-top: 14px;
    border: 1px solid var(--line);
    border-radius: 20px;
    background: rgba(255, 252, 247, 0.82);
    padding: 14px 10px 6px;
  }

  .fast-flow-timeline::before {
    content: "";
    position: absolute;
    left: 0;
    right: 0;
    top: 36px;
    height: 5px;
    border-radius: 999px;
    background: var(--bg-strong);
  }

  .fast-flow-nodes {
    position: relative;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    width: 100%;
    min-height: 80px;
  }

  .fast-flow-node {
    display: flex;
    flex: 1;
    min-width: 0;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }

  .fast-flow-dot {
    position: relative;
    z-index: 2;
    width: 18px;
    height: 18px;
    border: 3px solid var(--paper-strong);
    border-radius: 999px;
    box-shadow: 0 2px 6px rgba(68, 51, 30, 0.14);
  }

  /* walk = 중립 회갈색 */
  .fast-flow-dot.walk { background: rgba(71, 57, 29, 0.28); }
  /* bus = blue (탑승 개념) */
  .fast-flow-dot.bus { background: var(--blue); }
  /* wait = orange (주의/대기) */
  .fast-flow-dot.wait { background: var(--orange); }
  /* subway = accent green */
  .fast-flow-dot.subway { background: var(--accent); }

  .fast-flow-label {
    max-width: 72px;
    margin-top: 9px;
    border-radius: 999px;
    background: var(--bg-strong);
    color: var(--text);
    padding: 4px 8px;
    font-size: 10px;
    font-weight: 600;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    letter-spacing: -0.01em;
  }

  .fast-flow-minutes {
    margin-top: 4px;
    color: var(--text-muted);
    font-size: 10px;
    font-weight: 500;
  }

  .fast-flow-mini-track {
    position: relative;
    height: 18px;
    margin-top: 10px;
    overflow: hidden;
    border-radius: 999px;
    background: var(--bg-strong);
  }

  .fast-flow-mini-track::before {
    content: "";
    position: absolute;
    inset: 0;
    opacity: 0.46;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.96), transparent);
    background-size: 160px 100%;
    animation: fast-shimmer 2.6s linear infinite;
    z-index: 2;
  }

  @keyframes fast-shimmer {
    from { transform: translateX(-55%); }
    to { transform: translateX(115%); }
  }

  .fast-flow-inner {
    position: relative;
    display: flex;
    width: 100%;
    height: 100%;
  }

  .fast-flow-seg {
    display: flex;
    justify-content: center;
    align-items: center;
    min-width: 0;
    color: rgba(255, 255, 255, 0.92);
    font-size: 9px;
    font-weight: 900;
    white-space: nowrap;
    overflow: hidden;
  }

  .fast-flow-seg.walk { background: rgba(71, 57, 29, 0.22); color: var(--text-muted); }
  .fast-flow-seg.bus { background: var(--blue); }
  .fast-flow-seg.wait { background: var(--orange); color: #fff; }
  .fast-flow-seg.subway { background: var(--accent); }

  .fast-flow-vehicle,
  .fast-flow-glow {
    position: absolute;
    pointer-events: none;
  }

  .fast-flow-vehicle {
    z-index: 4;
    left: 8%;
    top: 6px;
    width: 34px;
    height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 4px solid #fff;
    border-radius: 999px;
    background: #3b82f6;
    box-shadow: 0 10px 24px rgba(37, 99, 235, 0.36);
    color: #fff;
    font-size: 10px;
    font-weight: 900;
    letter-spacing: 0;
    animation: fast-vehicle-sweep 6.5s ease-in-out infinite;
  }

  .fast-flow-glow {
    z-index: 3;
    left: 5%;
    top: -6px;
    width: 52px;
    height: 52px;
    border-radius: 999px;
    background: rgba(147, 197, 253, 0.24);
    filter: blur(14px);
    animation: fast-glow-sweep 6.5s ease-in-out infinite;
  }

  @keyframes fast-vehicle-sweep {
    0%, 100% { left: 6%; }
    50% { left: 78%; }
  }

  @keyframes fast-glow-sweep {
    0%, 100% { left: 2%; }
    50% { left: 74%; }
  }

  .fast-flow-status {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-top: 10px;
    border-radius: 16px;
    background: rgba(255, 252, 247, 0.82);
    border: 1px solid var(--line);
    padding: 11px 13px;
  }

  .fast-flow-status .label {
    color: var(--text-muted);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .fast-flow-status strong {
    display: block;
    margin-top: 3px;
    color: var(--text);
    font-size: 13px;
    line-height: 1.25;
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  .fast-flow-eta {
    flex-shrink: 0;
    border-radius: 999px;
    background: var(--blue-soft);
    color: var(--blue);
    border: 1px solid rgba(28, 91, 183, 0.12);
    padding: 7px 10px;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
  }

  .fast-flow.compact {
    margin-top: 12px;
    padding: 0;
    border: 0;
    background: transparent;
    backdrop-filter: none;
  }

  .fast-flow.compact .fast-flow-head,
  .fast-flow.compact .live-map,
  .fast-flow.compact .fast-flow-timeline,
  .fast-flow.compact .fast-flow-status {
    display: none;
  }

  .fast-flow.compact .fast-flow-mini-track {
    height: 20px;
  }

  .fast-flow.compact .fast-flow-vehicle,
  .fast-flow.compact .fast-flow-glow {
    display: none;
  }

  .fast-note {
    display: flex;
    align-items: center;
    gap: 7px;
    margin-top: 11px;
    color: var(--text-muted);
    font-size: 12px;
    line-height: 1.4;
    font-weight: 500;
  }

  .fast-candidates {
    display: grid;
    gap: 8px;
    margin-top: 10px;
  }

  .fast-candidates:empty { display: none; }

  .fast-candidate {
    width: 100%;
    text-align: left;
    border: 1px solid var(--line);
    border-radius: 24px;
    background: var(--paper);
    padding: 14px;
    box-shadow: 0 8px 20px rgba(68, 51, 30, 0.07);
    backdrop-filter: blur(14px);
    cursor: pointer;
    transition: transform 0.16s ease, box-shadow 0.16s ease, border-color 0.16s ease, background 0.16s ease;
  }

  .fast-candidate.recommended {
    border-color: rgba(30, 122, 95, 0.30);
    box-shadow: 0 12px 32px rgba(30, 122, 95, 0.12);
  }

  .fast-candidate:hover {
    transform: translateY(-1px);
    border-color: rgba(71, 57, 29, 0.22);
    box-shadow: 0 12px 28px rgba(68, 51, 30, 0.12);
  }

  .fast-candidate:active {
    transform: translateY(0);
    box-shadow: 0 4px 12px rgba(68, 51, 30, 0.08);
  }

  /* active = 선택됨 = accent green (not blue — blue is for bus/boarding) */
  .fast-candidate.active {
    border-color: var(--accent);
    background: linear-gradient(180deg, rgba(30, 122, 95, 0.07), rgba(255, 252, 247, 0.95));
    box-shadow: 0 14px 36px rgba(30, 122, 95, 0.16);
    transform: translateY(-1px);
  }

  .fast-candidate:not(.active):not(.recommended) {
    opacity: 0.88;
  }

  .fast-candidate:not(.active):not(.recommended):hover {
    opacity: 1;
  }

  .boarding-panel {
    margin-top: 12px;
    padding: 12px 14px;
    border-radius: var(--radius-md);
    background: var(--pastel-sky);
    border: 1px solid var(--blue-soft);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .boarding-panel.boarded {
    background: linear-gradient(135deg, #ffd6a0 0%, #ffb4c9 50%, #cfb2ff 100%);
    border: 2px solid var(--accent-strong);
    box-shadow: 0 14px 34px rgba(255, 138, 166, 0.32), 0 0 0 4px rgba(255, 192, 207, 0.45);
    animation: cute-breathe 1.8s ease-in-out infinite;
    padding: 14px 16px;
  }

  .boarding-panel.boarded::before {
    content: "";
    position: absolute;
    inset: -6px;
    border-radius: calc(var(--radius-md) + 6px);
    background: radial-gradient(circle, rgba(255, 195, 212, 0.3), transparent 70%);
    pointer-events: none;
    z-index: -1;
  }

  .boarding-panel.boarded { position: relative; z-index: 1; }

  .boarding-panel-mascot {
    flex-shrink: 0;
    width: 52px;
    height: 48px;
    position: relative;
  }

  .boarding-panel-mascot svg {
    overflow: visible;
  }

  .boarding-panel-mascot .bm-body {
    transform-origin: 26px 36px;
    animation: bus-hop 0.9s cubic-bezier(0.45, 0, 0.55, 1) infinite, bus-wobble 1.8s ease-in-out infinite;
  }

  .boarding-panel-mascot .bm-shadow {
    transform-origin: 26px 42px;
    animation: shadow-pulse 0.9s cubic-bezier(0.45, 0, 0.55, 1) infinite;
  }

  .boarding-panel-mascot .bm-wheels {
    animation: bus-hop 0.9s cubic-bezier(0.45, 0, 0.55, 1) infinite;
  }

  .boarding-panel-mascot .bm-arm {
    transform-origin: 19px 19px;
    animation: passenger-wave 0.6s ease-in-out infinite alternate;
  }

  .boarding-panel-mascot .bm-sparkles text {
    animation: sparkle-twinkle 1.4s ease-in-out infinite;
  }

  .boarding-panel-mascot .bm-sparkles text:nth-child(2) {
    animation-delay: 0.5s;
  }

  .boarding-panel-mascot .bm-sparkles text:nth-child(3) {
    animation-delay: 0.9s;
  }

  @keyframes bus-hop {
    0%, 100% { transform: translateY(0); }
    40% { transform: translateY(-5px); }
    55% { transform: translateY(-5px); }
  }

  @keyframes bus-wobble {
    0%, 100% { transform: rotate(-3deg); }
    50% { transform: rotate(3deg); }
  }

  @keyframes shadow-pulse {
    0%, 100% { transform: scaleX(1); opacity: 0.55; }
    40%, 55% { transform: scaleX(0.7); opacity: 0.3; }
  }

  @keyframes passenger-wave {
    0% { transform: rotate(-20deg); }
    100% { transform: rotate(15deg); }
  }

  @keyframes sparkle-twinkle {
    0%, 100% { opacity: 0; transform: scale(0.6) rotate(0deg); }
    50% { opacity: 1; transform: scale(1.2) rotate(30deg); }
  }

  .boarding-panel.boarded strong {
    font-size: 16px;
    color: var(--text);
    font-weight: 800;
  }

  .boarding-panel.boarded .boarding-panel-tag {
    color: var(--accent-strong);
    font-size: 11px;
    font-weight: 900;
  }

  .boarding-panel-btn.end {
    background: var(--accent-strong);
    color: #fff;
    border-color: var(--accent-strong);
    box-shadow: 0 6px 14px rgba(86, 179, 156, 0.32);
  }

  .boarding-panel-info {
    display: grid;
    gap: 3px;
    min-width: 0;
  }

  .boarding-panel-tag {
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .bus-availability-badge {
    display: inline-block;
    margin-left: 6px;
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.2px;
    vertical-align: middle;
    line-height: 1.4;
  }
  .bus-availability-badge.catchable {
    background: rgba(30, 122, 95, 0.16);
    color: var(--accent-strong, #1e7a5f);
  }
  .bus-availability-badge.uncatchable {
    background: rgba(197, 99, 31, 0.18);
    color: var(--orange, #c5631f);
  }
  .boarding-panel span.bus-availability-badge {
    font-size: 11px;
    color: inherit;
  }

  .boarding-panel strong {
    font-size: 14px;
    color: var(--text);
    line-height: 1.3;
  }

  .boarding-panel span:not(.boarding-panel-tag) {
    font-size: 12px;
    color: var(--text-muted);
  }

  .boarding-panel .boarding-panel-meta {
    color: var(--text-soft);
    font-size: 11px;
    font-weight: 700;
  }

  .boarding-panel-btn {
    flex-shrink: 0;
    padding: 9px 14px;
    border-radius: 999px;
    border: 1px solid var(--accent);
    background: #fff;
    color: var(--accent-strong);
    font-weight: 800;
    font-size: 12px;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }

  .boarding-panel-btn:hover { transform: translateY(-1px); }
  .boarding-panel-btn:active { transform: scale(0.96); }

  .boarding-panel-btn.primary {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 6px 14px rgba(121, 205, 184, 0.28);
  }

  .kakao-bus-overlay.boarded {
    width: 70px;
    height: 50px;
    border-radius: 22px 22px 16px 16px;
    border-color: #fff8e7;
    background:
      radial-gradient(circle at 18px 32px, #fff 0 4px, transparent 5px),

      radial-gradient(circle at 16px 24px, rgba(255, 138, 166, 0.95) 0 3.2px, transparent 4px),
      radial-gradient(circle at 54px 24px, rgba(255, 138, 166, 0.95) 0 3.2px, transparent 4px),
      linear-gradient(160deg, #ffb479 0%, #ff8aa6 55%, #cfb2ff 100%);
    box-shadow:
      0 0 0 6px rgba(255, 195, 212, 0.55),
      0 0 0 14px rgba(207, 178, 255, 0.32),
      0 18px 32px rgba(255, 138, 166, 0.5);
    transform-origin: center 88%;
    animation: bus-hop 0.9s cubic-bezier(0.45, 0, 0.55, 1) infinite, bus-wobble 1.8s ease-in-out infinite;
  }

  .kakao-bus-overlay.boarded::before {
    left: 12px;
    right: 12px;
    background:
      linear-gradient(90deg, rgba(255, 255, 255, 0.95) 0 42%, rgba(255, 248, 231, 0.3) 42% 58%, rgba(255, 255, 255, 0.95) 58% 100%);
  }

  .kakao-bus-overlay.boarded::after {
    left: 12px;
    right: 12px;
    bottom: -7px;
    background:
      radial-gradient(circle at 15% 50%, #3a2c2b 0 4.5px, transparent 5.5px),
      radial-gradient(circle at 85% 50%, #3a2c2b 0 4.5px, transparent 5.5px);
  }

  .kakao-bus-label.boarded {
    background: linear-gradient(135deg, #ff8aa6, #ffb479);
    color: #fff;
    padding: 6px 12px;
    font-size: 12px;
    font-weight: 800;
    box-shadow: 0 8px 16px rgba(255, 138, 166, 0.42);
    animation: cute-breathe 1.6s ease-in-out infinite;
  }

  .kakao-bus-overlay.dimmed {
    opacity: 0.32;
    filter: saturate(0.5);
    transform: scale(0.85);
  }

  .fast-selection-hint {
    margin-top: 10px;
    padding: 8px 12px;
    border-radius: 999px;
    background: var(--accent-soft);
    color: var(--accent-strong);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  .live-map-fallback {
    text-align: left;
  }

  .live-map-fallback.no-bus strong {
    color: #1d4ed8;
  }

  .fast-candidate-top {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: flex-start;
  }

  .fast-candidate-tag {
    display: inline-flex;
    border-radius: 999px;
    padding: 5px 10px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.02em;
  }

  .fast-candidate-title {
    margin-top: 8px;
    color: var(--text);
    font-size: 15px;
    line-height: 1.3;
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  .fast-candidate-meta {
    margin-top: 3px;
    color: var(--text-muted);
    font-size: 12px;
    font-weight: 500;
  }

  .fast-candidate-score {
    text-align: right;
    flex-shrink: 0;
  }

  .fast-candidate-score strong {
    display: block;
    font-family: var(--mono);
    font-size: 26px;
    line-height: 1;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  .fast-candidate-score span {
    display: block;
    margin-top: 3px;
    color: var(--text-muted);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .fast-detail {
    margin-top: 10px;
    border: 1px solid var(--line);
    border-radius: 24px;
    background: var(--paper);
    padding: 14px;
    box-shadow: 0 8px 24px rgba(68, 51, 30, 0.07);
    backdrop-filter: blur(14px);
  }

  .fast-detail-toggle {
    display: flex;
    width: 100%;
    align-items: center;
    justify-content: space-between;
    border: 0;
    background: transparent;
    padding: 0;
    text-align: left;
    color: var(--text);
    cursor: pointer;
    transition: opacity 0.14s ease;
  }

  .fast-detail-toggle:hover {
    opacity: 0.76;
  }

  .fast-detail-toggle strong {
    display: block;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  .fast-detail-toggle span {
    display: block;
    margin-top: 3px;
    color: var(--text-muted);
    font-size: 12px;
    font-weight: 500;
  }

  .fast-card .route-details {
    display: none;
    padding: 0;
    border: 0;
  }

  .fast-card.expanded .route-details {
    display: block;
  }

  .fast-card .detail-block {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--line);
  }

  .fast-card .segment-item,
  .fast-card .candidate-card {
    border-color: var(--line);
    background: rgba(255, 252, 247, 0.72);
  }

  .fast-refresh {
    position: sticky;
    bottom: 16px;
    z-index: 3;
    display: flex;
    width: 100%;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 14px;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: rgba(255, 252, 247, 0.88);
    color: var(--text);
    padding: 14px 18px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: -0.01em;
    box-shadow: 0 14px 36px rgba(68, 51, 30, 0.14);
    backdrop-filter: blur(24px);
    cursor: pointer;
    transition: background 0.16s ease, box-shadow 0.16s ease, transform 0.14s ease;
  }

  .fast-refresh:hover {
    background: rgba(255, 252, 247, 0.98);
    box-shadow: 0 18px 44px rgba(68, 51, 30, 0.18);
    transform: translateY(-1px);
  }

  .fast-refresh:active {
    transform: translateY(0);
    box-shadow: 0 8px 20px rgba(68, 51, 30, 0.10);
  }

  .fast-footer {
    margin-top: 18px;
    color: var(--text-muted);
    text-align: center;
    font-size: 12px;
    font-weight: 500;
    opacity: 0.7;
  }

  .advanced-options {
    display: none;
  }

  @media (max-width: 760px) {
    .app-shell,
    .fast-shell {
      width: calc(100vw - 18px);
      padding-top: 9px;
    }

    .fast-phone {
      min-height: calc(100dvh - 18px);
      border-radius: 30px;
      padding: 17px;
    }

    .route-main,
    .route-details,
    .modal {
      padding-left: 16px;
      padding-right: 16px;

    .fast-card .route-details {
      padding: 0;
    }

    .summary-head,
    .modal-head,

      flex-direction: column;

    .route-actions,
    .route-toolbar {
      width: 100%;
      justify-content: stretch;

    .route-actions .btn,
    .route-toolbar .btn {
      flex: 1;

    .compare-grid,
    .form-grid,
    .preview-grid {
      grid-template-columns: 1fr;
    }

      grid-template-columns: 1fr;

    .autocomplete-preview {

      border-right: none;

    }

    .map-picker-overlay {
      padding: 0;
    }

    .map-picker-sheet {
      width: 100%;
      height: 100dvh;
      border-radius: 0;
      border: none;
    }

    .map-picker-head,
    .map-picker-footer {
      padding-left: 14px;
      padding-right: 14px;
    }
  }

  /* ====================================================
     코지팝 귀여운 스타일 레이어 — 2nd pass
     ==================================================== */

  /* 키프레임 */
  @keyframes cute-float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-6px); }
  }

  @keyframes cute-blink {
    0%, 90%, 100% { transform: scaleY(1); }
    95% { transform: scaleY(0.05); }
  }

  @keyframes cute-breathe {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.04); }
  }

  @keyframes cute-wiggle {
    0%, 100% { transform: rotate(0deg); }
    25% { transform: rotate(-2deg); }
    75% { transform: rotate(2deg); }
  }

  @keyframes cute-bounce-in {
    0% { transform: translateY(0px) scale(1); }
    40% { transform: translateY(-5px) scale(1.04); }
    70% { transform: translateY(2px) scale(0.98); }
    100% { transform: translateY(0px) scale(1); }
  }

  @keyframes cute-spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  @keyframes cute-pulse-boarding {
    0% { box-shadow: 0 0 0 0 rgba(249, 208, 216, 0.8), 0 4px 12px rgba(28, 91, 183, 0.24); }
    70% { box-shadow: 0 0 0 10px rgba(249, 208, 216, 0), 0 4px 12px rgba(28, 91, 183, 0.24); }
    100% { box-shadow: 0 0 0 0 rgba(249, 208, 216, 0), 0 4px 12px rgba(28, 91, 183, 0.24); }
  }

  @keyframes cute-star-spin {
    0% { transform: rotate(0deg) scale(1); }
    50% { transform: rotate(180deg) scale(1.1); }
    100% { transform: rotate(360deg) scale(1); }
  }

  @keyframes cute-tab-bounce {
    0%, 100% { transform: translateY(0) scale(1); }
    30% { transform: translateY(-3px) scale(1.06); }
    60% { transform: translateY(1px) scale(0.97); }
  }

  @keyframes empty-wave {
    0%, 100% { transform: rotate(-8deg); }
    50% { transform: rotate(8deg); }
  }

  /* ---- 브랜드 마스코트 ---- */
  .brand-mascot {
    display: inline-block;
    animation: cute-float 3s ease-in-out infinite;
    flex-shrink: 0;
  }

  .fast-brand {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* ---- 버스 오버레이 귀엽게 ---- */
  .kakao-bus-overlay {
    border-radius: 22px 22px 16px 16px;
    box-shadow: 0 18px 32px rgba(37, 99, 235, 0.28), 0 0 0 9px rgba(200, 230, 245, 0.18);
    animation: cute-float 2.2s ease-in-out infinite;
  }

  .kakao-bus-overlay.secondary {
    animation-delay: 0.4s;
    animation-duration: 2.6s;
  }

  /* 버스 얼굴 - ::before 는 유리창, 귀여운 눈은 SVG로 대체 (overlay 내부에 SVG 주입됨) */

  /* ---- 탑승 정류장 — 하트 핀 느낌 ---- */
  .kakao-stop-dot.boarding {
    animation: cute-pulse-boarding 1.8s ease-out infinite;
    /* 하트 실루엣 강조 */
    clip-path: none;
  }

  /* 탑승 정류장: 내부에 하트 포인트 — 원 안에 작은 파스텔 포인트 */
  .kakao-stop-dot.boarding::after {
    content: "♥";
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    color: white;
    line-height: 1;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  /* 하차 정류장: 별 포인트 */
  .kakao-stop-dot.alighting {
    position: relative;
  }

  .kakao-stop-dot.alighting::after {
    content: "★";
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 8px;
    color: white;
    line-height: 1;
    animation: cute-star-spin 4s linear infinite;
  }

  /* ---- 내 위치 마커 ---- */
  .kakao-dot-overlay {
    box-shadow: 0 0 0 4px rgba(200, 230, 245, 0.5), 0 6px 14px rgba(32, 24, 16, 0.18);
  }

  /* ---- 탭 마이크로인터랙션 ---- */
  .route-tab.active {
    background: linear-gradient(135deg, var(--accent) 0%, #2d9e7a 100%);
    color: #fff;
    border-color: transparent;
    box-shadow: 0 6px 18px rgba(30, 122, 95, 0.28);
    animation: cute-tab-bounce 0.36s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }

  /* ---- Refresh 버튼 스핀 ---- */
  .fast-refresh.spinning .refresh-icon,
  #header-refresh-btn.spinning .refresh-icon {
    animation: cute-spin 1s linear infinite;
  }

  #header-refresh-btn.spinning {
    pointer-events: none;
    opacity: 0.92;
  }

  /* ---- Tracking 토글 활성 상태 ---- */
  #tracking-toggle-btn[aria-pressed="true"] {
    background: linear-gradient(135deg, var(--pastel-mint), var(--accent-soft));
    color: var(--accent-strong);
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(121, 205, 184, 0.18);
  }

  #tracking-toggle-btn[aria-pressed="true"]::after {
    content: "●";
    margin-left: 4px;
    color: var(--accent-strong);
    font-size: 10px;
    animation: cute-breathe 1.6s ease-in-out infinite;
  }

  /* ---- 단일 컬럼 preview + 입력 힌트 ---- */
  .preview-grid.preview-grid-single {
    grid-template-columns: 1fr;
  }

  .form-hint {
    display: block;
    margin-top: 6px;
    color: var(--text-muted);
    font-size: 12px;
    font-weight: 600;
  }

  /* ---- 카드 로딩 progress bar ---- */
  .route-card.loading {
    position: relative;
  }

  .route-card.loading::before {
    content: "";
    position: absolute;
    left: 0;
    right: 0;
    top: 0;
    height: 3px;
    border-radius: 4px 4px 0 0;
    background: linear-gradient(90deg, transparent 0%, var(--pastel-pink-strong) 30%, var(--pastel-sky-strong) 60%, transparent 100%);
    background-size: 200% 100%;
    animation: card-loading-stream 1.2s linear infinite;
    z-index: 5;
    pointer-events: none;
  }

  @keyframes card-loading-stream {
    0% { background-position: 100% 0; }
    100% { background-position: -100% 0; }
  }

  /* ---- candidate card hover wiggle ---- */
  .fast-candidate:hover {
    transform: translateY(-2px) rotate(-0.6deg);
    box-shadow: 0 14px 34px rgba(68, 51, 30, 0.14);
  }

  .fast-candidate:nth-child(even):hover {
    transform: translateY(-2px) rotate(0.6deg);
  }

  /* ---- 빈 상태 일러스트 ---- */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 32px 22px 28px;
    gap: 6px;
  }

  .empty-state-illust {
    margin-bottom: 10px;
    animation: cute-breathe 3.5s ease-in-out infinite;
  }

  .empty-state-wave {
    animation: empty-wave 1.4s ease-in-out infinite;
    transform-origin: bottom center;
    display: inline-block;
  }

  .empty-state strong {
    text-align: center;
  }

  /* ---- live-map-fallback 일러스트 ---- */
  .live-map-fallback {
    gap: 10px;
    text-align: center;
  }

  .live-map-fallback-illust {
    animation: cute-float 2.8s ease-in-out infinite;
  }

  /* ---- 헤더 pill 귀여운 배경 ---- */
  .fast-metric.arrive {
    background: linear-gradient(135deg, rgba(200, 230, 245, 0.5), rgba(28, 91, 183, 0.07));
    border-color: rgba(147, 201, 232, 0.4);
    border-radius: 24px;
  }

  .fast-metric.transfer {
    background: linear-gradient(135deg, rgba(252, 238, 196, 0.6), rgba(197, 99, 31, 0.07));
    border-color: rgba(240, 210, 140, 0.4);
    border-radius: 24px;
  }

  .fast-metric.walk {
    background: linear-gradient(135deg, rgba(196, 234, 223, 0.6), rgba(30, 122, 95, 0.07));
    border-color: rgba(150, 210, 190, 0.4);
    border-radius: 24px;
  }

  /* ---- fast-phone 배경 데코 ---- */
  .fast-phone {
    background: linear-gradient(160deg, #ede5d8 0%, #e4d8c6 100%);
  }

  /* ---- 헤더 데코 줄무늬 ---- */
  .fast-header::after {
    content: "";
    display: block;
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: 3px;
    border-radius: 999px;
    background: linear-gradient(90deg,
      var(--pastel-pink) 0%,
      var(--pastel-yellow) 25%,
      var(--pastel-mint) 50%,
      var(--pastel-sky) 75%,
      var(--pastel-lavender) 100%
    );
    opacity: 0.55;
    pointer-events: none;
  }

  .fast-header {
    position: relative;
    padding-bottom: 20px;
    margin-bottom: -2px;
  }

  /* ---- 카드 모서리 + 부드러운 그림자 ---- */
  .fast-trip-panel {
    border-radius: 30px;
    box-shadow: 0 16px 40px rgba(68, 51, 30, 0.09);
  }

  .fast-candidate {
    border-radius: 26px;
  }

  /* ---- next-action 귀여운 그라디언트 ---- */
  .fast-next-action {
    background: linear-gradient(135deg, #1e5040 0%, #1e7a5f 55%, #2563a8 100%);
    border-radius: 24px;
  }

  /* ---- add-route-btn 핑크 액센트 포인트 ---- */
  #add-route-btn {
    background: linear-gradient(135deg, var(--accent-strong) 0%, #2d9e7a 100%);
    box-shadow: 0 10px 24px rgba(30, 122, 95, 0.26);
    position: relative;
    overflow: hidden;
  }

  #add-route-btn::after {
    content: "";
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    width: 8px;
    height: 8px;
    border-radius: 999px;
    background: var(--pastel-pink);
    opacity: 0.7;
  }

  /* ---- live-badge 귀여운 ---- */
  .live-badge {
    border-radius: 16px;
    border-color: rgba(200, 230, 245, 0.6);
    background: rgba(255, 252, 247, 0.95);
  }

  /* ---- route-tab 귀엽게 ---- */
  .route-tab {
    border-radius: 16px;
    transition: background 0.18s ease, color 0.18s ease, border-color 0.18s ease, transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.18s ease;
  }

  .route-tab:hover {
    transform: translateY(-2px) scale(1.03);
  }

  /* ---- 정류장 승차 마커 핑크 포인트 ---- */
  .kakao-stop-dot.boarding {
    border-color: rgba(249, 208, 216, 0.8);
  }

  }

  .fast-flow-live,
  .fast-flow-eta {
    border-color: transparent;
    background: linear-gradient(135deg, rgba(118, 217, 194, 0.26), rgba(106, 167, 255, 0.2));
  }

  .fast-flow-vehicle {
    width: 38px;
    height: 34px;
    border: 3px solid #fff;
    border-radius: 15px 15px 12px 12px;
    background:
      radial-gradient(circle at 12px 13px, #31536b 0 2px, transparent 3px),
      radial-gradient(circle at 26px 13px, #31536b 0 2px, transparent 3px),
      radial-gradient(ellipse at 10px 18px, rgba(255, 159, 189, 0.75) 0 4px, transparent 5px),
      radial-gradient(ellipse at 28px 18px, rgba(255, 159, 189, 0.75) 0 4px, transparent 5px),
      linear-gradient(145deg, #8cc6ff, #6aa7ff);
    color: transparent;
    box-shadow: 0 12px 24px rgba(106, 167, 255, 0.34);
  }

  .fast-flow-vehicle::after {
    content: "";
    position: absolute;
    left: 8px;
    right: 8px;
    bottom: -5px;
    height: 8px;
    background:
      radial-gradient(circle at 0 50%, #3b2b35 0 3px, transparent 4px),
      radial-gradient(circle at 100% 50%, #3b2b35 0 3px, transparent 4px);
  }

  .kakao-bus-overlay {
    border-color: #fff;
    background:
      radial-gradient(ellipse 4px 5px at 16px 17px, #31536b 0%, #31536b 60%, transparent 70%),
      radial-gradient(ellipse 4px 5px at 43px 17px, #31536b 0%, #31536b 60%, transparent 70%),
      radial-gradient(circle at 18px 14px, rgba(255,255,255,0.9) 0 1.2px, transparent 2px),
      radial-gradient(circle at 45px 14px, rgba(255,255,255,0.9) 0 1.2px, transparent 2px),
      radial-gradient(ellipse at 12px 25px, rgba(255, 159, 189, 0.72) 0 5px, transparent 6px),
      radial-gradient(ellipse at 47px 25px, rgba(255, 159, 189, 0.72) 0 5px, transparent 6px),
      linear-gradient(160deg, #a9d4ff 0%, #6aa7ff 58%, #8fb5ff 100%);
    box-shadow: 0 16px 30px rgba(106, 167, 255, 0.28), 0 0 0 9px rgba(220, 238, 255, 0.34);
  }

  .kakao-bus-overlay.boarded {
    background:
      radial-gradient(circle at 18px 32px, #fff 0 4px, transparent 5px),
      radial-gradient(circle at 52px 32px, #fff 0 4px, transparent 5px),
      radial-gradient(circle at 16px 24px, rgba(255, 255, 255, 0.95) 0 2px, transparent 3px),
      radial-gradient(circle at 54px 24px, rgba(255, 255, 255, 0.95) 0 2px, transparent 3px),
      linear-gradient(160deg, #ffb45f 0%, #ff7aa2 52%, #b89cff 100%);
  }

  .kakao-bus-label,
  .kakao-bus-overlay .kakao-bus-label {
    border: 1px solid rgba(255, 255, 255, 0.74);
    background: rgba(59, 43, 53, 0.88);
    box-shadow: 0 8px 18px rgba(59, 43, 53, 0.18);
  }

  .fast-candidate {
    border-radius: 24px;
  }

  .fast-candidate:hover,
  .fast-candidate:nth-child(even):hover {
    transform: translateY(-3px);
    box-shadow: 0 18px 38px rgba(107, 75, 96, 0.18);
  }

  .fast-candidate.active {
    border-color: rgba(118, 217, 194, 0.7);
    background:
      linear-gradient(180deg, rgba(215, 247, 233, 0.62), rgba(255, 255, 255, 0.92));
  }

  .fast-candidate-tag {
    border: 1px solid rgba(255, 255, 255, 0.7);
  }

  .boarding-panel {
    border: 1px solid rgba(255, 255, 255, 0.82);
    border-radius: 24px;
    background: linear-gradient(135deg, #e4f2ff, #fff0f7);
    box-shadow: 0 10px 24px rgba(107, 75, 96, 0.11);
  }

  .boarding-panel.boarded {
    border: 2px solid rgba(255, 255, 255, 0.92);
    background:
      radial-gradient(circle at 12% 16%, rgba(255, 255, 255, 0.55), transparent 20%),
      linear-gradient(135deg, #fff1a8 0%, #ffb7d3 52%, #eadcff 100%);
    box-shadow: 0 18px 38px rgba(255, 111, 145, 0.28), 0 0 0 6px rgba(255, 255, 255, 0.52);
  }

  .boarding-panel-btn.primary,
  .boarding-panel-btn.end {
    border-color: transparent;
    background: linear-gradient(135deg, #ff7aa2, #ffb45f);
    color: #fff;
    box-shadow: 0 8px 18px rgba(255, 111, 145, 0.24);
  }

  .bus-line-board {
    border-color: rgba(255, 255, 255, 0.82);
    background: linear-gradient(180deg, rgba(255, 255, 255, 0.88), rgba(255, 246, 251, 0.76));
    box-shadow: 0 12px 28px rgba(107, 75, 96, 0.1);
  }

  .bus-line-bus {
    border-color: #fff;
    background: linear-gradient(145deg, #a9d4ff, #6aa7ff);
    box-shadow: 0 10px 20px rgba(106, 167, 255, 0.25);
  }

  .bus-line-bus.next {
    background: linear-gradient(145deg, #ffb7d3, #ff7aa2);
  }

  .empty-state {
    border: 1px solid rgba(255, 255, 255, 0.82);
    border-radius: 30px;
    background:
      linear-gradient(180deg, rgba(255, 255, 255, 0.86), rgba(255, 246, 251, 0.76));
    box-shadow: 0 18px 42px rgba(107, 75, 96, 0.13);
  }

  .modal,
  .map-picker-sheet {
    border: 2px solid rgba(255, 255, 255, 0.9);
    border-radius: 30px;
    background:
      linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(255, 247, 253, 0.94));
    box-shadow: 0 28px 70px rgba(59, 43, 53, 0.22);
  }

  input[type="text"],
  .option-card,
  .place-preview,
  .autocomplete-dropdown {
    border-color: rgba(126, 86, 109, 0.14);
    background: rgba(255, 255, 255, 0.78);
  }

  .option-card.active,
  .option-card:has(input:checked) {
    border-color: rgba(255, 122, 162, 0.6);
    background: linear-gradient(180deg, rgba(255, 224, 239, 0.8), rgba(255, 255, 255, 0.86));
  }

  .toast {
    border: 1px solid rgba(255, 255, 255, 0.7);
    border-radius: 20px;
    background: rgba(59, 43, 53, 0.9);
    box-shadow: 0 18px 36px rgba(59, 43, 53, 0.22);
  }

  .fast-footer {
    color: #9b7788;
  }

  @media (max-width: 420px) {
    .fast-phone {
      padding: 15px;
      border-radius: 30px;
    }

    .fast-header::before {
      display: none;
    }

    .fast-actions {
      grid-template-columns: minmax(0, 1fr) auto auto;
    }

    #key-settings-btn[hidden] {
      display: none;
    }

    .fast-actions .btn-compact {
      padding-left: 11px;
      padding-right: 11px;
    }

    .fast-metrics {
      grid-template-columns: 1fr 1fr 1fr;
    }

    .fast-metric {
      padding: 11px 9px;
    }

    .fast-metric strong {
      font-size: 25px;
    }
  }
</style>
</head>
<body>
<div class="fast-shell">
  <div class="fast-phone">
    <div class="fast-content">
      <header class="fast-header">
        <div class="fast-brand">
          <!-- 버스 마스코트 SVG — 눈/뺨 있는 귀여운 얼굴 -->
          <span class="brand-mascot" aria-hidden="true">
            <svg width="36" height="30" viewBox="0 0 36 30" fill="none" xmlns="http://www.w3.org/2000/svg">
              <!-- 차체 -->
              <rect x="1" y="5" width="34" height="20" rx="7" fill="#60a5fa"/>
              <rect x="1" y="5" width="34" height="20" rx="7" fill="url(#bus-grad)"/>
              <!-- 전면 유리창 (두 칸) -->
              <rect x="5" y="9" width="11" height="8" rx="3" fill="rgba(255,255,255,0.88)"/>
              <rect x="20" y="9" width="11" height="8" rx="3" fill="rgba(255,255,255,0.88)"/>
              <!-- 눈 -->
              <ellipse cx="10.5" cy="13" rx="2.2" ry="2.5" fill="#1d3a6b" class="bus-eye-left"/>
              <ellipse cx="25.5" cy="13" rx="2.2" ry="2.5" fill="#1d3a6b" class="bus-eye-right"/>
              <!-- 눈 하이라이트 -->
              <circle cx="11.4" cy="11.8" r="0.7" fill="white"/>
              <circle cx="26.4" cy="11.8" r="0.7" fill="white"/>
              <!-- 뺨 홍조 -->
              <ellipse cx="7" cy="16.5" rx="2.8" ry="1.6" fill="#f5b8c4" opacity="0.7"/>
              <ellipse cx="29" cy="16.5" rx="2.8" ry="1.6" fill="#f5b8c4" opacity="0.7"/>
              <!-- 미소 -->
              <path d="M13 18 Q18 21.5 23 18" stroke="#1d3a6b" stroke-width="1.4" stroke-linecap="round" fill="none"/>
              <!-- 바퀴 -->
              <circle cx="9" cy="25.5" r="3.5" fill="#1e293b"/>
              <circle cx="9" cy="25.5" r="1.8" fill="#94a3b8"/>
              <circle cx="27" cy="25.5" r="3.5" fill="#1e293b"/>
              <circle cx="27" cy="25.5" r="1.8" fill="#94a3b8"/>
              <!-- 상단 안테나 -->
              <rect x="16" y="1" width="4" height="5" rx="1" fill="#93c5fd"/>
              <circle cx="18" cy="1" r="1.5" fill="#fcd34d"/>
              <defs>
                <linearGradient id="bus-grad" x1="1" y1="5" x2="35" y2="25" gradientUnits="userSpaceOnUse">
                  <stop offset="0%" stop-color="#93c5fd"/>
                  <stop offset="100%" stop-color="#2563eb"/>
                </linearGradient>
              </defs>
            </svg>
          </span>
          <div>
            <strong>토닥버스</strong>
            <span>오늘도 같이 가요</span>
          </div>
        </div>
        <div class="live-badge" id="clock">--:--</div>
      </header>
      <div class="fast-actions">
        <button class="btn btn-primary btn-compact" id="add-route-btn">목적지 추가</button>
        <button class="btn btn-secondary btn-compact" id="header-refresh-btn" aria-label="현재 위치로 재검색">
          <span class="refresh-icon-wrap" aria-hidden="true">
            <svg class="refresh-icon" width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M13 7A6 6 0 1 1 7 1" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              <path d="M7 1L10 3.5L7 5.5" fill="currentColor"/>
            </svg>
          </span>
          재검색
        </button>
        <button class="btn btn-secondary btn-compact" id="tracking-toggle-btn" aria-label="이동 트래킹 토글" aria-pressed="false">트래킹</button>
        <button class="btn btn-secondary btn-compact" id="key-settings-btn" aria-label="키 설정" hidden>키</button>
      </div>
      <div class="permission-notice" id="permission-notice" hidden></div>
      <section>
    <div class="route-tabs" id="route-tabs"></div>
    <div class="route-list" id="route-list"></div>
        <div class="fast-footer">저장 루트 <span id="route-count">0개 루트</span></div>
      </section>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-head">
      <div>
        <h3 id="modal-title">새 루트 추가</h3>
        <p>출발지와 도착지를 고르면 후보를 빠르게 비교할 수 있게 저장합니다.</p>
      </div>
      <button class="icon-button" id="modal-close-btn" aria-label="닫기">✕</button>
    </div>

    <div class="form-grid">
      <div class="form-row full">
        <label for="route-label-input">루트 라벨</label>
        <input type="text" id="route-label-input" placeholder="예: 출근, 퇴근, 병원" maxlength="18">
      </div>

      <div class="form-row full">
        <label for="route-to-input">목적지</label>
        <div class="autocomplete-wrap">
          <input type="text" id="route-to-input" placeholder="예: 여의도역, 판교역 카카오" autocomplete="off">
          <div class="autocomplete-dropdown" id="route-to-dropdown"></div>
        </div>
        <span class="form-hint">출발지는 매번 현재 위치로 자동 설정돼요.</span>
      </div>

      <div class="form-row full">
        <label>목적지 미리보기</label>
        <div class="preview-grid preview-grid-single">
          <div class="place-preview">
            <div class="place-preview-head">
              <div>
                <strong>목적지</strong>
                <span id="route-to-preview-label">위치를 선택하면 이곳에 지도가 보입니다.</span>
              </div>
              <button class="mini-map-btn" type="button" data-map-pick="to" id="route-to-map-pick-btn">지도에서 찍기</button>
            </div>
            <div class="place-preview-map empty" id="route-to-preview-map">검색 결과를 선택하면 지도로 위치를 확인할 수 있습니다.</div>
          </div>
        </div>
      </div>

      <div class="form-row full advanced-options">
        <label>추천 기준</label>
        <div class="option-grid" id="priority-options">
          <label class="option-card" data-priority="fastest">
            <input type="radio" name="priority" value="fastest">
            <strong>최소시간</strong>
            <span>총 소요시간이 가장 짧은 후보를 추천합니다.</span>
          </label>
          <label class="option-card" data-priority="fewest_transfers">
            <input type="radio" name="priority" value="fewest_transfers">
            <strong>최소환승</strong>
            <span>환승 수가 가장 적은 후보를 우선합니다.</span>
          </label>
          <label class="option-card" data-priority="best_eta">
            <input type="radio" name="priority" value="best_eta">
            <strong>지금 출발 기준</strong>
            <span>첫 탑승 대기와 총 이동시간을 함께 반영합니다.</span>
          </label>
        </div>
      </div>

    </div>

    <div class="modal-actions">
      <button class="btn btn-secondary" id="modal-cancel-btn">취소</button>
      <button class="btn btn-primary" id="modal-save-btn">저장</button>
    </div>
  </div>
</div>

<div class="map-picker-overlay" id="map-picker-overlay">
  <div class="map-picker-sheet">
    <div class="map-picker-head">
      <div>
        <h3 id="map-picker-title">지도에서 위치 선택</h3>
        <p id="map-picker-subtitle">지도를 눌러 저장할 좌표를 선택하세요.</p>
      </div>
      <button class="icon-button" id="map-picker-close-btn" aria-label="닫기">✕</button>
    </div>
    <div class="map-picker-map" id="map-picker-map"></div>
    <div class="map-picker-footer">
      <span id="map-picker-status">현재 저장된 좌표나 서울 중심으로 지도를 엽니다.</span>
      <button class="btn btn-secondary" id="map-picker-cancel-btn" type="button">취소</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module" src="./js/app.js"></script>
</body>
</html>
