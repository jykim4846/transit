<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f2ece1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Transit">
<title>Transit</title>
<link rel="icon" href="data:,">
<link rel="manifest" href="/site.webmanifest">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --bg: #f4efe6;
    --bg-strong: #e8decf;
    --paper: rgba(255, 252, 247, 0.84);
    --paper-strong: #fffaf2;
    --line: rgba(71, 57, 29, 0.14);
    --text: #201810;
    --text-muted: #70634f;
    --accent: #1e7a5f;
    --accent-strong: #165c47;
    --accent-soft: rgba(30, 122, 95, 0.12);
    --orange: #c5631f;
    --orange-soft: rgba(197, 99, 31, 0.12);
    --blue: #1c5bb7;
    --blue-soft: rgba(28, 91, 183, 0.12);
    --danger: #b44343;
    --shadow: 0 22px 60px rgba(68, 51, 30, 0.12);
    --radius-xl: 28px;
    --radius-lg: 20px;
    --radius-md: 14px;
    --mono: "Space Mono", monospace;
  }

  * {
    box-sizing: border-box;
  }

  html, body {
    margin: 0;
    min-height: 100%;
    background: #f2ece1;
  }

  body {
    font-family: "IBM Plex Sans KR", sans-serif;
    color: var(--text);
    min-height: 100dvh;
    overscroll-behavior-y: none;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    background:
      radial-gradient(circle at top left, rgba(28, 91, 183, 0.1), transparent 28%),
      radial-gradient(circle at top right, rgba(30, 122, 95, 0.12), transparent 26%),
      linear-gradient(180deg, #f7f0e4 0%, #f2ece1 100%);
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image:
      linear-gradient(rgba(255, 255, 255, 0.15) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255, 255, 255, 0.15) 1px, transparent 1px);
    background-size: 28px 28px;
    mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.25), transparent 80%);
    opacity: 0.25;
  }

  .app-shell {
    width: min(860px, calc(100vw - 28px));
    margin: 0 auto;
    padding: calc(26px + env(safe-area-inset-top, 0px)) 0 calc(48px + env(safe-area-inset-bottom, 0px));
    position: relative;
    z-index: 1;
  }

  body.is-standalone .app-shell {
    padding-top: calc(18px + env(safe-area-inset-top, 0px));
  }

  .hero {
    background: linear-gradient(135deg, rgba(255, 250, 242, 0.92), rgba(255, 246, 232, 0.82));
    border: 1px solid rgba(71, 57, 29, 0.08);
    border-radius: 32px;
    padding: 26px 24px 22px;
    box-shadow: var(--shadow);
    backdrop-filter: blur(18px);
  }

  .hero-top {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    align-items: flex-start;
    margin-bottom: 22px;
  }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.7);
    color: var(--text-muted);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .hero h1 {
    margin: 12px 0 10px;
    font-size: clamp(30px, 6vw, 46px);
    line-height: 1.03;
    letter-spacing: -0.04em;
  }

  .hero p {
    margin: 0;
    max-width: 560px;
    color: var(--text-muted);
    line-height: 1.6;
    font-size: 14px;
  }

  .hero-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
  }

  .clock-badge {
    font-family: var(--mono);
    font-size: 13px;
    padding: 12px 14px;
    border-radius: 16px;
    background: rgba(32, 24, 16, 0.05);
    color: var(--accent-strong);
    border: 1px solid rgba(30, 122, 95, 0.12);
    min-width: 104px;
    text-align: center;
  }

  .hero-note {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 10px;
  }

  .hero-note-card {
    background: rgba(255, 255, 255, 0.7);
    border: 1px solid rgba(71, 57, 29, 0.08);
    border-radius: 18px;
    padding: 14px;
  }

  .hero-note-card strong {
    display: block;
    margin-bottom: 6px;
    font-size: 13px;
  }

  .hero-note-card span {
    color: var(--text-muted);
    font-size: 13px;
    line-height: 1.45;
  }

  .section {
    margin-top: 24px;
  }

  .section-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }

  .section-head h2 {
    margin: 0;
    font-size: 18px;
    letter-spacing: -0.03em;
  }

  .section-head span {
    color: var(--text-muted);
    font-size: 13px;
  }

  .route-list {
    display: grid;
    gap: 14px;
  }

  .route-card {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow);
    backdrop-filter: blur(14px);
    overflow: hidden;
  }

  .route-card.loading {
    opacity: 0.76;
  }

  .route-card.collapsed .route-main {
    padding-bottom: 22px;
  }

  .route-card.commute-pinned {
    border-color: rgba(59, 130, 246, 0.55);
    box-shadow: 0 8px 24px rgba(59, 130, 246, 0.18), var(--shadow);
  }

  .commute-pin-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 8px;
    margin-left: 6px;
    border-radius: 999px;
    background: rgba(59, 130, 246, 0.12);
    color: #1d4ed8;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: -0.2px;
  }

  .route-main {
    padding: 22px 22px 18px;
  }

  .route-main-top {
    display: flex;
    justify-content: space-between;
    gap: 14px;
    align-items: flex-start;
  }

  .route-names {
    min-width: 0;
  }

  .route-kicker {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 10px;
  }

  .pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
    line-height: 1;
    border: 1px solid transparent;
  }

  .pill.label {
    background: rgba(32, 24, 16, 0.06);
    color: var(--text);
  }

  .pill.priority-fastest,
  .pill.priority-best_eta {
    background: var(--accent-soft);
    color: var(--accent-strong);
    border-color: rgba(30, 122, 95, 0.12);
  }

  .pill.priority-fewest_transfers {
    background: var(--blue-soft);
    color: var(--blue);
    border-color: rgba(28, 91, 183, 0.12);
  }

  .pill.transport {
    background: var(--orange-soft);
    color: var(--orange);
    border-color: rgba(197, 99, 31, 0.12);
  }

  .route-title {
    font-size: clamp(21px, 4vw, 28px);
    line-height: 1.18;
    letter-spacing: -0.04em;
    word-break: keep-all;
  }

  .route-title .arrow {
    color: var(--text-muted);
    margin: 0 8px;
  }

  .route-subtitle {
    margin-top: 10px;
    color: var(--text-muted);
    font-size: 14px;
    line-height: 1.5;
  }

  .route-overview {
    align-items: center;
  }

  .route-overview-copy {
    min-width: 0;
  }

  .route-overview-copy p {
    margin: 6px 0 0;
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.5;
  }

  .route-footer {
    margin-top: 24px;
    padding: 18px;
    border-radius: 18px;
    background: var(--paper);
    border: 1px solid var(--line);
  }

  .route-footer h2 {
    margin: 0;
    font-size: 16px;
    letter-spacing: -0.03em;
  }

  .route-footer h2 span {
    font-size: 13px;
    font-weight: 400;
    color: var(--text-muted);
    margin-left: 8px;
  }

  .route-footer p {
    margin: 6px 0 0;
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.5;
  }

  .route-toolbar {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    justify-content: flex-end;
  }

  .route-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: flex-end;
  }

  button {
    font: inherit;
  }

  .btn {
    border: none;
    cursor: pointer;
    transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease, opacity 0.18s ease;
  }

  .btn:hover {
    transform: translateY(-1px);
  }

  .btn:disabled {
    cursor: wait;
    opacity: 0.64;
    transform: none;
  }

  .btn-primary {
    background: var(--accent);
    color: white;
    padding: 14px 18px;
    border-radius: 16px;
    font-weight: 700;
  }

  .btn-secondary,
  .btn-ghost {
    background: rgba(255, 255, 255, 0.75);
    color: var(--text);
    border: 1px solid var(--line);
    padding: 11px 14px;
    border-radius: 14px;
    font-weight: 600;
  }

  .btn-ghost {
    padding: 10px 12px;
    font-size: 13px;
  }

  .btn-danger {
    color: var(--danger);
  }

  .summary-board {
    margin-top: 18px;
    background: var(--paper-strong);
    border: 1px solid rgba(71, 57, 29, 0.08);
    border-radius: 22px;
    padding: 18px;
  }

  .summary-head {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    align-items: flex-start;
  }

  .summary-head strong {
    display: block;
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .summary-line {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
  }

  .score-inline {
    text-align: right;
    flex-shrink: 0;
  }

  .score-inline .label {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .score-inline .value {
    font-family: var(--mono);
    font-size: clamp(22px, 4vw, 30px);
    font-weight: 700;
    line-height: 1.1;
  }

  .summary-line .transit-label {
    font-size: clamp(28px, 6vw, 38px);
    font-weight: 700;
    line-height: 1.1;
    letter-spacing: -0.02em;
  }

  .summary-line .transit-label.bus {
    color: var(--blue);
  }

  .summary-line .transit-label.subway {
    color: var(--accent);
  }

  .summary-stop-flow {
    margin-top: 8px;
    font-size: 14px;
    color: var(--text);
    line-height: 1.5;
    padding: 8px 12px;
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.72);
    border: 1px solid rgba(71, 57, 29, 0.08);
  }

  .summary-stop-flow .flow-arrow {
    color: var(--text-muted);
    margin: 0 2px;
  }

  .summary-note {
    margin-top: 10px;
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.5;
  }

  .summary-subline {
    margin-top: 10px;
    padding: 10px 12px;
    border-radius: 14px;
    background: rgba(255, 255, 255, 0.72);
    border: 1px solid rgba(71, 57, 29, 0.08);
    font-size: 13px;
    color: var(--text);
    line-height: 1.45;
  }

  .summary-subline strong {
    color: var(--text-muted);
    margin-right: 6px;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .score-badge {
    min-width: 120px;
    padding: 10px 12px;
    border-radius: 16px;
    background: rgba(32, 24, 16, 0.05);
    text-align: right;
  }

  .score-badge .label {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .score-badge .value {
    display: block;
    margin-top: 6px;
    font-family: var(--mono);
    font-size: 24px;
    font-weight: 700;
  }

  .metric-grid {
    display: flex;
    margin-top: 16px;
    border-radius: 14px;
    background: rgba(255, 255, 255, 0.72);
    border: 1px solid rgba(71, 57, 29, 0.08);
    overflow: hidden;
  }

  .metric {
    flex: 1;
    padding: 10px 0;
    text-align: center;
    min-width: 0;
  }

  .metric + .metric {
    border-left: 1px solid rgba(71, 57, 29, 0.08);
  }

  .metric .label {
    display: block;
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    padding: 0 6px;
  }

  .metric .value {
    display: block;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.03em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    padding: 0 6px;
  }

  .metric-inline {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 10px;
    padding: 6px 12px;
    border-radius: 10px;
    background: rgba(255, 255, 255, 0.5);
    font-size: 13px;
    color: var(--text-muted);
  }

  .metric-inline .stamp {
    font-family: var(--mono);
    font-size: 11px;
    flex-shrink: 0;
    margin-left: 12px;
  }

  .boarding-card { margin-top: 12px; padding: 12px; border-radius: 12px; background: rgba(30,122,95,.08); border:1px solid rgba(30,122,95,.2);}
  .boarding-title { font-size:12px; color:var(--text-muted); font-weight:600; }
  .boarding-main { margin-top:4px; font-weight:700; font-size:14px; }
  .boarding-pill { display:inline-block; margin-top:8px; padding:4px 10px; border-radius:999px; background:rgba(197,99,31,.14); color:var(--orange); font-weight:700; font-size:12px;}
  .compact-details { margin-top: 12px; }
  .compact-details summary { cursor:pointer; font-size:13px; font-weight:600; color:var(--blue);}
  .compact-details .segment-list { margin-top:8px; }

  .arrival-headline {
    margin-top: 12px;
    padding: 14px 16px;
    border-radius: 16px;
    background: linear-gradient(135deg, rgba(30, 122, 95, 0.12), rgba(28, 91, 183, 0.10));
    border: 1px solid rgba(30, 122, 95, 0.18);
  }

  .arrival-headline .row-main {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }

  .arrival-headline .depart {
    font-family: var(--mono);
    font-size: 14px;
    color: var(--text-muted);
    letter-spacing: 0.02em;
  }

  .arrival-headline .arrow {
    flex: 1;
    position: relative;
    min-width: 40px;
    height: 2px;
    margin: 0 10px;
    background: linear-gradient(90deg, rgba(30, 122, 95, 0.35), rgba(28, 91, 183, 0.45));
    border-radius: 1px;
    align-self: center;
  }

  .arrival-headline .arrow::after {
    content: "";
    position: absolute;
    right: -2px;
    top: -3px;
    width: 0;
    height: 0;
    border-top: 4px solid transparent;
    border-bottom: 4px solid transparent;
    border-left: 6px solid rgba(28, 91, 183, 0.55);
  }

  .arrival-headline .arrive {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 700;
    color: var(--text-strong, #1f2937);
    letter-spacing: 0.01em;
  }

  .arrival-headline .row-sub {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-top: 8px;
    font-size: 12px;
    color: var(--text-muted);
  }

  .arrival-headline .countdown {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-muted);
  }

  .arrival-headline .countdown.urgent {
    color: var(--orange);
    font-weight: 600;
  }

  .arrival-headline .countdown.missed {
    color: #9b1c1c;
    font-weight: 600;
  }

  .arrival-headline.promoted {
    background: linear-gradient(135deg, rgba(197, 99, 31, 0.14), rgba(28, 91, 183, 0.10));
    border-color: rgba(197, 99, 31, 0.35);
  }

  .arrival-headline .promoted-tag {
    display: none;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--orange);
    padding: 2px 8px;
    border-radius: 999px;
    background: rgba(197, 99, 31, 0.14);
    margin-right: 8px;
  }

  .arrival-headline.promoted .promoted-tag {
    display: inline-block;
  }

  .alt-row.fallback.consumed {
    display: none;
  }

  .alt-row {
    grid-template-columns: auto 1fr auto auto;
    grid-template-rows: auto auto;
  }

  .alt-row > .alt-line {
    grid-column: 1 / -1;
    grid-row: 2;
    margin-top: 10px;
  }

  .journey-line {
    position: relative;
    display: flex;
    width: 100%;
    height: 18px;
    border-radius: 999px;
    overflow: hidden;
    background: rgba(71, 57, 29, 0.06);
  }

  .journey-line .seg {
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 600;
    color: rgba(255, 255, 255, 0.95);
    min-width: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: clip;
  }

  .journey-line .seg.wait {
    background: repeating-linear-gradient(
      45deg,
      rgba(71, 57, 29, 0.10),
      rgba(71, 57, 29, 0.10) 4px,
      rgba(71, 57, 29, 0.22) 4px,
      rgba(71, 57, 29, 0.22) 8px
    );
    color: rgba(55, 55, 55, 0.88);
    font-weight: 600;
  }

  .journey-line .seg.walk {
    background: rgba(120, 120, 120, 0.5);
    color: rgba(55, 55, 55, 0.9);
  }

  .journey-line .seg.bus {
    background: linear-gradient(90deg, rgba(197, 99, 31, 0.9), rgba(197, 99, 31, 0.75));
  }

  .journey-line .seg.subway {
    background: linear-gradient(90deg, rgba(28, 91, 183, 0.9), rgba(28, 91, 183, 0.75));
  }

  .journey-line .seg:not(:last-child) {
    border-right: 1px solid rgba(255, 255, 255, 0.6);
  }

  .journey-line-caption {
    display: flex;
    justify-content: space-between;
    gap: 8px;
    margin-top: 4px;
    font-size: 10px;
    color: var(--text-muted);
    font-family: var(--mono);
  }

  .journey-line-caption .board {
    color: var(--orange);
    font-weight: 600;
  }

  .journey-line-caption .alight {
    color: var(--blue);
    font-weight: 600;
  }

  .alt-board {
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px dashed rgba(71, 57, 29, 0.12);
  }

  .alt-board .alt-head {
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 0.02em;
    margin-bottom: 8px;
  }

  .alt-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .alt-row {
    display: grid;
    grid-template-columns: auto 1fr auto auto;
    gap: 10px;
    align-items: center;
    padding: 10px 12px;
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.62);
    border: 1px solid rgba(71, 57, 29, 0.08);
    font-size: 13px;
  }

  .alt-row .alt-tag {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 600;
    letter-spacing: 0.02em;
  }

  .alt-row .alt-title {
    font-weight: 600;
    color: var(--text-strong, #1f2937);
  }

  .alt-row .alt-sub {
    display: block;
    margin-top: 2px;
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 400;
  }

  .alt-row .alt-arrive {
    font-family: var(--mono);
    font-weight: 700;
    color: var(--text-strong, #1f2937);
  }

  .alt-row .alt-delta {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    padding: 2px 6px;
    border-radius: 6px;
    background: rgba(71, 57, 29, 0.06);
  }

  .alt-row.fallback {
    border-color: rgba(197, 99, 31, 0.25);

      <div class="form-row full">

        <input type="text" id="route-label-input" placeholder="예: 출근, 퇴근, 병원" maxlength="18">
      </div>

      <div class="form-row">
        <label for="route-from-input">출발지</label>
        <div class="autocomplete-wrap">
          <input type="text" id="route-from-input" placeholder="예: 강남역, 더현대 서울" autocomplete="off">
          <div class="autocomplete-dropdown" id="route-from-dropdown"></div>
        </div>
      </div>

      <div class="form-row">
        <label for="route-to-input">도착지</label>
        <div class="autocomplete-wrap">
          <input type="text" id="route-to-input" placeholder="예: 여의도역, 판교역 카카오" autocomplete="off">
          <div class="autocomplete-dropdown" id="route-to-dropdown"></div>
        </div>
      </div>

      <div class="form-row full">
        <label>선택 위치 확인</label>
        <div class="preview-grid">
          <div class="place-preview">
            <div class="place-preview-head">
              <div>
                <strong>출발지</strong>
                <span id="route-from-preview-label">위치를 선택하면 이곳에 지도가 보입니다.</span>
              </div>
              <button class="mini-map-btn" type="button" data-map-pick="from" id="route-from-map-pick-btn">지도에서 찍기</button>
            </div>
            <div class="place-preview-map empty" id="route-from-preview-map">검색 결과를 선택하면 지도로 위치를 확인할 수 있습니다.</div>
          </div>
          <div class="place-preview">
            <div class="place-preview-head">
              <div>
                <strong>도착지</strong>
                <span id="route-to-preview-label">위치를 선택하면 이곳에 지도가 보입니다.</span>
              </div>
              <button class="mini-map-btn" type="button" data-map-pick="to" id="route-to-map-pick-btn">지도에서 찍기</button>
            </div>
            <div class="place-preview-map empty" id="route-to-preview-map">검색 결과를 선택하면 지도로 위치를 확인할 수 있습니다.</div>
          </div>
        </div>
      </div>

      <div class="form-row full advanced-options">
        <label>추천 기준</label>
        <div class="option-grid" id="priority-options">
          <label class="option-card" data-priority="fastest">
            <input type="radio" name="priority" value="fastest">
            <strong>최소시간</strong>
            <span>총 소요시간이 가장 짧은 후보를 추천합니다.</span>
          </label>
          <label class="option-card" data-priority="fewest_transfers">
            <input type="radio" name="priority" value="fewest_transfers">
            <strong>최소환승</strong>
            <span>환승 수가 가장 적은 후보를 우선합니다.</span>
          </label>
          <label class="option-card" data-priority="best_eta">
            <input type="radio" name="priority" value="best_eta">
            <strong>지금 출발 기준</strong>
            <span>첫 탑승 대기와 총 이동시간을 함께 반영합니다.</span>
          </label>
        </div>
      </div>

      <div class="form-row full advanced-options">
        <label>허용 교통수단</label>
        <div class="option-grid" id="transport-options">
          <label class="option-card" data-transport="all">
            <input type="radio" name="transport" value="all">
            <strong>버스 + 지하철</strong>
            <span>둘 다 허용합니다.</span>
          </label>
          <label class="option-card" data-transport="bus">
            <input type="radio" name="transport" value="bus">
            <strong>버스만</strong>
            <span>버스만 포함된 경로만 비교합니다.</span>
          </label>
          <label class="option-card" data-transport="subway">
            <input type="radio" name="transport" value="subway">
            <strong>지하철만</strong>
            <span>지하철만 포함된 경로만 비교합니다.</span>
          </label>
        </div>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn btn-secondary" id="modal-cancel-btn">취소</button>
      <button class="btn btn-primary" id="modal-save-btn">저장</button>
    </div>
  </div>
</div>

<div class="map-picker-overlay" id="map-picker-overlay">
  <div class="map-picker-sheet">
    <div class="map-picker-head">
      <div>
        <h3 id="map-picker-title">지도에서 위치 선택</h3>
        <p id="map-picker-subtitle">지도를 눌러 저장할 좌표를 선택하세요.</p>
      </div>
      <button class="icon-button" id="map-picker-close-btn" aria-label="닫기">✕</button>
    </div>
    <div class="map-picker-map" id="map-picker-map"></div>
    <div class="map-picker-footer">
      <span id="map-picker-status">현재 저장된 좌표나 서울 중심으로 지도를 엽니다.</span>
      <button class="btn btn-secondary" id="map-picker-cancel-btn" type="button">취소</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const STORAGE_KEY = "transit-routes-v2";
  const LEGACY_STORAGE_KEY = "transit-routes";
  const ROUTE_CARD_COLLAPSED_KEY = "transit-route-card-collapsed";
  const ODSAY_BROWSER_KEY_STORAGE = "transit-odsay-browser-key";
  const AUTOCOMPLETE_MIN_LENGTH = 2;
  const ODSAY_API_ROOT = "https://api.odsay.com/v1/api";

  const PRIORITY_META = {
    fastest: {
      label: "최소시간",
      className: "priority-fastest",
      scoreLabel: "총 이동",
      staleText: "가장 빠른 총 소요시간 기준"
    },
    fewest_transfers: {
      label: "최소환승",
      className: "priority-fewest_transfers",
      scoreLabel: "환승 우선",
      staleText: "환승 수가 가장 적은 기준"
    },
    best_eta: {
      label: "지금 출발",
      className: "priority-best_eta",
      scoreLabel: "출발 기준",
      staleText: "첫 탑승 대기까지 반영한 기준"
    }
  };

  const TRANSPORT_META = {
    all: { label: "버스+지하철" },
    bus: { label: "버스만" },
    subway: { label: "지하철만" }
  };

  const state = {
    routes: [],
    collapsedRouteIds: new Set(JSON.parse(localStorage.getItem(ROUTE_CARD_COLLAPSED_KEY) || "[]")),
    loadingRouteIds: new Set(),
    expandedRouteIds: new Set(),
    modalRouteId: null,
    previewMaps: {},
    mapPickerTarget: null,
    autocompleteSelection: {
      from: null,
      to: null
    }
  };

  function uid() {
    return typeof crypto !== "undefined" && crypto.randomUUID
      ? crypto.randomUUID()
      : "route-" + Date.now() + "-" + Math.random().toString(16).slice(2);
  }

  function nowStamp() {
    return new Date().toISOString();
  }

  function getBrowserOdsayKey() {
    return localStorage.getItem(ODSAY_BROWSER_KEY_STORAGE) || "";
  }

  function setBrowserOdsayKey(value) {
    if (!value) {
      localStorage.removeItem(ODSAY_BROWSER_KEY_STORAGE);
      return;
    }
    localStorage.setItem(ODSAY_BROWSER_KEY_STORAGE, value.trim());
  }

  function normalizeLegacyRoute(route) {
    return {
      id: uid(),
      label: route.tag || "루트",
      from: { name: route.from || "", x: null, y: null },
      to: { name: route.to || "", x: null, y: null },
      priority: route.tag === "퇴근" ? "fewest_transfers" : "fastest",
      transportFilter: "all",
      lastResult: null,
      createdAt: nowStamp()
    };
  }

  function migrateAndLoadRoutes() {
    const current = localStorage.getItem(STORAGE_KEY);
    if (current) {
      try {
        return JSON.parse(current) || [];
      } catch {
        return [];
      }
    }

    const legacy = localStorage.getItem(LEGACY_STORAGE_KEY);
    if (!legacy) return [];

    try {
      const migrated = (JSON.parse(legacy) || []).map(normalizeLegacyRoute);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(migrated));
      return migrated;
    } catch {
      return [];
    }
  }

  function persistRoutes() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state.routes));
  }

  function escapeHtml(value) {
    return String(value ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#39;");
  }

  function formatTime(dateLike) {
    if (!dateLike) return "미갱신";
    const date = new Date(dateLike);
    if (Number.isNaN(date.getTime())) return "미갱신";
    return date.toLocaleTimeString("ko-KR", {
      hour: "2-digit",
      minute: "2-digit"
    });
  }

  function relativeTime(dateLike) {
    if (!dateLike) return "아직 추천을 가져오지 않았습니다";
    const diffMin = Math.max(0, Math.floor((Date.now() - new Date(dateLike).getTime()) / 60000));
    if (diffMin < 1) return "방금 갱신";
    if (diffMin < 60) return diffMin + "분 전 갱신";
    const diffHour = Math.floor(diffMin / 60);
    if (diffHour < 24) return diffHour + "시간 전 갱신";
    return Math.floor(diffHour / 24) + "일 전 갱신";
  }

  function clearLocationPreview(selectionKey) {
    const mapId = "route-" + selectionKey + "-preview-map";
    const labelId = "route-" + selectionKey + "-preview-label";
    const mapEl = document.getElementById(mapId);
    const labelEl = document.getElementById(labelId);
    if (!mapEl || !labelEl) return;

    const existing = state.previewMaps[selectionKey];
    if (existing?.map) {
      existing.map.remove();
    }
    delete state.previewMaps[selectionKey];

    mapEl.classList.add("empty");
    mapEl.innerHTML = "검색 결과를 선택하면 지도로 위치를 확인할 수 있습니다.";
    labelEl.textContent = "위치를 선택하면 이곳에 지도가 보입니다.";
  }

  function updateLocationPreview(selectionKey, location) {
    const mapId = "route-" + selectionKey + "-preview-map";
    const labelId = "route-" + selectionKey + "-preview-label";
    const mapEl = document.getElementById(mapId);
    const labelEl = document.getElementById(labelId);
    if (!mapEl || !labelEl) return;

    if (!location || location.x == null || location.y == null) {
      clearLocationPreview(selectionKey);
      return;
    }

    mapEl.classList.remove("empty");
    labelEl.textContent = [location.kind, location.detail].filter(Boolean).join(" · ") || location.name;

    const lat = Number(location.y);
    const lng = Number(location.x);
    if (!Number.isFinite(lat) || !Number.isFinite(lng)) {
      clearLocationPreview(selectionKey);
      return;
    }

    requestAnimationFrame(() => {
      let preview = state.previewMaps[selectionKey];
      if (!preview) {
        mapEl.innerHTML = "";
        if (typeof L === "undefined") {
          mapEl.classList.add("empty");
          mapEl.textContent = `${location?.name || "선택한 위치"} (${lat.toFixed(5)}, ${lng.toFixed(5)})`;
          return;
        }
        const map = L.map(mapId, {
          zoomControl: false,
          attributionControl: false,
          dragging: false,
          scrollWheelZoom: false,
          doubleClickZoom: false,
          touchZoom: false,
          keyboard: false
        });
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          maxZoom: 19
        }).addTo(map);
        const marker = L.circleMarker([lat, lng], {
          radius: 8,
          color: "#165c47",
          weight: 2,
          fillColor: "#1e7a5f",
          fillOpacity: 0.9
        }).addTo(map);
        preview = { map, marker };
        state.previewMaps[selectionKey] = preview;
      } else {
        preview.marker.setLatLng([lat, lng]);
      }

      preview.map.getContainer().style.cursor = "default";
      preview.map.setView([lat, lng], 15);
      preview.map.invalidateSize();
    });
  }

  function clearAutocompletePreview(selectionKey) {
    const previewId = "route-" + selectionKey + "-dropdown-preview";
    const previewEl = document.getElementById(previewId);
    if (!previewEl) return;

    const existing = state.previewMaps["dropdown-" + selectionKey];
    if (existing?.map) {
      existing.map.remove();
    }
    delete state.previewMaps["dropdown-" + selectionKey];

    previewEl.classList.add("empty");
    previewEl.innerHTML = "목록에서 항목에 마우스를 올리거나 방향키로 이동하면 위치가 여기에 보입니다.";
  }

  function updateAutocompletePreview(selectionKey, location) {
    const previewId = "route-" + selectionKey + "-dropdown-preview";
    const previewEl = document.getElementById(previewId);
    if (!previewEl) return;

    if (!location || location.x == null || location.y == null) {
      clearAutocompletePreview(selectionKey);
      return;
    }

    previewEl.classList.remove("empty");

    const lat = Number(location.y);
    const lng = Number(location.x);
    if (!Number.isFinite(lat) || !Number.isFinite(lng)) {
      clearAutocompletePreview(selectionKey);
      return;
    }

    requestAnimationFrame(() => {
      let preview = state.previewMaps["dropdown-" + selectionKey];
      if (!preview) {
        previewEl.innerHTML = "";
        if (typeof L === "undefined") {
          previewEl.classList.add("empty");
          previewEl.textContent = `${location.name} (${lat.toFixed(5)}, ${lng.toFixed(5)})`;
          return;
        }
        const map = L.map(previewId, {
          zoomControl: false,
          attributionControl: false,
          dragging: false,
          scrollWheelZoom: false,
          doubleClickZoom: false,
          touchZoom: false,
          keyboard: false
        });
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          maxZoom: 19
        }).addTo(map);
        const marker = L.circleMarker([lat, lng], {
          radius: 8,
          color: "#1c5bb7",
          weight: 2,
          fillColor: "#3c7ad1",
          fillOpacity: 0.9
        }).addTo(map);
        preview = { map, marker };
        state.previewMaps["dropdown-" + selectionKey] = preview;
      } else {
        preview.marker.setLatLng([lat, lng]);
      }

      preview.map.setView([lat, lng], 15);
      preview.map.invalidateSize();
    });
  }

  function updateClock() {
    const now = new Date();
    document.getElementById("clock").textContent = now.toLocaleTimeString("ko-KR", {
      hour: "2-digit",
      minute: "2-digit"
    });
    const phase = getCommuteContext(now)?.phase || null;
    if (state.routes.length > 0 && phase !== state.lastCommutePhase) {
      renderRoutes();
    }
  }

  function priorityLabel(value) {
    return PRIORITY_META[value]?.label || value;
  }

  function transportLabel(value) {
    return TRANSPORT_META[value]?.label || value;
  }

  function describeRecommendation(route, recommendation) {
    if (!recommendation) return "저장된 추천이 없습니다. 필요할 때만 직접 갱신하세요.";
    if (route.priority === "fastest") {
      return "총 이동시간이 가장 짧은 후보를 상단에 고정했습니다.";
    }
    if (route.priority === "fewest_transfers") {
      return "환승 수를 먼저 줄이고, 동률이면 더 빠른 후보를 선택합니다.";
    }
    if (recommendation.firstWaitMin == null) {
      return "첫 탑승 대기 추정치와 총 이동시간을 함께 반영한 결과입니다.";
    }
    const source = recommendation.firstWaitSource === "seoul_arrival"
      ? "서울시 버스 도착정보"
      : "배차간격 추정";
    const riskSuffix = recommendation.transferRiskText ? " " + recommendation.transferRiskText : "";
    return "첫 탑승 대기 " + recommendation.firstWaitMin + "분(" + source + ")과 환승 대기 추정 " + (recommendation.transferWaitMin || 0) + "분을 반영해 지금 출발 기준으로 정렬했습니다." + riskSuffix;
  }

  function renderTransportSteps(steps) {
    if (!steps?.length) return "";
    return steps.map((step) => {
      return '<span class="transport-step ' + escapeHtml(step.type) + '">' + escapeHtml(step.label) + "</span>";
    }).join("");
  }

  function iconSvg(name, size = 16) {
    const paths = {
      map: '<path d="M20 10c0 4.5-6 10-6 10S8 14.5 8 10a6 6 0 1 1 12 0Z"></path><circle cx="14" cy="10" r="2"></circle>',
      clock: '<circle cx="12" cy="12" r="9"></circle><path d="M12 7v5l3 2"></path>',
      refresh: '<path d="M21 12a9 9 0 0 1-15.3 6.4"></path><path d="M3 12A9 9 0 0 1 18.3 5.6"></path><path d="M18 2v4h-4"></path><path d="M6 22v-4h4"></path>',
      edit: '<path d="M12 20h9"></path><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"></path>',
      trash: '<path d="M3 6h18"></path><path d="M8 6V4h8v2"></path><path d="m19 6-1 14H6L5 6"></path>',
      chevron: '<path d="m6 9 6 6 6-6"></path>'
    };
    return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">${paths[name] || ""}</svg>`;
  }

  function minuteNumber(value) {
    const n = Number.parseInt(String(value ?? ""), 10);
    return Number.isFinite(n) ? n : 0;
  }

  function getCandidateTone(candidate, index, isRecommended) {
    if (candidate.pickKind === "fastest_and_fewest") return { label: "추천", accent: "#2563eb", bg: "#eff6ff" };
    if (candidate.pickKind === "fastest") return { label: "최소시간", accent: "#2563eb", bg: "#eff6ff" };
    if (candidate.pickKind === "fewest") return { label: "최소환승", accent: "#16a34a", bg: "#ecfdf5" };
    if (isRecommended) return { label: "추천", accent: "#2563eb", bg: "#eff6ff" };
    if (candidate.transferCount === 0) return { label: "직행", accent: "#ea580c", bg: "#fff7ed" };
    if (index === 1) return { label: "빠름", accent: "#16a34a", bg: "#ecfdf5" };
    return { label: "대안", accent: "#7c3aed", bg: "#f5f3ff" };
  }

  function getCandidateTitle(candidate) {
    const parts = (candidate?.segments || [])
      .filter((segment) => segment.kind !== "도보")
      .map((segment) => segment.label || segment.kind)
      .filter(Boolean);
    if (parts.length) return parts.slice(0, 3).join(" → ");
    return candidate?.firstTransitLabel || "도보 중심";
  }

  function getFirstAction(candidate) {
    if (!candidate) return "추천을 갱신해 경로 확인";
    if (candidate.boardingApproachText) return candidate.boardingApproachText;
    const first = (candidate.segments || []).find((segment) => segment.kind === "도보" && minuteNumber(segment.time) > 0);
    if (first) return first.text || `도보 ${first.time}`;
    return candidate.firstTransitLabel ? `${candidate.firstTransitLabel} 탑승 준비` : "바로 이동";
  }

  function getFastFlowStops(candidate) {
    const segments = candidate?.segments || [];
    const names = [
      candidate?.boardingStopName,
      ...segments.map((segment) => segment.start),
      ...segments.map((segment) => segment.end),
      candidate?.alightingStopName
    ].filter(Boolean);
    const unique = [];
    names.forEach((name) => {
      const clean = String(name).trim();
      if (clean && !unique.includes(clean)) unique.push(clean);
    });
    if (unique.length >= 4) {
      return [unique[0], unique[Math.floor(unique.length / 3)], unique[Math.floor(unique.length * 2 / 3)], unique[unique.length - 1]];
    }
    if (unique.length >= 2) return [unique[0], "이동 중", unique[unique.length - 1]];
    return ["출발", "이동 중", "도착"];
  }

  function getFastFlowStatus(candidate, stops) {
    const firstRide = (candidate?.segments || []).find((segment) => segment.type === "bus" || segment.kind === "버스")
      || (candidate?.segments || []).find((segment) => segment.type === "subway" || segment.kind === "지하철");
    const label = firstRide?.label || candidate?.firstTransitLabel || "이동";
    const target = stops?.[1] || candidate?.boardingStopName || "다음 정류장";
    const eta = candidate?.firstWaitMin != null
      ? `${candidate.firstWaitMin}분 후 도착`
      : `${Math.max(1, Math.min(9, Math.round(Number(firstRide?.minutes || candidate?.totalTime || 3) / 3)))}분 후 도착`;
    return {
      text: `${label}이 ${target} 접근 중`,
      eta
    };
  }

  function renderFastFlow(candidate, options = {}) {
    const compact = Boolean(options.compact);
    const raw = (candidate?.segments || []).filter(Boolean).map((seg) => ({
      type: inferSegmentType(seg),
      label: seg.label || seg.kind || "",
      minutes: Math.max(0.5, segmentMinutes(seg))
    }));
    const segments = raw.length ? raw : [{ type: "walk", label: "대기", minutes: 1 }];
    const total = segments.reduce((sum, seg) => sum + seg.minutes, 0) || 1;
    const html = segments.map((seg) => {
      const pct = Math.max(7, (seg.minutes / total) * 100);
      const label = pct > 18 ? escapeHtml(seg.label) : "";
      return `<span class="fast-flow-seg ${escapeHtml(seg.type)}" style="width:${pct}%;">${label}</span>`;
    }).join("");
    const stops = getFastFlowStops(candidate);
    const status = getFastFlowStatus(candidate, stops);
    const nodes = segments.slice(0, 5).map((seg) => `
      <div class="fast-flow-node">
        <span class="fast-flow-dot ${escapeHtml(seg.type)}"></span>
        <span class="fast-flow-label">${escapeHtml(seg.label || seg.type)}</span>
        <span class="fast-flow-minutes">${escapeHtml(Math.round(seg.minutes))}분</span>
      </div>
    `).join("");
    return `
      <div class="fast-flow ${compact ? "compact" : ""}">
        <div class="fast-flow-head">
          <div>
            <div class="kicker">realtime route</div>
            <strong>실시간 이동 흐름</strong>
          </div>
          <div class="fast-flow-live">LIVE</div>
        </div>
        <div class="fast-flow-timeline">
          <div class="fast-flow-nodes">${nodes}</div>
          <div class="fast-flow-glow"></div>
          <div class="fast-flow-vehicle">BUS</div>
        </div>
        <div class="fast-flow-mini-track">
          <div class="fast-flow-inner">${html}</div>
        </div>
        <div class="fast-flow-status">
          <div>
            <div class="label">현재 상태</div>
            <strong>${escapeHtml(status.text)}</strong>
          </div>
          <div class="fast-flow-eta">${escapeHtml(status.eta)}</div>
        </div>
      </div>
    `;
  }

  function renderFastCandidate(candidate, index, isRecommended) {
    const tone = getCandidateTone(candidate, index, isRecommended);
    const score = minuteNumber(candidate.journeyMinutes || candidate.scoreDisplay || candidate.totalTime);
    return `
      <button type="button" class="fast-candidate ${isRecommended ? "recommended" : ""}">
        <div class="fast-candidate-top">
          <div>
            <span class="fast-candidate-tag" style="color:${tone.accent}; background:${tone.bg};">${escapeHtml(tone.label)}</span>
            <div class="fast-candidate-title">${escapeHtml(getCandidateTitle(candidate))}</div>
            <div class="fast-candidate-meta">환승 ${escapeHtml(candidate.transferCount ?? 0)}회 · 도보 ${escapeHtml(minuteNumber(candidate.walkTime || candidate.walkTimeText))}분</div>
          </div>
          <div class="fast-candidate-score">
            <strong style="color:${tone.accent};">${escapeHtml(score || candidate.scoreDisplay || "--")}</strong>
            <span>분</span>
          </div>
        </div>
        ${renderFastFlow(candidate, { compact: true })}
      </button>
    `;
  }

  function tagRoutePicks(result) {
    if (!result?.candidates?.length || !result.picks) return result;
    const fastestId = result.picks.fastestId;
    const fewestId = result.picks.fewestTransfersId;
    return {
      ...result,
      candidates: result.candidates.map((candidate) => {
        let pickKind = candidate.pickKind || null;
        if (candidate.id === fastestId && candidate.id === fewestId) pickKind = "fastest_and_fewest";
        else if (candidate.id === fastestId) pickKind = "fastest";
        else if (candidate.id === fewestId) pickKind = "fewest";
        return pickKind ? { ...candidate, pickKind } : candidate;
      }),
      recommendation: result.recommendation
        ? {
          ...result.recommendation,
          pickKind: fastestId === fewestId ? "fastest_and_fewest" : "fastest"
        }
        : result.recommendation
    };
  }

  function renderCandidate(candidate, isRecommended) {
    return `
      <div class="candidate-card ${isRecommended ? "recommended" : ""}">
        <div class="candidate-card-top">
          <div>
            <strong>${escapeHtml(candidate.firstTransitLabel || "도보 중심")}</strong>
            <div class="meta">
              ${escapeHtml(candidate.note)}
            </div>
            ${candidate.transferRiskText ? `<div class="meta" style="margin-top:4px;">주의: ${escapeHtml(candidate.transferRiskText)}</div>` : ""}
          </div>
          <div class="candidate-score">${escapeHtml(candidate.scoreDisplay)}</div>
        </div>
        ${renderJourneyFlow(candidate.segments, { compact: true })}
      </div>
    `;
  }

  function candidateRiskLabel(candidate) {
    if (candidate.transferRiskLevel === "high") return "놓칠 위험 큼";
    if (candidate.transferRiskLevel === "medium") return "환승 주의";
    return null;
  }

  function renderCompareCard(candidate, isRecommended) {
    const riskLabel = candidateRiskLabel(candidate);
    const cardClass = [
      "compare-card",
      isRecommended ? "recommended" : "",
      candidate.transferRiskLevel === "high" ? "risk-high" : "",
      candidate.transferRiskLevel === "medium" ? "risk-medium" : ""
    ].filter(Boolean).join(" ");

    return `
      <div class="${cardClass}">
        <div class="compare-flags">
          ${isRecommended ? '<span class="compare-flag recommended">추천</span>' : ""}
          ${riskLabel ? `<span class="compare-flag ${escapeHtml(candidate.transferRiskLevel)}">${escapeHtml(riskLabel)}</span>` : ""}
        </div>
        <div class="compare-card-top">
          <div>
            <strong>${escapeHtml(candidate.firstTransitLabel || "도보 중심")}</strong>
            <div class="compare-subtitle">${escapeHtml(candidate.boardingApproachText || candidate.note)}</div>
          </div>
          <div class="compare-score">${escapeHtml(candidate.scoreDisplay)}</div>
        </div>
        <div class="compare-metrics">
          <div class="compare-metric">
            <span class="label">총 이동</span>
            <span class="value">${escapeHtml(candidate.totalTimeText)}</span>
          </div>
          <div class="compare-metric">
            <span class="label">첫 대기</span>
            <span class="value">${escapeHtml(candidate.firstWaitText)}</span>
          </div>
          <div class="compare-metric">
            <span class="label">환승</span>
            <span class="value">${escapeHtml(candidate.transferCountText)}</span>
          </div>
        </div>
        ${renderJourneyFlow(candidate.segments, { compact: true })}
        ${candidate.busApproachPreview ? renderBusApproachPreview(candidate.busApproachPreview) : ""}
        ${candidate.transferRiskText ? `<div class="compare-risk">${escapeHtml(candidate.transferRiskText)}</div>` : ""}
      </div>
    `;
  }

  function getJourneyStepLabel(segment) {
    if (!segment) return "";
    if (segment.kind === "도보") return segment.time || "도보";
    const head = String(segment.text || "").split(" · ")[0] || segment.kind || "";
    return `${head} ${segment.time || ""}`.trim();
  }

  function renderJourneyFlow(segments, options = {}) {
    const compact = Boolean(options.compact);
    const journeySegments = (segments || []).filter((segment) => {
      if (!segment) return false;
      if (segment.kind === "도보") {
        return Number.parseInt(segment.time, 10) > 0;
      }
      return true;
    });

    if (!journeySegments.length) return "";

    const items = ['<span class="journey-node start">출발</span>'];
    journeySegments.forEach((segment) => {
      const typeClass = segment.kind === "버스" ? "bus" : segment.kind === "지하철" ? "subway" : "walk";
      items.push('<span class="journey-link">→</span>');
      items.push(`<span class="journey-node ${typeClass}">${escapeHtml(getJourneyStepLabel(segment))}</span>`);
    });
    items.push('<span class="journey-link">→</span>');
    items.push('<span class="journey-node end">도착</span>');

    return `<div class="journey-flow${compact ? " compact" : ""}">${items.join("")}</div>`;
  }

  function renderSegments(segments) {
    if (!segments?.length) {
      return '<div class="empty-state"><strong>상세 구간이 없습니다</strong>다음 갱신 때 다시 확인해주세요.</div>';
    }
    return '<div class="segment-list">' + segments.map((segment) => `
      <div class="segment-item">
        <div class="name">
          <span class="kind">${escapeHtml(segment.kind)}</span>
          <div class="text">${escapeHtml(segment.text)}</div>
        </div>
        <div class="time">${escapeHtml(segment.time)}</div>
      </div>
    `).join("") + "</div>";
  }

  function formatClock(iso) {
    if (!iso) return "";
    const d = new Date(iso);
    if (Number.isNaN(d.getTime())) return "";
    const hh = String(d.getHours()).padStart(2, "0");
    const mm = String(d.getMinutes()).padStart(2, "0");
    return `${hh}:${mm}`;
  }

  function formatCountdown(iso, nowMs = Date.now()) {
    if (!iso) return { text: "", state: "neutral", diffSec: null };
    const target = new Date(iso).getTime();
    if (Number.isNaN(target)) return { text: "", state: "neutral", diffSec: null };
    const diffSec = Math.round((target - nowMs) / 1000);
    if (diffSec < -60) return { text: `${Math.abs(Math.round(diffSec / 60))}분 전 통과`, state: "missed", diffSec };
    if (diffSec < 0) return { text: "방금 통과", state: "missed", diffSec };
    if (diffSec < 60) return { text: `${diffSec}초 후`, state: "urgent", diffSec };
    if (diffSec < 300) return { text: `${Math.floor(diffSec / 60)}분 ${diffSec % 60}초 후`, state: "urgent", diffSec };
    return { text: `${Math.round(diffSec / 60)}분 후`, state: "neutral", diffSec };
  }


  function buildMetricSummary(recommendation) {
    if (!recommendation) return "";
    const total = Number(recommendation.journeyMinutes || recommendation.totalTime || 0);
    const wait = recommendation.firstWaitSource !== "not_applicable" ? recommendation.firstWaitText : null;
    const walk = Number(recommendation.walkMinutes || recommendation.initialWalkTime || 0);
    const transferCount = Number(recommendation.transferCount || 0);
    const pieces = [`총 ${total}분`];
    pieces.push(wait ? `대기 ${wait}` : "대기 정보 없음");
    pieces.push(`도보 ${walk}분`);
    pieces.push(transferCount > 0 ? `환승 ${transferCount}회` : "환승 없음");
    return pieces.join(" · ");
  }

  function renderBoardingAction(recommendation) {
    if (!recommendation) return "";
    const approach = recommendation.boardingApproachText || (recommendation.boardingStopName ? `${recommendation.boardingStopName} 정류장으로 이동` : "탑승 정류장으로 이동");
    const walk = recommendation.initialWalkTime > 0 ? `도보 ${recommendation.initialWalkTime}분` : "바로 탑승";
    return `
      <div class="boarding-card">
        <div class="boarding-title">먼저 할 일</div>
        <div class="boarding-main">${escapeHtml(walk)} → ${escapeHtml(approach)}</div>
        <span class="boarding-pill">${escapeHtml(recommendation.firstTransitLabel || "이동")}</span>
      </div>
    `;
  }

  function renderCompactDetails(recommendation) {
    if (!recommendation?.segments?.length) return "";
    return `
      <details class="compact-details">
        <summary>상세 경로 보기</summary>
        ${renderSegments(recommendation.segments)}
      </details>
    `;
  }

  function renderArrivalHeadline(candidate) {
    if (!candidate?.arriveAt) return "";
    const departLabel = candidate.departAt ? formatClock(candidate.departAt) : formatClock(new Date().toISOString());
    const arriveLabel = formatClock(candidate.arriveAt);
    const countdown = formatCountdown(candidate.arriveAt);
    const journey = candidate.journeyMinutes != null ? `${candidate.journeyMinutes}분 소요` : "";
    const fb = candidate.fallbackPlan;
    const fbAttrs = fb?.catchDeadline && fb?.arriveAt
      ? ` data-fallback-arrive-at="${escapeHtml(fb.arriveAt)}" data-fallback-deadline="${escapeHtml(fb.catchDeadline)}" data-fallback-vehicle-at="${escapeHtml(fb.nextVehicleArriveAt || "")}"`
      : "";
    return `
      <div class="arrival-headline" data-arrive-at="${escapeHtml(candidate.arriveAt)}"${fbAttrs}>
        <div class="row-main">
          <span class="depart"><span class="promoted-tag">놓침 후 대안</span>지금 ${escapeHtml(departLabel)}</span>
          <span class="arrow"></span>
          <span class="arrive" data-arrive-label>${escapeHtml(arriveLabel)} 도착</span>
        </div>
        <div class="row-sub">
          <span data-journey-note>${escapeHtml(journey)}</span>
          <span class="countdown ${escapeHtml(countdown.state)}" data-countdown-arrive>${escapeHtml(countdown.text)}</span>
        </div>
      </div>
    `;
  }

  function inferSegmentType(seg) {
    if (!seg) return "bus";
    if (seg.type === "walk" || seg.type === "bus" || seg.type === "subway" || seg.type === "wait") return seg.type;
    if (seg.kind === "도보") return "walk";
    if (seg.kind === "지하철") return "subway";
    if (seg.kind === "버스") return "bus";
    return "bus";
  }

  function segmentMinutes(seg) {
    if (!seg) return 0;
    const raw = seg.minutes != null ? seg.minutes : (typeof seg.time === "string" ? parseInt(seg.time, 10) : seg.time);
    const n = Number(raw);
    return Number.isFinite(n) ? Math.max(0, n) : 0;
  }

  function renderJourneyLine(candidate, options = {}) {
    const raw = (candidate?.segments || []).filter(Boolean).map((seg) => ({
      ...seg,
      type: inferSegmentType(seg),
      minutes: segmentMinutes(seg)
    }));
    let segments = raw.filter((seg) => seg.minutes > 0 || seg.type !== "walk");
    if (!segments.length) segments = raw;

    const extraFirstWait = Math.max(0, Number(options.extraFirstWait) || 0);
    const firstWait = Math.max(0, Number(candidate?.firstWaitMin) || 0) + extraFirstWait;
    const transferWait = Math.max(0, Number(candidate?.transferWaitMin) || 0);
    const transitCount = segments.filter((seg) => seg.type !== "walk").length;
    const perTransfer = transitCount > 1 ? transferWait / (transitCount - 1) : 0;

    if (!segments.length) {
      const totalMin = Number(candidate?.journeyMinutes || candidate?.totalTime || 0) + firstWait;
      if (totalMin <= 0) return "";
      const mode = candidate?.mode === "subway" ? "subway" : candidate?.mode === "walk" ? "walk" : "bus";
      const label = candidate?.firstTransitLabel
        ? `${candidate.firstTransitLabel} ${Math.round(totalMin)}분`
        : `${Math.round(totalMin)}분`;
      return `
        <div class="alt-line">
          <div class="journey-line">
            <span class="seg ${mode}" style="width:100%;" title="${escapeHtml(label)}">${escapeHtml(label)}</span>
          </div>
        </div>
      `;
    }

    const pieces = [];
    if (firstWait > 0) {
      pieces.push({ type: "wait", minutes: firstWait, label: "대기", text: `첫 탑승 대기 ${Math.round(firstWait)}분` });
    }
    let transitSeenIdx = 0;
    segments.forEach((seg) => {
      if (seg.type !== "walk") {
        if (transitSeenIdx > 0 && perTransfer > 0) {
          pieces.push({ type: "wait", minutes: perTransfer, label: "환승대기", text: `환승 대기 ${Math.round(perTransfer)}분 (추정)` });
        }
        transitSeenIdx += 1;
      }
      pieces.push(seg);
    });

    const total = pieces.reduce((sum, p) => sum + Math.max(0.5, Number(p.minutes) || 0), 0);
    if (total <= 0) return "";

    const html = pieces.map((p) => {
      const minutes = Math.max(0.5, Number(p.minutes) || 0);
      const pct = (minutes / total) * 100;
      const type = p.type === "walk" ? "walk"
        : p.type === "subway" ? "subway"
        : p.type === "wait" ? "wait"
        : "bus";
      let inlineLabel = "";
      if (p.type === "wait") {
        if (pct >= 10) inlineLabel = escapeHtml(`${p.label} ${Math.round(minutes)}분`);
      } else if (p.type === "walk") {
        if (pct >= 16) inlineLabel = escapeHtml(`도보 ${Math.round(minutes)}분`);
      } else {
        if (pct >= 12) inlineLabel = escapeHtml(`${p.label || p.kind} 탑승 ${Math.round(minutes)}분`);
      }
      return `<span class="seg ${type}" style="width:${pct}%;" title="${escapeHtml(p.text || p.label || "")}">${inlineLabel}</span>`;
    }).join("");

    const firstTransit = segments.find((seg) => seg.type !== "walk");
    const lastTransit = [...segments].reverse().find((seg) => seg.type !== "walk");
    const boardName = firstTransit?.start || "";
    const alightName = lastTransit?.end || "";
    const caption = (boardName || alightName) ? `
      <div class="journey-line-caption">
        <span class="board">${escapeHtml(boardName ? `${boardName} 탑승` : "")}</span>
        <span class="alight">${escapeHtml(alightName ? `${alightName} 하차` : "")}</span>
      </div>
    ` : "";

    return `
      <div class="alt-line">
        <div class="journey-line">${html}</div>
        ${caption}
      </div>
    `;
  }

  function estimateArriveMs(candidate, nowMs) {
    if (candidate?.arriveAt) {
      const ms = new Date(candidate.arriveAt).getTime();
      if (Number.isFinite(ms)) return ms;
    }
    const journey = Number(candidate?.journeyMinutes || candidate?.totalTime || 0);
    if (journey > 0) return nowMs + journey * 60 * 1000;
    return null;
  }

  function renderAlternates(result) {
    if (!result?.candidates?.length) return "";
    const recommended = result.recommendation;
    const nowMs = Date.now();
    const recommendedArriveMs = estimateArriveMs(recommended, nowMs);
    const alts = (result.candidates || []).filter((c) => c.id !== result.recommendedId);
    const rows = [];

    if (recommended?.fallbackPlan?.arriveAt) {
      const fb = recommended.fallbackPlan;
      const fbMs = new Date(fb.arriveAt).getTime();
      const delta = recommendedArriveMs ? Math.max(0, Math.round((fbMs - recommendedArriveMs) / 60000)) : fb.extraWaitMin;
      rows.push(`
        <div class="alt-row fallback" data-fallback-row data-fallback-deadline="${escapeHtml(fb.catchDeadline || "")}">
          <span class="alt-tag">놓치면</span>
          <div>
            <div class="alt-title">같은 ${escapeHtml(recommended.firstTransitLabel || "노선")} 다음 차</div>
            <span class="alt-sub">다음 차 정류장 도착 ${escapeHtml(formatClock(fb.nextVehicleArriveAt))}</span>
          </div>
          <span class="alt-arrive">${escapeHtml(formatClock(fb.arriveAt))} 도착</span>
          <span class="alt-delta">+${delta}분</span>
          ${renderJourneyLine(recommended, { extraFirstWait: fb.extraWaitMin })}
        </div>
      `);
    }

    alts.slice(0, 3).forEach((c) => {
      const arriveMs = estimateArriveMs(c, nowMs);
      if (arriveMs == null) return;
      const deltaMin = recommendedArriveMs
        ? Math.max(0, Math.round((arriveMs - recommendedArriveMs) / 60000))
        : null;
      const deltaText = deltaMin != null ? (deltaMin === 0 ? "동일" : `+${deltaMin}분`) : "";
      const transit = c.firstTransitLabel || "도보";
      const sub = c.boardingApproachText || c.note || "";
      const arriveLabel = c.arriveAt ? formatClock(c.arriveAt) : formatClock(new Date(arriveMs).toISOString());
      rows.push(`
        <div class="alt-row">
          <span class="alt-tag">차선</span>
          <div>
            <div class="alt-title">${escapeHtml(transit)} · 환승 ${escapeHtml(c.transferCountText || "-")}</div>
            <span class="alt-sub">${escapeHtml(sub)}</span>
          </div>
          <span class="alt-arrive">${escapeHtml(arriveLabel)} 도착</span>
          <span class="alt-delta">${escapeHtml(deltaText)}</span>
          ${renderJourneyLine(c)}
        </div>
      `);
    });

    if (!rows.length) return "";
    return `
      <div class="alt-board">
        <div class="alt-head">놓쳤을 때 · 다른 루트</div>
        <div class="alt-list">${rows.join("")}</div>
      </div>
    `;
  }

  function renderBusApproachPreview(preview) {
    if (!preview?.stops?.length) return "";

    const vehicles = preview.vehicles || [];
    const firstCatchableIdx = vehicles.findIndex((vehicle) => vehicle.catchable !== false);

    let laterCatchableCount = 0;
    const classified = vehicles.map((vehicle, index) => {
      if (vehicle.catchable === false) {
        return { vehicle, index, posClass: "uncatchable", label: "놓침" };
      }
      if (index === firstCatchableIdx) {
        return { vehicle, index, posClass: "next", label: "다음" };
      }
      laterCatchableCount += 1;
      const label = laterCatchableCount === 1 ? "다다음" : `다음+${laterCatchableCount}`;
      return { vehicle, index, posClass: "after", label };
    });

    const buses = classified.map(({ vehicle, index, posClass, label }) => {
      const bits = [`<strong>${escapeHtml(label)}</strong>`];
      if (vehicle.etaMinutes != null) {
        const etaText = vehicle.catchable === false
          ? `${vehicle.passedAgoMinutes ?? vehicle.etaMinutes}분 전 통과`
          : `${vehicle.etaMinutes}분 후`;
        const etaAttr = vehicle.etaAt ? ` data-countdown-eta="${escapeHtml(vehicle.etaAt)}"` : "";
        bits.push(`<span${etaAttr}>${escapeHtml(etaText)}</span>`);
      }
      bits.push(`<span>${escapeHtml(`${vehicle.remainingStops}정거장 ${vehicle.catchable === false ? "뒤" : "전"}`)}</span>`);
      return `
        <div class="bus-line-bus ${posClass}" data-slot="${index}" style="left:${vehicle.progressPercent}%;">
          ${bits.join("")}
        </div>
      `;
    }).join("");

    const busMarkers = classified.map(({ vehicle, posClass }) => (
      `<div class="bus-line-marker ${posClass}" style="left:${vehicle.progressPercent}%;"></div>`
    )).join("");

    const stops = preview.stops.map((stop) => `
      <div class="bus-line-stop ${stop.isBoarding ? "boarding" : ""}${stop.isAlighting ? " alighting" : ""}">
        <span class="bus-line-dot"></span>
        <div class="bus-line-stop-name">${escapeHtml(stop.name)}</div>
      </div>
    `).join("");

    const vehicleSummary = classified.map(({ vehicle, label }) => {
      const eta = vehicle.etaMinutes != null
        ? (vehicle.catchable === false ? `${vehicle.passedAgoMinutes ?? vehicle.etaMinutes}분 전 통과` : `${vehicle.etaMinutes}분 후`)
        : `${vehicle.remainingStops}정거장 ${vehicle.catchable === false ? "뒤" : "전"}`;
      return `${label} ${eta}`;
    }).join(" · ");

    return `
      <div class="bus-line-board">
        <div class="bus-line-head">
          <strong>${escapeHtml(preview.routeNo)} 접근 노선</strong>
          <span>${escapeHtml(vehicleSummary || "차량 위치 정보 없음")}</span>
        </div>
        <div class="bus-line-track">
          ${buses}
          ${busMarkers}
          ${stops}
        </div>
      </div>
    `;
  }

  function renderEmptyCard() {
    return `
      <div class="empty-state">
        <strong>저장된 루트가 없습니다</strong>
        자주 가는 경로를 저장해두고, 각 루트마다 추천 기준과 허용 교통수단을 따로 정해보세요.
      </div>
    `;
  }

  function renderRouteCard(route, commuteCtx) {
    const ctx = commuteCtx === undefined ? getCommuteContext() : commuteCtx;
    const pinned = isCommutePinned(route, ctx);
    const loading = state.loadingRouteIds.has(route.id);
    const expanded = state.expandedRouteIds.has(route.id);
    const result = route.lastResult;
    const recommendation = result?.recommendation || null;
    const fetchedAt = result?.fetchedAt || null;
    const compareCandidates = result?.candidates || [];
    const primary = recommendation || null;
    const totalMin = primary ? minuteNumber(primary.journeyMinutes || primary.scoreDisplay || primary.totalTime) : "--";
    const transfer = primary ? Number(primary.transferCount || 0) : "--";
    const walk = primary ? minuteNumber(primary.walkTime || primary.walkTimeText) : "--";
    const note = primary
      ? (primary.note || describeRecommendation(route, primary))
      : "출발지와 도착지를 저장한 뒤 실시간으로 다시 계산하세요.";
    const detailsHtml = result ? `
      <div class="detail-block">
        <h3>추천 상세</h3>
        ${renderSegments(recommendation?.segments)}
      </div>
      <div class="detail-block">
        <h3>후보 메모</h3>
        <div class="candidate-list">
          ${compareCandidates.map((candidate) => renderCandidate(candidate, candidate.id === result.recommendedId)).join("")}
        </div>
      </div>
    ` : `
      <div class="detail-block">
        <h3>다음 단계</h3>
        <div class="empty-state">
          <strong>루트는 저장되었지만 추천 데이터는 아직 없습니다</strong>
          추천 갱신 버튼을 누르면 현재 기준으로 후보를 하나 골라 저장합니다.
        </div>
      </div>
    `;

    return `
      <article class="route-card fast-card ${loading ? "loading" : ""} ${expanded ? "expanded" : ""} ${pinned ? "commute-pinned" : ""}">
        <div class="route-main">
          <section class="fast-trip-panel">
            <div class="fast-trip-head">
              <div class="fast-trip-title">
                ${iconSvg("map", 16)}
                <strong>${escapeHtml(route.from?.name || "출발지")} → ${escapeHtml(route.to?.name || "도착지")}</strong>
              </div>
              <div class="fast-trip-menu">
                <button class="fast-icon-btn" data-action="edit" data-id="${escapeHtml(route.id)}" aria-label="편집">${iconSvg("edit", 15)}</button>
                <button class="fast-icon-btn" data-action="delete" data-id="${escapeHtml(route.id)}" aria-label="삭제">${iconSvg("trash", 15)}</button>
              </div>
            </div>
            <div class="fast-metrics">
              <div class="fast-metric arrive">
                <strong>${escapeHtml(totalMin)}</strong>
                <span>도착 · 분</span>
              </div>
              <div class="fast-metric transfer">
                <strong>${escapeHtml(transfer)}</strong>
                <span>환승 · 회</span>
              </div>
              <div class="fast-metric walk">
                <strong>${escapeHtml(walk)}</strong>
                <span>도보 · 분</span>
              </div>
            </div>
            <div class="fast-next-action">
              <div class="label">먼저 할 일</div>
              <div class="fast-next-row">
                <strong>${escapeHtml(getFirstAction(primary))}</strong>
                <span>→</span>
              </div>
            </div>
            ${primary ? renderFastFlow(primary) : ""}
            <div class="fast-note">${iconSvg("clock", 15)} <span>${escapeHtml(note)} · ${escapeHtml(relativeTime(fetchedAt))}</span></div>
          </section>
          <section class="fast-candidates">
            ${compareCandidates.length ? compareCandidates.slice(0, 4).map((candidate, index) => renderFastCandidate(candidate, index, candidate.id === result?.recommendedId)).join("") : ""}
          </section>
          <section class="fast-detail">
            <button class="fast-detail-toggle" data-action="toggle" data-id="${escapeHtml(route.id)}">
              <div>
                <strong>상세 경로</strong>
                <span>필요할 때만 펼쳐서 확인</span>
              </div>
              ${iconSvg("chevron", 20)}
            </button>
            <div class="route-details">${detailsHtml}</div>
          </section>
          <button class="fast-refresh" data-action="refresh" data-id="${escapeHtml(route.id)}">${iconSvg("refresh", 16)} ${loading ? "계산 중..." : "실시간으로 다시 계산"}</button>
        </div>
      </article>
    `;
  }

  function getCommuteContext(date = new Date()) {
    const hour = date.getHours();
    if (hour >= 5 && hour < 12) return { phase: "morning", keyword: "출근", badge: "출근 시간" };
    if (hour >= 16 && hour < 23) return { phase: "evening", keyword: "퇴근", badge: "퇴근 시간" };
    return null;
  }

  function isCommutePinned(route, ctx) {
    if (!ctx) return false;
    return (route.label || "").includes(ctx.keyword);
  }

  function getOrderedRoutes() {
    const ctx = getCommuteContext();
    if (!ctx) return state.routes;
    const pinned = [];
    const rest = [];
    for (const r of state.routes) {
      if (isCommutePinned(r, ctx)) pinned.push(r);
      else rest.push(r);
    }
    return pinned.length ? [...pinned, ...rest] : state.routes;
  }

  function renderRoutes() {
    const list = document.getElementById("route-list");
    document.getElementById("route-count").textContent = state.routes.length + "개 루트";
    if (state.routes.length === 0) {
      list.innerHTML = renderEmptyCard();
      state.lastCommutePhase = getCommuteContext()?.phase || null;
      return;
    }
    const ctx = getCommuteContext();
    list.innerHTML = getOrderedRoutes().map((r) => renderRouteCard(r, ctx)).join("");
    state.lastCommutePhase = ctx?.phase || null;
  }

  function showToast(message) {
    const toast = document.getElementById("toast");
    toast.textContent = message;
    toast.classList.add("show");
    clearTimeout(showToast._timer);
    showToast._timer = setTimeout(() => toast.classList.remove("show"), 2200);
  }

  function updateMapPickButtons() {
    ["from", "to"].forEach((selectionKey) => {
      const button = document.getElementById(`route-${selectionKey}-map-pick-btn`);
      if (!button) return;
      const active = state.mapPickerTarget === selectionKey;
      button.classList.toggle("active", active);
      button.textContent = active ? "지도 열림" : "지도에서 찍기";
    });
  }

  async function reverseGeocode(lat, lng) {
    try {
      const payload = await fetchJson(`/api/reverse-geocode?lat=${encodeURIComponent(lat)}&lon=${encodeURIComponent(lng)}`);
      return payload.location || null;
    } catch {
      return null;
    }
  }

  async function handleMapPick(selectionKey, lat, lng) {
    const location = await reverseGeocode(lat, lng);
    const fallbackName = selectionKey === "from" ? "지도 선택 출발지" : "지도 선택 도착지";
    const picked = {
      name: location?.name || fallbackName,
      detail: location?.detail || `${lat.toFixed(5)}, ${lng.toFixed(5)}`,
      kind: location?.kind || "지도 선택",
      x: lng,
      y: lat,
      stationID: null
    };

    state.autocompleteSelection[selectionKey] = picked;
    const input = document.getElementById(`route-${selectionKey}-input`);
    if (input) input.value = picked.name;
    closeMapPicker();
    updateMapPickButtons();
    updateLocationPreview(selectionKey, picked);
    showToast(`${selectionKey === "from" ? "출발지" : "도착지"}를 지도에서 선택했습니다`);
  }

  function openMapPicker(selectionKey) {
    state.mapPickerTarget = selectionKey;
    updateMapPickButtons();
    document.getElementById("map-picker-title").textContent = selectionKey === "from" ? "출발지를 지도에서 선택" : "도착지를 지도에서 선택";
    document.getElementById("map-picker-subtitle").textContent = "큰 지도에서 정확한 위치를 누르면 즉시 저장됩니다.";
    document.getElementById("map-picker-status").textContent = "핀을 찍을 지점을 찾은 뒤 지도를 한 번 눌러 선택하세요.";
    document.getElementById("map-picker-overlay").classList.add("active");
    renderMapPicker();
  }

  function closeMapPicker() {
    const existing = state.previewMaps.mapPicker;
    if (existing?.map) {
      existing.map.remove();
    }
    delete state.previewMaps.mapPicker;
    state.mapPickerTarget = null;
    document.getElementById("map-picker-overlay").classList.remove("active");
    updateMapPickButtons();
  }

  function renderMapPicker() {
    const selectionKey = state.mapPickerTarget;
    const mapEl = document.getElementById("map-picker-map");
    if (!selectionKey || !mapEl) return;

    const location = state.autocompleteSelection[selectionKey];
    const lat = location?.y != null ? Number(location.y) : 37.5665;
    const lng = location?.x != null ? Number(location.x) : 126.9780;
    const zoom = location?.y != null && location?.x != null ? 16 : 13;

    requestAnimationFrame(() => {
      let preview = state.previewMaps.mapPicker;
      if (!preview) {
        mapEl.innerHTML = "";
        if (typeof L === "undefined") {
          mapEl.textContent = "지도를 불러오지 못했습니다.";
          return;
        }
        const map = L.map("map-picker-map", {
          zoomControl: true,
          attributionControl: false,
          dragging: true,
          scrollWheelZoom: true,
          doubleClickZoom: true,
          touchZoom: true,
          keyboard: false
        });
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          maxZoom: 19
        }).addTo(map);
        let marker = null;
        if (location?.x != null && location?.y != null) {
          marker = L.marker([lat, lng]).addTo(map);
        }
        map.on("click", (event) => {
          if (!state.mapPickerTarget) return;
          handleMapPick(state.mapPickerTarget, event.latlng.lat, event.latlng.lng);
        });
        preview = { map, marker };
        state.previewMaps.mapPicker = preview;
      } else {
        if (location?.x != null && location?.y != null) {
          if (!preview.marker) {
            preview.marker = L.marker([lat, lng]).addTo(preview.map);
          } else {
            preview.marker.setLatLng([lat, lng]);
          }
        }
      }

      preview.map.setView([lat, lng], zoom);
      preview.map.invalidateSize();
    });
  }

  function configureBrowserKey() {
    const current = getBrowserOdsayKey();
    const input = window.prompt(
      "서버 호출이 막힐 때 브라우저에서 직접 ODsay를 호출할 키를 입력하세요. 비우고 저장하면 삭제됩니다.",
      current
    );
    if (input === null) return;
    setBrowserOdsayKey(input);
    updateOdsayKeyVisibility();
    showToast(input.trim() ? "브라우저 fallback용 ODsay 키를 저장했습니다" : "저장된 ODsay 키를 삭제했습니다");
  }

  function updateOdsayKeyVisibility() {
    const btn = document.getElementById("key-settings-btn");
    if (btn) btn.style.display = getBrowserOdsayKey() ? "none" : "";
  }

  async function fetchJson(url) {
    const response = await fetch(url, { cache: "no-store" });
    const payload = await response.json().catch(() => ({}));
    if (!response.ok) {
      throw new Error(payload.error || "요청에 실패했습니다");
    }
    return payload;
  }

  async function fetchJsonDirect(url) {
    const response = await fetch(url, { cache: "no-store" });
    const payload = await response.json().catch(() => ({}));
    if (!response.ok || payload?.error) {
      throw new Error(payload?.error?.msg || payload?.error?.message || payload?.error?.code || payload.error || "ODsay 직접 호출 실패");
    }
    return payload;
  }

  async function fetchOdsayDirect(endpoint, params) {
    const key = getBrowserOdsayKey();
    if (!key) {
      throw new Error("서버 호출이 실패했고 브라우저 fallback용 ODsay 키도 저장되지 않았습니다");
    }
    const query = new URLSearchParams({
      apiKey: key,
      lang: "0",
      output: "json",
      ...params
    });
    return fetchJsonDirect(`${ODSAY_API_ROOT}/${endpoint}?${query.toString()}`);
  }

  async function searchStations(query) {
    const normalized = query.trim();
    if (normalized.length < AUTOCOMPLETE_MIN_LENGTH) {
      return {
        stations: [],
        warnings: []
      };
    }
    try {
      const payload = await fetchJson("/api/stations?q=" + encodeURIComponent(normalized));
      return {
        stations: payload.stations || [],
        warnings: payload.warnings || []
      };
    } catch (error) {
      const fallbackPayload = await fetchOdsayDirect("searchStation", { stationName: normalized });
      const stations = (fallbackPayload.result?.station || []).slice(0, 8).map((station) => ({
        name: station.stationName || station.stationNameKor || "",
        x: station.x,
        y: station.y,
        stationID: station.stationID || null,
        kind: Number(station.stationType ?? 0) === 1 || Number(station.stationClass ?? 0) === 2 ? "지하철" : "버스",
        detail: [
          station.stationCityName,
          station.stationDistrictName,
          station.stationDongName
        ].filter(Boolean).join(" · ")
      })).filter((station) => station.name && station.x && station.y);
      return {
        stations,
        warnings: ["서버 경로가 막혀 브라우저 직접 호출로 검색했습니다", error.message]
      };
    }
  }

  async function resolveStationByName(name) {
    const normalized = name.trim();
    if (!normalized) throw new Error("역 이름이 비어 있습니다");
    const result = await searchStations(normalized);
    if (!result.stations.length) throw new Error('"' + normalized + '" 검색 결과가 없습니다');
    return result.stations[0];
  }

  function buildRoutePayload(baseRoute, resolvedFrom, resolvedTo) {
      return {
        ...baseRoute,
        from: resolvedFrom,
        to: resolvedTo
      };
  }

  function inferTransferCount(info) {
    const rides = Number(info.busTransitCount || 0) + Number(info.subwayTransitCount || 0);
    return Math.max(0, rides - 1);
  }

  function summarizeCandidateSteps(subPaths) {
    return (subPaths || []).filter((segment) =>
      segment.trafficType === 1 ||
      segment.trafficType === 2 ||
      (segment.trafficType === 3 && Number(segment.sectionTime || 0) > 0)
    ).map((segment) => {
      if (segment.trafficType === 3) {
        return { type: "walk", label: `도보 ${segment.sectionTime || 0}분` };
      }
      if (segment.trafficType === 2) {
        return { type: "bus", label: segment.lane?.[0]?.busNo || "버스" };
      }
      return { type: "subway", label: segment.lane?.[0]?.name || "지하철" };
    }).slice(0, 6);
  }

  function normalizeSegments(subPaths) {
    return (subPaths || []).map((segment) => {
      const minutes = Number(segment.sectionTime || 0);
      const start = segment.startName || "";
      const end = segment.endName || "";
      if (segment.trafficType === 3) {
        return {
          type: "walk",
          kind: "도보",
          text: `${start || "이동"} → ${end || "연결"}`,
          time: `${minutes}분`,
          minutes,
          start,
          end,
          label: `도보 ${minutes}분`
        };
      }
      if (segment.trafficType === 2) {
        const busNo = segment.lane?.[0]?.busNo || "버스";
        return {
          type: "bus",
          kind: "버스",
          text: `${busNo} · ${start} → ${end}`,
          time: `${minutes}분`,
          minutes,
          start,
          end,
          label: busNo
        };
      }
      const name = segment.lane?.[0]?.name || "지하철";
      return {
        type: "subway",
        kind: "지하철",
        text: `${name} · ${start} → ${end}`,
        time: `${minutes}분`,
        minutes,
        start,
        end,
        label: name
      };
    });
  }

  function getPathSectionTime(subPaths) {
    return (subPaths || []).reduce((sum, segment) => sum + Number(segment.sectionTime || 0), 0);
  }

  function getTransferTimingEstimate(subPaths, priority) {
    if (priority !== "best_eta") {
      return {
        transferWaitMin: 0,
        transferRiskLevel: "none",
        transferRiskText: null
      };
    }

    const transitIndices = (subPaths || []).map((segment, index) =>
      segment.trafficType === 1 || segment.trafficType === 2 ? index : -1
    ).filter((index) => index >= 0);

    if (transitIndices.length <= 1) {
      return {
        transferWaitMin: 0,
        transferRiskLevel: "none",
        transferRiskText: null
      };
    }

    let transferWaitMin = 0;
    let tightestSlackMin = null;

    transitIndices.slice(1).forEach((transitIndex) => {
      const segment = subPaths[transitIndex];
      const interval = Number(segment.intervalTime || 0);
      if (!(interval > 0)) return;

      const elapsedTravelMin = (subPaths || [])
        .slice(0, transitIndex)
        .reduce((sum, item) => sum + Number(item.sectionTime || 0), 0);

      const slackMin = interval - elapsedTravelMin;
      transferWaitMin += Math.max(0, slackMin);
      tightestSlackMin = tightestSlackMin == null ? slackMin : Math.min(tightestSlackMin, slackMin);
    });

    if (tightestSlackMin == null) {
      return {
        transferWaitMin,
        transferRiskLevel: "none",
        transferRiskText: null
      };
    }

    if (tightestSlackMin <= 1) {
      return {
        transferWaitMin,
        transferRiskLevel: "high",
        transferRiskText: tightestSlackMin < 0
          ? "환승 여유가 부족해 실제로는 다음 차를 놓칠 가능성이 큽니다."
          : `환승 여유가 ${tightestSlackMin}분 수준이라 지연 시 놓칠 가능성이 큽니다.`
      };
    }

    if (tightestSlackMin <= 4) {
      return {
        transferWaitMin,
        transferRiskLevel: "medium",
        transferRiskText: `환승 여유가 ${tightestSlackMin}분 정도라 조금만 지연돼도 놓칠 수 있습니다.`
      };
    }

    return {
      transferWaitMin,
      transferRiskLevel: "low",
      transferRiskText: null
    };
  }

  function getLastTransit(subPaths) {
    for (let index = (subPaths || []).length - 1; index >= 0; index -= 1) {
      const segment = subPaths[index];
      if (segment.trafficType === 1 || segment.trafficType === 2) {
        return segment;
      }
    }
    return null;
  }

  async function fetchRouteRecommendationDirect(route, from, to) {
    const pathTypes = ["0", "2", "1"];
    const responses = await Promise.allSettled(pathTypes.map((pathType) => fetchOdsayDirect("searchPubTransPathR", {
      SX: String(from.x),
      SY: String(from.y),
      EX: String(to.x),
      EY: String(to.y),
      SearchPathType: pathType,
      OPT: "0"
    })));
    const seen = new Set();
    const rawPaths = [];
    responses.forEach((response) => {
      if (response.status !== "fulfilled") return;
      (response.value.result?.path || []).forEach((path) => {
        const key = (path.subPath || []).map((segment) => [
          segment.trafficType,
          segment.startName || "",
          segment.endName || "",
          segment.lane?.[0]?.busID || segment.lane?.[0]?.busNo || segment.lane?.[0]?.name || "",
          segment.sectionTime || 0
        ].join(":")).join("|");
        if (seen.has(key)) return;
        seen.add(key);
        rawPaths.push(path);
      });
    });
    if (!rawPaths.length) {
      throw new Error("조건에 맞는 경로가 없습니다");
    }

    const candidates = [];
    for (let index = 0; index < rawPaths.length; index += 1) {
      const path = rawPaths[index];
      const info = path.info || {};
      const subPaths = path.subPath || [];
      const firstTransit = subPaths.find((segment) => segment.trafficType === 1 || segment.trafficType === 2) || null;
      const firstTransitStartName = firstTransit?.startName || firstTransit?.startStationName || null;
      const initialWalkTime = subPaths
        .slice(0, Math.max(0, subPaths.findIndex((segment) => segment.trafficType === 1 || segment.trafficType === 2)))
        .filter((segment) => segment.trafficType === 3)
