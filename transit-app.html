<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f2ece1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Transit">
<title>Transit</title>
<link rel="icon" href="data:,">
<link rel="manifest" href="/site.webmanifest">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --bg: #f4efe6;
    --bg-strong: #e8decf;
    --paper: rgba(255, 252, 247, 0.84);
    --paper-strong: #fffaf2;
    --line: rgba(71, 57, 29, 0.14);
    --text: #201810;
    --text-muted: #70634f;
    --accent: #1e7a5f;
    --accent-strong: #165c47;
    --accent-soft: rgba(30, 122, 95, 0.12);
    --orange: #c5631f;
    --orange-soft: rgba(197, 99, 31, 0.12);
    --blue: #1c5bb7;
    --blue-soft: rgba(28, 91, 183, 0.12);
    --danger: #b44343;
    --shadow: 0 22px 60px rgba(68, 51, 30, 0.12);
    --radius-xl: 28px;
    --radius-lg: 20px;
    --radius-md: 14px;
    --mono: "Space Mono", monospace;
  }

  * {
    box-sizing: border-box;
  }

  html, body {
    margin: 0;
    min-height: 100%;
    background: #f2ece1;
  }

  body {
    font-family: "IBM Plex Sans KR", sans-serif;
    color: var(--text);
    min-height: 100dvh;
    overscroll-behavior-y: none;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    background:
      radial-gradient(circle at top left, rgba(28, 91, 183, 0.1), transparent 28%),
      radial-gradient(circle at top right, rgba(30, 122, 95, 0.12), transparent 26%),
      linear-gradient(180deg, #f7f0e4 0%, #f2ece1 100%);
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image:
      linear-gradient(rgba(255, 255, 255, 0.15) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255, 255, 255, 0.15) 1px, transparent 1px);
    background-size: 28px 28px;
    mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.25), transparent 80%);
    opacity: 0.25;
  }

  .app-shell {
    width: min(860px, calc(100vw - 28px));
    margin: 0 auto;
    padding: calc(26px + env(safe-area-inset-top, 0px)) 0 calc(48px + env(safe-area-inset-bottom, 0px));
    position: relative;
    z-index: 1;
  }

  body.is-standalone .app-shell {
    padding-top: calc(18px + env(safe-area-inset-top, 0px));
  }

  .hero {
    background: linear-gradient(135deg, rgba(255, 250, 242, 0.92), rgba(255, 246, 232, 0.82));
    border: 1px solid rgba(71, 57, 29, 0.08);
    border-radius: 32px;
    padding: 26px 24px 22px;
    box-shadow: var(--shadow);
    backdrop-filter: blur(18px);
  }

  .hero-top {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    align-items: flex-start;
    margin-bottom: 22px;
  }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.7);
    color: var(--text-muted);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .hero h1 {
    margin: 12px 0 10px;
    font-size: clamp(30px, 6vw, 46px);
    line-height: 1.03;
    letter-spacing: -0.04em;
  }

  .hero p {
    margin: 0;
    max-width: 560px;
    color: var(--text-muted);
    line-height: 1.6;
    font-size: 14px;
  }

  .hero-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
  }

  .clock-badge {
    font-family: var(--mono);
    font-size: 13px;
    padding: 12px 14px;
    border-radius: 16px;
    background: rgba(32, 24, 16, 0.05);
    color: var(--accent-strong);
    border: 1px solid rgba(30, 122, 95, 0.12);
    min-width: 104px;
    text-align: center;
  }

  .hero-note {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 10px;
  }

  .hero-note-card {
    background: rgba(255, 255, 255, 0.7);
    border: 1px solid rgba(71, 57, 29, 0.08);
    border-radius: 18px;
    padding: 14px;
  }

  .hero-note-card strong {
    display: block;
    margin-bottom: 6px;
    font-size: 13px;
  }

  .hero-note-card span {
    color: var(--text-muted);
    font-size: 13px;
    line-height: 1.45;
  }

  .section {
    margin-top: 24px;
  }

  .section-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }

  .section-head h2 {
    margin: 0;
    font-size: 18px;
    letter-spacing: -0.03em;
  }

  .section-head span {
    color: var(--text-muted);
    font-size: 13px;
  }

  .route-list {
    display: grid;
    gap: 14px;
  }

  .route-card {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow);
    backdrop-filter: blur(14px);
    overflow: hidden;
  }

  .route-card.loading {
    opacity: 0.76;
  }

  .route-card.collapsed .route-main {
    padding-bottom: 22px;
  }

  .route-main {
    padding: 22px 22px 18px;
  }

  .route-main-top {
    display: flex;
    justify-content: space-between;
    gap: 14px;
    align-items: flex-start;
  }

  .route-names {
    min-width: 0;
  }

  .route-kicker {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 10px;
  }

  .pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
    line-height: 1;
    border: 1px solid transparent;
  }

  .pill.label {
    background: rgba(32, 24, 16, 0.06);
    color: var(--text);
  }

  .pill.priority-fastest,
  .pill.priority-best_eta {
    background: var(--accent-soft);
    color: var(--accent-strong);
    border-color: rgba(30, 122, 95, 0.12);
  }

  .pill.priority-fewest_transfers {
    background: var(--blue-soft);
    color: var(--blue);
    border-color: rgba(28, 91, 183, 0.12);
  }

  .pill.transport {
    background: var(--orange-soft);
    color: var(--orange);
    border-color: rgba(197, 99, 31, 0.12);
  }

  .route-title {
    font-size: clamp(21px, 4vw, 28px);
    line-height: 1.18;
    letter-spacing: -0.04em;
    word-break: keep-all;
  }

  .route-title .arrow {
    color: var(--text-muted);
    margin: 0 8px;
  }

  .route-subtitle {
    margin-top: 10px;
    color: var(--text-muted);
    font-size: 14px;
    line-height: 1.5;
  }

  .route-overview {
    align-items: center;
  }

  .route-overview-copy {
    min-width: 0;
  }

  .route-overview-copy p {
    margin: 6px 0 0;
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.5;
  }

  .route-toolbar {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    justify-content: flex-end;
  }

  .route-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: flex-end;
  }

  button {
    font: inherit;
  }

  .btn {
    border: none;
    cursor: pointer;
    transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease, opacity 0.18s ease;
  }

  .btn:hover {
    transform: translateY(-1px);
  }

  .btn:disabled {
    cursor: wait;
    opacity: 0.64;
    transform: none;
  }

  .btn-primary {
    background: var(--accent);
    color: white;
    padding: 14px 18px;
    border-radius: 16px;
    font-weight: 700;
  }

  .btn-secondary,
  .btn-ghost {
    background: rgba(255, 255, 255, 0.75);
    color: var(--text);
    border: 1px solid var(--line);
    padding: 11px 14px;
    border-radius: 14px;
    font-weight: 600;
  }

  .btn-ghost {
    padding: 10px 12px;
    font-size: 13px;
  }

  .btn-danger {
    color: var(--danger);
  }

  .summary-board {
    margin-top: 18px;
    background: var(--paper-strong);
    border: 1px solid rgba(71, 57, 29, 0.08);
    border-radius: 22px;
    padding: 18px;
  }

  .summary-head {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    align-items: flex-start;
  }

  .summary-head strong {
    display: block;
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .summary-line {
    font-size: clamp(24px, 5vw, 34px);
    font-weight: 700;
    line-height: 1.05;
    letter-spacing: -0.04em;
  }

  .summary-line small {
    font-family: var(--mono);
    font-size: 14px;
    color: var(--text-muted);
    margin-left: 8px;
  }

  .summary-note {
    margin-top: 10px;
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.5;
  }

  .summary-subline {
    margin-top: 10px;
    padding: 10px 12px;
    border-radius: 14px;
    background: rgba(255, 255, 255, 0.72);
    border: 1px solid rgba(71, 57, 29, 0.08);
    font-size: 13px;
    color: var(--text);
    line-height: 1.45;
  }

  .summary-subline strong {
    color: var(--text-muted);
    margin-right: 6px;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .score-badge {
    min-width: 120px;
    padding: 10px 12px;
    border-radius: 16px;
    background: rgba(32, 24, 16, 0.05);
    text-align: right;
  }

  .score-badge .label {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .score-badge .value {
    display: block;
    margin-top: 6px;
    font-family: var(--mono);
    font-size: 24px;
    font-weight: 700;
  }

  .metric-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 10px;
    margin-top: 16px;
  }

  .metric {
    padding: 14px;
    border-radius: 16px;
    background: rgba(255, 255, 255, 0.72);
    border: 1px solid rgba(71, 57, 29, 0.08);
  }

  .metric .label {
    display: block;
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }

  .metric .value {
    display: block;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.03em;
  }

  .transport-strip {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 16px;
  }

  .transport-step {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 9px 12px;
    border-radius: 999px;
    font-size: 13px;
    border: 1px solid rgba(71, 57, 29, 0.08);
    background: rgba(255, 255, 255, 0.8);
  }

  .transport-step.walk {
    color: var(--text-muted);
  }

  .transport-step.bus {
    color: var(--orange);
    background: rgba(197, 99, 31, 0.08);
  }

  .transport-step.subway {
    color: var(--blue);
    background: rgba(28, 91, 183, 0.08);
  }

  .state-line {
    margin-top: 16px;
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
    gap: 10px;
    font-size: 13px;
    color: var(--text-muted);
  }

  .state-line .stamp {
    font-family: var(--mono);
  }

  .compare-board {
    margin-top: 18px;
    padding-top: 16px;
    border-top: 1px solid rgba(71, 57, 29, 0.08);
  }

  .compare-head {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: baseline;
    margin-bottom: 12px;
  }

  .compare-head strong {
    font-size: 13px;
    color: var(--text-muted);
    letter-spacing: 0.02em;
  }

  .compare-head span {
    font-size: 12px;
    color: var(--text-muted);
  }

  .compare-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 12px;
  }

  .compare-card {
    padding: 14px;
    border-radius: 18px;
    background: rgba(255, 255, 255, 0.74);
    border: 1px solid rgba(71, 57, 29, 0.08);
  }

  .compare-card.recommended {
    border-color: rgba(30, 122, 95, 0.28);
    box-shadow: inset 0 0 0 1px rgba(30, 122, 95, 0.08);
    background: linear-gradient(180deg, rgba(30, 122, 95, 0.06), rgba(255, 255, 255, 0.82));
  }

  .compare-card.risk-medium {
    border-color: rgba(197, 99, 31, 0.22);
  }

  .compare-card.risk-high {
    border-color: rgba(180, 67, 67, 0.24);
    box-shadow: inset 0 0 0 1px rgba(180, 67, 67, 0.08);
  }

  .compare-flags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 10px;
  }

  .compare-flag {
    display: inline-flex;
    align-items: center;
    padding: 5px 8px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.03em;
    background: rgba(32, 24, 16, 0.06);
    color: var(--text-muted);
  }

  .compare-flag.recommended {
    background: var(--accent-soft);
    color: var(--accent-strong);
  }

  .compare-flag.risk-medium {
    background: var(--orange-soft);
    color: var(--orange);
  }

  .compare-flag.risk-high {
    background: rgba(180, 67, 67, 0.12);
    color: var(--danger);
  }

  .compare-card-top {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: flex-start;
  }

  .compare-card strong {
    display: block;
    font-size: 15px;
    line-height: 1.3;
  }

  .compare-score {
    font-family: var(--mono);
    font-size: 20px;
    font-weight: 700;
    white-space: nowrap;
  }

  .compare-subtitle {
    margin-top: 6px;
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.45;
  }

  .compare-metrics {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
    margin-top: 12px;
  }

  .compare-metric {
    padding: 10px 11px;
    border-radius: 14px;
    background: rgba(255, 255, 255, 0.78);
    border: 1px solid rgba(71, 57, 29, 0.08);
  }

  .compare-metric .label {
    display: block;
    margin-bottom: 4px;
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .compare-metric .value {
    display: block;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  .compare-risk {
    margin-top: 12px;
    padding: 10px 12px;
    border-radius: 14px;
    background: rgba(255, 255, 255, 0.72);
    border: 1px solid rgba(71, 57, 29, 0.08);
    font-size: 12px;
    line-height: 1.45;
    color: var(--text-muted);
  }

  .bus-line-board {
    margin-top: 14px;
    padding: 14px;
    border-radius: 18px;
    background: rgba(255, 255, 255, 0.76);
    border: 1px solid rgba(71, 57, 29, 0.08);
  }

  .bus-line-head {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: baseline;
    margin-bottom: 12px;
  }

  .bus-line-head strong {
    font-size: 13px;
    color: var(--text-muted);
  }

  .bus-line-head span {
    font-size: 12px;
    color: var(--text-muted);
  }

  .bus-line-track {
    position: relative;
    display: grid;
    gap: 10px;
    padding-left: 8px;
  }

  .bus-line-track::before {
    content: "";
    position: absolute;
    left: 14px;
    top: 10px;
    bottom: 10px;
    width: 2px;
    background: linear-gradient(180deg, rgba(30, 122, 95, 0.15), rgba(28, 91, 183, 0.24));
  }

  .bus-line-stop {
    position: relative;
    display: grid;
    grid-template-columns: 28px minmax(0, 1fr);
    gap: 12px;
    align-items: center;
    min-height: 28px;
  }

  .bus-line-dot {
    width: 14px;
    height: 14px;
    border-radius: 999px;
    background: #fff;
    border: 2px solid rgba(71, 57, 29, 0.18);
    position: relative;
    z-index: 1;
  }

  .bus-line-stop.boarding .bus-line-dot {
    background: var(--accent);
    border-color: var(--accent);
    box-shadow: 0 0 0 4px rgba(30, 122, 95, 0.12);
  }

  .bus-line-stop-name {
    font-size: 13px;
    line-height: 1.4;
  }

  .bus-line-stop.boarding .bus-line-stop-name {
    font-weight: 700;
  }

  .bus-line-bus {
    position: absolute;
    left: 0;
    transform: translateY(-50%);
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 7px 10px;
    border-radius: 999px;
    background: rgba(32, 24, 16, 0.92);
    color: #fff;
    font-size: 11px;
    line-height: 1.2;
    z-index: 2;
    box-shadow: 0 10px 24px rgba(32, 24, 16, 0.18);
  }

  .bus-line-bus.next {
    background: var(--accent-strong);
  }

  .bus-line-bus.after {
    background: var(--blue);
  }

  .bus-line-bus strong {
    font-size: 11px;
    letter-spacing: 0.03em;
  }

  .detail-toggle {
    margin-top: 16px;
  }

  .route-details {
    border-top: 1px solid rgba(71, 57, 29, 0.08);
    padding: 0 22px 22px;
    display: none;
  }

  .route-card.expanded .route-details {
    display: block;
  }

  .detail-block {
    margin-top: 18px;
  }

  .detail-block h3 {
    margin: 0 0 10px;
    font-size: 14px;
    letter-spacing: -0.02em;
  }

  .candidate-list {
    display: grid;
    gap: 10px;
  }

  .candidate-card {
    background: rgba(255, 255, 255, 0.74);
    border: 1px solid rgba(71, 57, 29, 0.08);
    border-radius: 18px;
    padding: 14px;
  }

  .candidate-card.recommended {
    border-color: rgba(30, 122, 95, 0.25);
    box-shadow: inset 0 0 0 1px rgba(30, 122, 95, 0.1);
  }

  .candidate-card-top {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: flex-start;
  }

  .candidate-card strong {
    font-size: 15px;
  }

  .candidate-card .meta {
    margin-top: 6px;
    color: var(--text-muted);
    font-size: 13px;
  }

  .candidate-score {
    text-align: right;
    font-family: var(--mono);
    font-size: 16px;
    white-space: nowrap;
  }

  .segment-list {
    display: grid;
    gap: 8px;
  }

  .segment-item {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: center;
    padding: 10px 12px;
    border-radius: 14px;
    background: rgba(255, 255, 255, 0.72);
    border: 1px solid rgba(71, 57, 29, 0.08);
  }

  .segment-item .name {
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
  }

  .segment-item .kind {
    width: 54px;
    font-size: 11px;
    text-align: center;
    padding: 5px 6px;
    border-radius: 999px;
    background: rgba(32, 24, 16, 0.05);
    color: var(--text-muted);
    flex-shrink: 0;
  }

  .segment-item .text {
    min-width: 0;
    font-size: 13px;
    line-height: 1.35;
  }

  .segment-item .time {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text-muted);
    white-space: nowrap;
  }

  .empty-state {
    padding: 22px;
    border-radius: var(--radius-xl);
    border: 1px dashed rgba(71, 57, 29, 0.22);
    background: rgba(255, 255, 255, 0.56);
    color: var(--text-muted);
    line-height: 1.65;
  }

  .empty-state strong {
    display: block;
    margin-bottom: 8px;
    color: var(--text);
    font-size: 16px;
  }

  .modal-overlay {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;

<body>
<div class="app-shell">
  <section class="section">
    <div class="section-head route-overview">
      <div class="route-overview-copy">
        <h2>저장 루트</h2>
        <span id="route-count">0개 루트</span>
        <p>앱을 열면 저장된 결과를 먼저 보여주고, 추천 갱신을 눌렀을 때만 새로 호출합니다.</p>
      </div>
      <div class="route-toolbar">
        <div class="clock-badge" id="clock">--:--</div>
        <button class="btn btn-secondary" id="key-settings-btn">ODsay 키</button>
        <button class="btn btn-primary" id="add-route-btn">새 루트 추가</button>
      </div>
    </div>
    <div class="route-list" id="route-list"></div>

</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-head">
      <div>
        <h3 id="modal-title">새 루트 추가</h3>
        <p>루트 목적, 추천 기준, 허용 교통수단을 먼저 정한 뒤 저장합니다.</p>
      </div>
      <button class="icon-button" id="modal-close-btn" aria-label="닫기">✕</button>
    </div>

    <div class="form-grid">
      <div class="form-row full">
        <label for="route-label-input">루트 라벨</label>
        <input type="text" id="route-label-input" placeholder="예: 출근, 퇴근, 병원" maxlength="18">
      </div>

      <div class="form-row">
        <label for="route-from-input">출발지</label>
        <div class="autocomplete-wrap">
          <input type="text" id="route-from-input" placeholder="예: 강남역, 더현대 서울" autocomplete="off">
          <div class="autocomplete-dropdown" id="route-from-dropdown"></div>
        </div>
      </div>

      <div class="form-row">
        <label for="route-to-input">도착지</label>
        <div class="autocomplete-wrap">
          <input type="text" id="route-to-input" placeholder="예: 여의도역, 판교역 카카오" autocomplete="off">
          <div class="autocomplete-dropdown" id="route-to-dropdown"></div>
        </div>
      </div>

      <div class="form-row full">
        <label>선택 위치 확인</label>
        <div class="preview-grid">
          <div class="place-preview">
            <div class="place-preview-head">
              <div>
                <strong>출발지</strong>
                <span id="route-from-preview-label">위치를 선택하면 이곳에 지도가 보입니다.</span>
              </div>
              <button class="mini-map-btn" type="button" data-map-pick="from" id="route-from-map-pick-btn">지도에서 찍기</button>
            </div>
            <div class="place-preview-map empty" id="route-from-preview-map">검색 결과를 선택하면 지도로 위치를 확인할 수 있습니다.</div>
          </div>
          <div class="place-preview">
            <div class="place-preview-head">
              <div>
                <strong>도착지</strong>
                <span id="route-to-preview-label">위치를 선택하면 이곳에 지도가 보입니다.</span>
              </div>
              <button class="mini-map-btn" type="button" data-map-pick="to" id="route-to-map-pick-btn">지도에서 찍기</button>
            </div>
            <div class="place-preview-map empty" id="route-to-preview-map">검색 결과를 선택하면 지도로 위치를 확인할 수 있습니다.</div>
          </div>
        </div>
      </div>

      <div class="form-row full">
        <label>추천 기준</label>
        <div class="option-grid" id="priority-options">
          <label class="option-card" data-priority="fastest">
            <input type="radio" name="priority" value="fastest">
            <strong>최소시간</strong>
            <span>총 소요시간이 가장 짧은 후보를 추천합니다.</span>
          </label>
          <label class="option-card" data-priority="fewest_transfers">
            <input type="radio" name="priority" value="fewest_transfers">
            <strong>최소환승</strong>
            <span>환승 수가 가장 적은 후보를 우선합니다.</span>
          </label>
          <label class="option-card" data-priority="best_eta">
            <input type="radio" name="priority" value="best_eta">
            <strong>지금 출발 기준</strong>

          </label>

      </div>

      <div class="form-row full">

        <div class="option-grid" id="transport-options">
          <label class="option-card" data-transport="all">
            <input type="radio" name="transport" value="all">
            <strong>버스 + 지하철</strong>
            <span>둘 다 허용합니다.</span>
          </label>
          <label class="option-card" data-transport="bus">
            <input type="radio" name="transport" value="bus">
            <strong>버스만</strong>

<div class="map-picker-overlay" id="map-picker-overlay">
  <div class="map-picker-sheet">
    <div class="map-picker-head">
      <div>
        <h3 id="map-picker-title">지도에서 위치 선택</h3>
        <p id="map-picker-subtitle">지도를 눌러 저장할 좌표를 선택하세요.</p>
      </div>
      <button class="icon-button" id="map-picker-close-btn" aria-label="닫기">✕</button>
    </div>
    <div class="map-picker-map" id="map-picker-map"></div>
    <div class="map-picker-footer">
      <span id="map-picker-status">현재 저장된 좌표나 서울 중심으로 지도를 엽니다.</span>
      <button class="btn btn-secondary" id="map-picker-cancel-btn" type="button">취소</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const STORAGE_KEY = "transit-routes-v2";
  const LEGACY_STORAGE_KEY = "transit-routes";
  const ROUTE_CARD_COLLAPSED_KEY = "transit-route-card-collapsed";
  const ODSAY_BROWSER_KEY_STORAGE = "transit-odsay-browser-key";
  const AUTOCOMPLETE_MIN_LENGTH = 2;
  const ODSAY_API_ROOT = "https://api.odsay.com/v1/api";

  const PRIORITY_META = {
    fastest: {
      label: "최소시간",
      className: "priority-fastest",
      scoreLabel: "총 이동",
      staleText: "가장 빠른 총 소요시간 기준"
    },
    fewest_transfers: {
      label: "최소환승",
      className: "priority-fewest_transfers",
      scoreLabel: "환승 우선",
      staleText: "환승 수가 가장 적은 기준"
    },
    best_eta: {
      label: "지금 출발",
      className: "priority-best_eta",
      scoreLabel: "출발 기준",
      staleText: "첫 탑승 대기까지 반영한 기준"
    }
  };

  const TRANSPORT_META = {
    all: { label: "버스+지하철" },
    bus: { label: "버스만" },
    subway: { label: "지하철만" }
  };

  const state = {
    routes: [],
    collapsedRouteIds: new Set(JSON.parse(localStorage.getItem(ROUTE_CARD_COLLAPSED_KEY) || "[]")),
    loadingRouteIds: new Set(),
    expandedRouteIds: new Set(),
    modalRouteId: null,
    previewMaps: {},
    mapPickerTarget: null,
    autocompleteSelection: {
      from: null,
      to: null
    }
  };

  function uid() {
    return typeof crypto !== "undefined" && crypto.randomUUID
      ? crypto.randomUUID()
      : "route-" + Date.now() + "-" + Math.random().toString(16).slice(2);
  }

  function nowStamp() {
    return new Date().toISOString();
  }

  function getBrowserOdsayKey() {
    return localStorage.getItem(ODSAY_BROWSER_KEY_STORAGE) || "";
  }

  function setBrowserOdsayKey(value) {
    if (!value) {
      localStorage.removeItem(ODSAY_BROWSER_KEY_STORAGE);
      return;
    }
    localStorage.setItem(ODSAY_BROWSER_KEY_STORAGE, value.trim());
  }

  function normalizeLegacyRoute(route) {
    return {
      id: uid(),
      label: route.tag || "루트",
      from: { name: route.from || "", x: null, y: null },
      to: { name: route.to || "", x: null, y: null },
      priority: route.tag === "퇴근" ? "fewest_transfers" : "fastest",
      transportFilter: "all",
      lastResult: null,
      createdAt: nowStamp()
    };
  }

  function migrateAndLoadRoutes() {
    const current = localStorage.getItem(STORAGE_KEY);
    if (current) {
      try {
        return JSON.parse(current) || [];
      } catch {
        return [];
      }
    }

    const legacy = localStorage.getItem(LEGACY_STORAGE_KEY);
    if (!legacy) return [];

    try {
      const migrated = (JSON.parse(legacy) || []).map(normalizeLegacyRoute);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(migrated));
      return migrated;
    } catch {
      return [];
    }
  }

  function persistRoutes() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state.routes));
  }

  function escapeHtml(value) {
    return String(value ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#39;");
  }

  function formatTime(dateLike) {
    if (!dateLike) return "미갱신";
    const date = new Date(dateLike);
    if (Number.isNaN(date.getTime())) return "미갱신";
    return date.toLocaleTimeString("ko-KR", {
      hour: "2-digit",
      minute: "2-digit"
    });
  }

  function relativeTime(dateLike) {
    if (!dateLike) return "아직 추천을 가져오지 않았습니다";
    const diffMin = Math.max(0, Math.floor((Date.now() - new Date(dateLike).getTime()) / 60000));
    if (diffMin < 1) return "방금 갱신";
    if (diffMin < 60) return diffMin + "분 전 갱신";
    const diffHour = Math.floor(diffMin / 60);
    if (diffHour < 24) return diffHour + "시간 전 갱신";
    return Math.floor(diffHour / 24) + "일 전 갱신";
  }

  function clearLocationPreview(selectionKey) {
    const mapId = "route-" + selectionKey + "-preview-map";
    const labelId = "route-" + selectionKey + "-preview-label";
    const mapEl = document.getElementById(mapId);
    const labelEl = document.getElementById(labelId);
    if (!mapEl || !labelEl) return;

    const existing = state.previewMaps[selectionKey];
    if (existing?.map) {
      existing.map.remove();
    }
    delete state.previewMaps[selectionKey];

    mapEl.classList.add("empty");
    mapEl.innerHTML = "검색 결과를 선택하면 지도로 위치를 확인할 수 있습니다.";
    labelEl.textContent = "위치를 선택하면 이곳에 지도가 보입니다.";
  }

  function updateLocationPreview(selectionKey, location) {
    const mapId = "route-" + selectionKey + "-preview-map";
    const labelId = "route-" + selectionKey + "-preview-label";
    const mapEl = document.getElementById(mapId);
    const labelEl = document.getElementById(labelId);
    if (!mapEl || !labelEl) return;

    if (!location || location.x == null || location.y == null) {
      clearLocationPreview(selectionKey);
      return;
    }

    mapEl.classList.remove("empty");
    labelEl.textContent = [location.kind, location.detail].filter(Boolean).join(" · ") || location.name;

    const lat = Number(location.y);
    const lng = Number(location.x);
    if (!Number.isFinite(lat) || !Number.isFinite(lng)) {
      clearLocationPreview(selectionKey);
      return;
    }

    requestAnimationFrame(() => {
      let preview = state.previewMaps[selectionKey];
      if (!preview) {
        mapEl.innerHTML = "";
        if (typeof L === "undefined") {
          mapEl.classList.add("empty");
          mapEl.textContent = `${location?.name || "선택한 위치"} (${lat.toFixed(5)}, ${lng.toFixed(5)})`;
          return;
        }
        const map = L.map(mapId, {
          zoomControl: false,
          attributionControl: false,
          dragging: false,
          scrollWheelZoom: false,
          doubleClickZoom: false,
          touchZoom: false,
          keyboard: false
        });
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          maxZoom: 19
        }).addTo(map);
        const marker = L.circleMarker([lat, lng], {
          radius: 8,
          color: "#165c47",
          weight: 2,
          fillColor: "#1e7a5f",
          fillOpacity: 0.9
        }).addTo(map);
        preview = { map, marker };
        state.previewMaps[selectionKey] = preview;
      } else {
        preview.marker.setLatLng([lat, lng]);
      }

      preview.map.getContainer().style.cursor = "default";
      preview.map.setView([lat, lng], 15);
      preview.map.invalidateSize();
    });
  }

  function clearAutocompletePreview(selectionKey) {
    const previewId = "route-" + selectionKey + "-dropdown-preview";
    const previewEl = document.getElementById(previewId);
    if (!previewEl) return;

    const existing = state.previewMaps["dropdown-" + selectionKey];
    if (existing?.map) {
      existing.map.remove();
    }
    delete state.previewMaps["dropdown-" + selectionKey];

    previewEl.classList.add("empty");
    previewEl.innerHTML = "목록에서 항목에 마우스를 올리거나 방향키로 이동하면 위치가 여기에 보입니다.";
  }

  function updateAutocompletePreview(selectionKey, location) {
    const previewId = "route-" + selectionKey + "-dropdown-preview";
    const previewEl = document.getElementById(previewId);
    if (!previewEl) return;

    if (!location || location.x == null || location.y == null) {
      clearAutocompletePreview(selectionKey);
      return;
    }

    previewEl.classList.remove("empty");

    const lat = Number(location.y);
    const lng = Number(location.x);
    if (!Number.isFinite(lat) || !Number.isFinite(lng)) {
      clearAutocompletePreview(selectionKey);
      return;
    }

    requestAnimationFrame(() => {
      let preview = state.previewMaps["dropdown-" + selectionKey];
      if (!preview) {
        previewEl.innerHTML = "";
        if (typeof L === "undefined") {
          previewEl.classList.add("empty");
          previewEl.textContent = `${location.name} (${lat.toFixed(5)}, ${lng.toFixed(5)})`;
          return;
        }
        const map = L.map(previewId, {
          zoomControl: false,
          attributionControl: false,
          dragging: false,
          scrollWheelZoom: false,
          doubleClickZoom: false,
          touchZoom: false,
          keyboard: false
        });
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          maxZoom: 19
        }).addTo(map);
        const marker = L.circleMarker([lat, lng], {
          radius: 8,
          color: "#1c5bb7",
          weight: 2,
          fillColor: "#3c7ad1",
          fillOpacity: 0.9
        }).addTo(map);
        preview = { map, marker };
        state.previewMaps["dropdown-" + selectionKey] = preview;
      } else {

  function updateClock() {
    const now = new Date();
    document.getElementById("clock").textContent = now.toLocaleTimeString("ko-KR", {
      hour: "2-digit",
      minute: "2-digit"
    });
  }

  function priorityLabel(value) {
    return PRIORITY_META[value]?.label || value;
  }

  function transportLabel(value) {
    return TRANSPORT_META[value]?.label || value;
  }

  function describeRecommendation(route, recommendation) {
    if (!recommendation) return "저장된 추천이 없습니다. 필요할 때만 직접 갱신하세요.";
    if (route.priority === "fastest") {
      return "총 이동시간이 가장 짧은 후보를 상단에 고정했습니다.";
    }
    if (route.priority === "fewest_transfers") {
      return "환승 수를 먼저 줄이고, 동률이면 더 빠른 후보를 선택합니다.";
    }
    if (recommendation.firstWaitMin == null) {
      return "첫 탑승 대기 추정치와 총 이동시간을 함께 반영한 결과입니다.";
    }
    const source = recommendation.firstWaitSource === "seoul_arrival"
      ? "서울시 버스 도착정보"
      : "배차간격 추정";
    const riskSuffix = recommendation.transferRiskText ? " " + recommendation.transferRiskText : "";
    return "첫 탑승 대기 " + recommendation.firstWaitMin + "분(" + source + ")과 환승 대기 추정 " + (recommendation.transferWaitMin || 0) + "분을 반영해 지금 출발 기준으로 정렬했습니다." + riskSuffix;
  }

  function renderTransportSteps(steps) {
    if (!steps?.length) return "";
    return steps.map((step) => {
      return '<span class="transport-step ' + escapeHtml(step.type) + '">' + escapeHtml(step.label) + "</span>";
    }).join("");
  }

  function renderCandidate(candidate, isRecommended) {
    return `
      <div class="candidate-card ${isRecommended ? "recommended" : ""}">
        <div class="candidate-card-top">
          <div>
            <strong>${escapeHtml(candidate.firstTransitLabel || "도보 중심")}</strong>
            <div class="meta">
              ${escapeHtml(candidate.note)}
            </div>
            ${candidate.transferRiskText ? `<div class="meta" style="margin-top:4px;">주의: ${escapeHtml(candidate.transferRiskText)}</div>` : ""}
          </div>
          <div class="candidate-score">${escapeHtml(candidate.scoreDisplay)}</div>
        </div>
        <div class="transport-strip" style="margin-top:12px;">${renderTransportSteps(candidate.summarySteps)}</div>
      </div>
    `;
  }

  function candidateRiskLabel(candidate) {
    if (candidate.transferRiskLevel === "high") return "놓칠 위험 큼";
    if (candidate.transferRiskLevel === "medium") return "환승 주의";
    return null;
  }

  function renderCompareCard(candidate, isRecommended) {
    const riskLabel = candidateRiskLabel(candidate);
    const cardClass = [
      "compare-card",
      isRecommended ? "recommended" : "",
      candidate.transferRiskLevel === "high" ? "risk-high" : "",
      candidate.transferRiskLevel === "medium" ? "risk-medium" : ""
    ].filter(Boolean).join(" ");

    return `
      <div class="${cardClass}">
        <div class="compare-flags">
          ${isRecommended ? '<span class="compare-flag recommended">추천</span>' : ""}
          ${riskLabel ? `<span class="compare-flag ${escapeHtml(candidate.transferRiskLevel)}">${escapeHtml(riskLabel)}</span>` : ""}
        </div>
        <div class="compare-card-top">
          <div>
            <strong>${escapeHtml(candidate.firstTransitLabel || "도보 중심")}</strong>
            <div class="compare-subtitle">${escapeHtml(candidate.boardingApproachText || candidate.note)}</div>
          </div>
          <div class="compare-score">${escapeHtml(candidate.scoreDisplay)}</div>
        </div>
        <div class="compare-metrics">
          <div class="compare-metric">
            <span class="label">총 이동</span>
            <span class="value">${escapeHtml(candidate.totalTimeText)}</span>
          </div>
          <div class="compare-metric">
            <span class="label">첫 대기</span>
            <span class="value">${escapeHtml(candidate.firstWaitText)}</span>
          </div>
          <div class="compare-metric">
            <span class="label">환승</span>
            <span class="value">${escapeHtml(candidate.transferCountText)}</span>
          </div>
          <div class="compare-metric">
            <span class="label">도보</span>
            <span class="value">${escapeHtml(candidate.walkTimeText)}</span>
          </div>
        </div>
        <div class="transport-strip" style="margin-top:12px;">${renderTransportSteps(candidate.summarySteps)}</div>
        ${candidate.transferRiskText ? `<div class="compare-risk">${escapeHtml(candidate.transferRiskText)}</div>` : ""}
      </div>
    `;
  }

  function renderSegments(segments) {
    if (!segments?.length) {
      return '<div class="empty-state"><strong>상세 구간이 없습니다</strong>다음 갱신 때 다시 확인해주세요.</div>';
    }
    return '<div class="segment-list">' + segments.map((segment) => `
      <div class="segment-item">
        <div class="name">
          <span class="kind">${escapeHtml(segment.kind)}</span>
          <div class="text">${escapeHtml(segment.text)}</div>
        </div>
        <div class="time">${escapeHtml(segment.time)}</div>
      </div>
    `).join("") + "</div>";
  }

  function renderBusApproachPreview(preview) {
    if (!preview?.stops?.length) return "";

    const buses = (preview.vehicles || []).map((vehicle, index) => `
      <div class="bus-line-bus ${index === 0 ? "next" : "after"}" style="top:${vehicle.progressPercent}%;">
        <strong>${escapeHtml(vehicle.label)}</strong>
        <span>${escapeHtml(vehicle.remainingStops + "정거장 전")}</span>
      </div>
    `).join("");

    const stops = preview.stops.map((stop) => `
      <div class="bus-line-stop ${stop.isBoarding ? "boarding" : ""}">
        <span class="bus-line-dot"></span>
        <div class="bus-line-stop-name">${escapeHtml(stop.name)}</div>
      </div>
    `).join("");

    const vehicleSummary = (preview.vehicles || []).map((vehicle) =>
      `${vehicle.label} ${vehicle.remainingStops}정거장 전`
    ).join(" · ");

    return `
      <div class="bus-line-board">
        <div class="bus-line-head">
          <strong>${escapeHtml(preview.routeNo)} 접근 노선</strong>
          <span>${escapeHtml(vehicleSummary || "차량 위치 정보 없음")}</span>
        </div>
        <div class="bus-line-track">
          ${buses}
          ${stops}
        </div>
      </div>
    `;
  }

  function renderEmptyCard() {
    return `
      <div class="empty-state">
        <strong>저장된 루트가 없습니다</strong>
        자주 가는 경로를 저장해두고, 각 루트마다 추천 기준과 허용 교통수단을 따로 정해보세요.
      </div>
    `;
  }

  function renderRouteCard(route) {
    const loading = state.loadingRouteIds.has(route.id);
    const expanded = state.expandedRouteIds.has(route.id);
    const collapsed = state.collapsedRouteIds.has(route.id);
    const result = route.lastResult;
    const recommendation = result?.recommendation || null;
    const priorityMeta = PRIORITY_META[route.priority] || PRIORITY_META.fastest;
    const fetchedAt = result?.fetchedAt || null;
    const compareCandidates = result?.candidates || [];

    const summaryHtml = collapsed ? "" : (recommendation ? `
      <div class="summary-board">
        <div class="summary-head">
          <div>
            <strong>지금 고를 한 가지</strong>
            <div class="summary-line">${escapeHtml(recommendation.totalTimeText)}<small>${escapeHtml(recommendation.firstTransitLabel || "도보")}</small></div>
            <div class="summary-note">${escapeHtml(describeRecommendation(route, recommendation))}</div>
            ${recommendation.boardingApproachText ? `<div class="summary-subline"><strong>탑승 정류장</strong>${escapeHtml(recommendation.boardingApproachText)}</div>` : ""}
            ${recommendation.alightingStopName ? `<div class="summary-subline"><strong>마지막 하차</strong>${escapeHtml(recommendation.alightingStopName)}</div>` : ""}
          </div>
          <div class="score-badge">
            <div class="label">${escapeHtml(priorityMeta.scoreLabel)}</div>
            <span class="value">${escapeHtml(recommendation.scoreDisplay)}</span>
          </div>
        </div>

        <div class="metric-grid">
          <div class="metric">
            <span class="label">총 이동</span>
            <span class="value">${escapeHtml(recommendation.totalTimeText)}</span>
          </div>
          <div class="metric">
            <span class="label">첫 대기</span>
            <span class="value">${escapeHtml(recommendation.firstWaitText)}</span>
          </div>
          <div class="metric">
            <span class="label">환승 대기</span>
            <span class="value">${escapeHtml(recommendation.transferWaitText || "기준 아님")}</span>
          </div>
          <div class="metric">
            <span class="label">환승</span>
            <span class="value">${escapeHtml(recommendation.transferCountText)}</span>
          </div>
          <div class="metric">
            <span class="label">도보</span>
            <span class="value">${escapeHtml(recommendation.walkTimeText)}</span>
          </div>
        </div>

        <div class="transport-strip">${renderTransportSteps(recommendation.summarySteps)}</div>
        ${recommendation.busApproachPreview ? renderBusApproachPreview(recommendation.busApproachPreview) : ""}
        ${recommendation.transferRiskText ? `<div class="summary-subline"><strong>주의</strong>${escapeHtml(recommendation.transferRiskText)}</div>` : ""}
        <div class="state-line">
          <span>${escapeHtml(recommendation.note)}</span>
          <span class="stamp">${escapeHtml(relativeTime(fetchedAt))}</span>
        </div>
        ${compareCandidates.length ? `
          <div class="compare-board">
            <div class="compare-head">
              <strong>한눈에 비교</strong>
              <span>${escapeHtml(compareCandidates.length + "개 후보")}</span>
            </div>
            <div class="compare-grid">
              ${compareCandidates.map((candidate) => renderCompareCard(candidate, candidate.id === result.recommendedId)).join("")}
            </div>
          </div>
        ` : ""}
      </div>
    ` : `
      <div class="summary-board">
        <div class="summary-head">
          <div>
            <strong>저장된 추천 없음</strong>
            <div class="summary-line">아직 미조회</div>
            <div class="summary-note">
              앱을 열 때는 자동 호출하지 않습니다. 필요할 때 추천 갱신을 눌러 결과를 가져옵니다.
            </div>
          </div>
          <div class="score-badge">
            <div class="label">${escapeHtml(priorityMeta.scoreLabel)}</div>
            <span class="value">--</span>
          </div>
        </div>
      </div>
    `);

    const detailsHtml = collapsed ? "" : (result ? `
      <div class="detail-block">
        <h3>추천 상세</h3>
        ${renderSegments(recommendation?.segments)}
      </div>
      <div class="detail-block">
        <h3>후보 메모</h3>
        <div class="candidate-list">
          ${compareCandidates.map((candidate) => renderCandidate(candidate, candidate.id === result.recommendedId)).join("")}

      <div class="detail-block">
        <h3>다음 단계</h3>
        <div class="empty-state">
          <strong>루트는 저장되었지만 추천 데이터는 아직 없습니다</strong>
          추천 갱신 버튼을 누르면 현재 기준으로 후보를 하나 골라 저장합니다.
        </div>
      </div>
    `);

    return `
      <article class="route-card ${loading ? "loading" : ""} ${expanded && !collapsed ? "expanded" : ""} ${collapsed ? "collapsed" : ""}">
        <div class="route-main">
          <div class="route-main-top">
            <div class="route-names">
              <div class="route-kicker">
                <span class="pill label">${escapeHtml(route.label || "루트")}</span>

              </div>
              <div class="route-title">
                ${escapeHtml(route.from?.name || "")}
                <span class="arrow">→</span>
                ${escapeHtml(route.to?.name || "")}
              </div>
              <div class="route-subtitle">
                ${escapeHtml(priorityMeta.staleText)} · 마지막 확인 ${escapeHtml(formatTime(fetchedAt))}
              </div>
            </div>
            <div class="route-actions">
              <button class="btn btn-primary" data-action="refresh" data-id="${escapeHtml(route.id)}">${loading ? "갱신 중..." : "추천 갱신"}</button>

              <button class="btn btn-secondary" data-action="toggle" data-id="${escapeHtml(route.id)}">${expanded ? "상세 닫기" : "상세"}</button>
              <button class="btn btn-ghost" data-action="edit" data-id="${escapeHtml(route.id)}">편집</button>
              <button class="btn btn-ghost btn-danger" data-action="delete" data-id="${escapeHtml(route.id)}">삭제</button>
            </div>
          </div>
          ${summaryHtml}
        </div>
        <div class="route-details">${detailsHtml}</div>
      </article>
    `;
  }

  function renderRoutes() {
    const list = document.getElementById("route-list");
    document.getElementById("route-count").textContent = state.routes.length + "개 루트";
    if (state.routes.length === 0) {
      list.innerHTML = renderEmptyCard();
      return;
    }
    list.innerHTML = state.routes.map(renderRouteCard).join("");
  }

  function showToast(message) {
    const toast = document.getElementById("toast");
    toast.textContent = message;
    toast.classList.add("show");
    clearTimeout(showToast._timer);
    showToast._timer = setTimeout(() => toast.classList.remove("show"), 2200);
  }

  function updateMapPickButtons() {
    ["from", "to"].forEach((selectionKey) => {
      const button = document.getElementById(`route-${selectionKey}-map-pick-btn`);
      if (!button) return;
      const active = state.mapPickerTarget === selectionKey;
      button.classList.toggle("active", active);
      button.textContent = active ? "지도 열림" : "지도에서 찍기";
    });
  }

  async function reverseGeocode(lat, lng) {
    try {
      const payload = await fetchJson(`/api/reverse-geocode?lat=${encodeURIComponent(lat)}&lon=${encodeURIComponent(lng)}`);
      return payload.location || null;
    } catch {
      return null;
    }
  }

  async function handleMapPick(selectionKey, lat, lng) {
    const location = await reverseGeocode(lat, lng);
    const fallbackName = selectionKey === "from" ? "지도 선택 출발지" : "지도 선택 도착지";
    const picked = {
      name: location?.name || fallbackName,
      detail: location?.detail || `${lat.toFixed(5)}, ${lng.toFixed(5)}`,
      kind: location?.kind || "지도 선택",
      x: lng,
      y: lat,
      stationID: null
    };

    state.autocompleteSelection[selectionKey] = picked;
    const input = document.getElementById(`route-${selectionKey}-input`);
    if (input) input.value = picked.name;
    closeMapPicker();
    updateMapPickButtons();
    updateLocationPreview(selectionKey, picked);
    showToast(`${selectionKey === "from" ? "출발지" : "도착지"}를 지도에서 선택했습니다`);
  }

  function openMapPicker(selectionKey) {
    state.mapPickerTarget = selectionKey;
    updateMapPickButtons();
    document.getElementById("map-picker-title").textContent = selectionKey === "from" ? "출발지를 지도에서 선택" : "도착지를 지도에서 선택";
    document.getElementById("map-picker-subtitle").textContent = "큰 지도에서 정확한 위치를 누르면 즉시 저장됩니다.";
    document.getElementById("map-picker-status").textContent = "핀을 찍을 지점을 찾은 뒤 지도를 한 번 눌러 선택하세요.";
    document.getElementById("map-picker-overlay").classList.add("active");
    renderMapPicker();
  }

  function closeMapPicker() {
    const existing = state.previewMaps.mapPicker;
    if (existing?.map) {
      existing.map.remove();
    }
    delete state.previewMaps.mapPicker;
    state.mapPickerTarget = null;
    document.getElementById("map-picker-overlay").classList.remove("active");
    updateMapPickButtons();
  }

  function renderMapPicker() {
    const selectionKey = state.mapPickerTarget;
    const mapEl = document.getElementById("map-picker-map");
    if (!selectionKey || !mapEl) return;

    const location = state.autocompleteSelection[selectionKey];
    const lat = location?.y != null ? Number(location.y) : 37.5665;
    const lng = location?.x != null ? Number(location.x) : 126.9780;
    const zoom = location?.y != null && location?.x != null ? 16 : 13;

    requestAnimationFrame(() => {
      let preview = state.previewMaps.mapPicker;
      if (!preview) {
        mapEl.innerHTML = "";
        if (typeof L === "undefined") {
          mapEl.textContent = "지도를 불러오지 못했습니다.";
          return;
        }
        const map = L.map("map-picker-map", {
          zoomControl: true,
          attributionControl: false,
          dragging: true,
          scrollWheelZoom: true,
          doubleClickZoom: true,
          touchZoom: true,
          keyboard: false
        });
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          maxZoom: 19
        }).addTo(map);
        let marker = null;
        if (location?.x != null && location?.y != null) {
          marker = L.marker([lat, lng]).addTo(map);
        }
        map.on("click", (event) => {
          if (!state.mapPickerTarget) return;
          handleMapPick(state.mapPickerTarget, event.latlng.lat, event.latlng.lng);
        });
        preview = { map, marker };
        state.previewMaps.mapPicker = preview;
      } else {
        if (location?.x != null && location?.y != null) {
          if (!preview.marker) {
            preview.marker = L.marker([lat, lng]).addTo(preview.map);
          } else {
            preview.marker.setLatLng([lat, lng]);
          }
        }
      }

      preview.map.setView([lat, lng], zoom);
      preview.map.invalidateSize();
    });
  }

  function configureBrowserKey() {
    const current = getBrowserOdsayKey();
    const input = window.prompt(
      "서버 호출이 막힐 때 브라우저에서 직접 ODsay를 호출할 키를 입력하세요. 비우고 저장하면 삭제됩니다.",
      current
    );
    if (input === null) return;
    setBrowserOdsayKey(input);
    showToast(input.trim() ? "브라우저 fallback용 ODsay 키를 저장했습니다" : "저장된 ODsay 키를 삭제했습니다");
  }

  async function fetchJson(url) {
    const response = await fetch(url, { cache: "no-store" });
    const payload = await response.json().catch(() => ({}));
    if (!response.ok) {
      throw new Error(payload.error || "요청에 실패했습니다");
    }
    return payload;
  }

  async function fetchJsonDirect(url) {
    const response = await fetch(url, { cache: "no-store" });
    const payload = await response.json().catch(() => ({}));
    if (!response.ok || payload?.error) {
      throw new Error(payload?.error?.msg || payload?.error?.message || payload?.error?.code || payload.error || "ODsay 직접 호출 실패");
    }
    return payload;
  }

  async function fetchOdsayDirect(endpoint, params) {
    const key = getBrowserOdsayKey();
    if (!key) {
      throw new Error("서버 호출이 실패했고 브라우저 fallback용 ODsay 키도 저장되지 않았습니다");
    }
    const query = new URLSearchParams({
      apiKey: key,
      lang: "0",
      output: "json",
      ...params
    });
    return fetchJsonDirect(`${ODSAY_API_ROOT}/${endpoint}?${query.toString()}`);
  }

  async function searchStations(query) {
    const normalized = query.trim();
    if (normalized.length < AUTOCOMPLETE_MIN_LENGTH) {
      return {
        stations: [],
        warnings: []
      };
    }
    try {
      const payload = await fetchJson("/api/stations?q=" + encodeURIComponent(normalized));
      return {
        stations: payload.stations || [],
        warnings: payload.warnings || []
      };
    } catch (error) {
      const fallbackPayload = await fetchOdsayDirect("searchStation", { stationName: normalized });
      const stations = (fallbackPayload.result?.station || []).slice(0, 8).map((station) => ({
        name: station.stationName || station.stationNameKor || "",
        x: station.x,
        y: station.y,
        stationID: station.stationID || null,
        kind: Number(station.stationType ?? 0) === 1 || Number(station.stationClass ?? 0) === 2 ? "지하철" : "버스",
        detail: [
          station.stationCityName,
          station.stationDistrictName,
          station.stationDongName
        ].filter(Boolean).join(" · ")
      })).filter((station) => station.name && station.x && station.y);
      return {
        stations,
        warnings: ["서버 경로가 막혀 브라우저 직접 호출로 검색했습니다", error.message]
      };
    }
  }

  async function resolveStationByName(name) {
    const normalized = name.trim();
    if (!normalized) throw new Error("역 이름이 비어 있습니다");
    const result = await searchStations(normalized);
    if (!result.stations.length) throw new Error('"' + normalized + '" 검색 결과가 없습니다');
    return result.stations[0];
  }

  function buildRoutePayload(baseRoute, resolvedFrom, resolvedTo) {
      return {
        ...baseRoute,
        from: resolvedFrom,
        to: resolvedTo
      };
  }

  function inferTransferCount(info) {
    const rides = Number(info.busTransitCount || 0) + Number(info.subwayTransitCount || 0);
    return Math.max(0, rides - 1);
  }

  function summarizeCandidateSteps(subPaths) {
    return (subPaths || []).filter((segment) =>
      segment.trafficType === 1 ||
      segment.trafficType === 2 ||
      (segment.trafficType === 3 && Number(segment.sectionTime || 0) > 0)
    ).map((segment) => {
      if (segment.trafficType === 3) {
        return { type: "walk", label: `도보 ${segment.sectionTime || 0}분` };
      }
      if (segment.trafficType === 2) {
        return { type: "bus", label: segment.lane?.[0]?.busNo || "버스" };
      }
      return { type: "subway", label: segment.lane?.[0]?.name || "지하철" };
    }).slice(0, 6);
  }

  function normalizeSegments(subPaths) {
    return (subPaths || []).map((segment) => {
      if (segment.trafficType === 3) {
        return {
          kind: "도보",
          text: `${segment.startName || "이동"} → ${segment.endName || "연결"}`,
          time: `${segment.sectionTime || 0}분`
        };
      }
      if (segment.trafficType === 2) {
        return {
          kind: "버스",
          text: `${segment.lane?.[0]?.busNo || "버스"} · ${segment.startName || ""} → ${segment.endName || ""}`,
          time: `${segment.sectionTime || 0}분`
        };
      }
      return {
        kind: "지하철",
        text: `${segment.lane?.[0]?.name || "지하철"} · ${segment.startName || ""} → ${segment.endName || ""}`,
        time: `${segment.sectionTime || 0}분`
      };
    });
  }

  function getPathSectionTime(subPaths) {
    return (subPaths || []).reduce((sum, segment) => sum + Number(segment.sectionTime || 0), 0);
  }

  function getTransferTimingEstimate(subPaths, priority) {
    if (priority !== "best_eta") {
      return {
        transferWaitMin: 0,
        transferRiskLevel: "none",
        transferRiskText: null
      };
    }

    const transitIndices = (subPaths || []).map((segment, index) =>
      segment.trafficType === 1 || segment.trafficType === 2 ? index : -1
    ).filter((index) => index >= 0);

    if (transitIndices.length <= 1) {
      return {
        transferWaitMin: 0,
        transferRiskLevel: "none",
        transferRiskText: null
      };
    }

    let transferWaitMin = 0;
    let tightestSlackMin = null;

    transitIndices.slice(1).forEach((transitIndex) => {
      const segment = subPaths[transitIndex];
      const interval = Number(segment.intervalTime || 0);
      if (!(interval > 0)) return;

      const elapsedTravelMin = (subPaths || [])
        .slice(0, transitIndex)
        .reduce((sum, item) => sum + Number(item.sectionTime || 0), 0);

      const slackMin = interval - elapsedTravelMin;
      transferWaitMin += Math.max(0, slackMin);
      tightestSlackMin = tightestSlackMin == null ? slackMin : Math.min(tightestSlackMin, slackMin);
    });

    if (tightestSlackMin == null) {
      return {
        transferWaitMin,
        transferRiskLevel: "none",
        transferRiskText: null
      };
    }

    if (tightestSlackMin <= 1) {
      return {
        transferWaitMin,
        transferRiskLevel: "high",
        transferRiskText: tightestSlackMin < 0
          ? "환승 여유가 부족해 실제로는 다음 차를 놓칠 가능성이 큽니다."
          : `환승 여유가 ${tightestSlackMin}분 수준이라 지연 시 놓칠 가능성이 큽니다.`
      };
    }

    if (tightestSlackMin <= 4) {
      return {
        transferWaitMin,
        transferRiskLevel: "medium",
        transferRiskText: `환승 여유가 ${tightestSlackMin}분 정도라 조금만 지연돼도 놓칠 수 있습니다.`
      };
    }

    return {
      transferWaitMin,
      transferRiskLevel: "low",
      transferRiskText: null
    };
  }

  function getLastTransit(subPaths) {
    for (let index = (subPaths || []).length - 1; index >= 0; index -= 1) {
      const segment = subPaths[index];
      if (segment.trafficType === 1 || segment.trafficType === 2) {
        return segment;
      }
    }
    return null;
  }

  async function fetchRouteRecommendationDirect(route, from, to) {
    const pathType = route.transportFilter === "subway" ? "1" : route.transportFilter === "bus" ? "2" : "0";
    const payload = await fetchOdsayDirect("searchPubTransPathR", {
      SX: String(from.x),
      SY: String(from.y),
      EX: String(to.x),
      EY: String(to.y),
      SearchPathType: pathType,
      OPT: "0"
    });

    const rawPaths = payload.result?.path || [];
    if (!rawPaths.length) {
      throw new Error("조건에 맞는 경로가 없습니다");
    }

    const candidates = [];
    for (let index = 0; index < rawPaths.length; index += 1) {
      const path = rawPaths[index];
      const info = path.info || {};
      const subPaths = path.subPath || [];
      const firstTransit = subPaths.find((segment) => segment.trafficType === 1 || segment.trafficType === 2) || null;
      const firstTransitStartName = firstTransit?.startName || firstTransit?.startStationName || null;
      const initialWalkTime = subPaths
        .slice(0, Math.max(0, subPaths.findIndex((segment) => segment.trafficType === 1 || segment.trafficType === 2)))
        .filter((segment) => segment.trafficType === 3)
        .reduce((sum, segment) => sum + Number(segment.sectionTime || 0), 0);
      const interval = Number(firstTransit?.intervalTime || 0);
      let firstWaitMin = null;
      let firstWaitSource = "not_applicable";
      if (route.priority === "best_eta") {
        if (firstTransit?.trafficType === 2) {
          if (interval > 0) {
            firstWaitMin = Math.max(0, Math.max(1, Math.round(interval / 2)) - initialWalkTime);
            firstWaitSource = "interval";
          } else {
            firstWaitSource = "seoul_unavailable";
          }
        } else if (interval > 0) {
          firstWaitMin = Math.max(0, Math.max(1, Math.round(interval / 2)) - initialWalkTime);
          firstWaitSource = "interval";
        } else {
          firstWaitSource = "none";
        }
      }
      const unavailableBusRealtime = route.priority === "best_eta" && firstTransit?.trafficType === 2 && firstWaitMin == null;
      const transferTiming = getTransferTimingEstimate(subPaths, route.priority);
      const totalTime = getPathSectionTime(subPaths);
      const transferCount = inferTransferCount(info);
      const walkTime = subPaths.filter((segment) => segment.trafficType === 3).reduce((sum, segment) => sum + Number(segment.sectionTime || 0), 0);
      const lastTransit = getLastTransit(subPaths);
      const alightingStopName = lastTransit?.endName || lastTransit?.endStationName || null;
      let scoreValue = totalTime;
      let scoreDisplay = `${totalTime}분`;
      let note = "총 소요시간이 가장 짧은 후보를 우선합니다.";

      if (route.priority === "fewest_transfers") {
        scoreValue = transferCount * 1000 + totalTime;
        scoreDisplay = `${transferCount}회`;
        note = transferCount === 0 ? "환승 없이 가는 후보입니다." : `환승 ${transferCount}회 중 가장 단순한 후보입니다.`;
      } else if (route.priority === "best_eta") {
        if (unavailableBusRealtime) {
          scoreValue = totalTime + transferTiming.transferWaitMin;
          scoreDisplay = `${scoreValue}분`;
          note = transferTiming.transferWaitMin > 0
            ? `첫 탑승 실시간은 없지만 환승 대기 추정 ${transferTiming.transferWaitMin}분을 반영했습니다.`
            : "서울시 버스 실시간 도착정보가 없어 첫 탑승 대기 없이 비교했습니다.";
        } else {
          scoreValue = totalTime + (firstWaitMin || 0) + transferTiming.transferWaitMin;
          scoreDisplay = `${scoreValue}분`;
          note = firstWaitMin != null
            ? `첫 탑승 대기 ${firstWaitMin}분과 환승 대기 추정 ${transferTiming.transferWaitMin}분을 합쳐 비교했습니다.`
            : "첫 탑승과 환승을 바로 연결할 수 있다고 보고 총 이동시간 기준으로 비교했습니다.";
        }
      }

      candidates.push({
        id: `path-${index}`,
        scoreValue,
        scoreDisplay,
        totalTime,
        totalTimeText: `${totalTime}분`,
        transferCount,
        transferCountText: `${transferCount}회`,
        walkTime,
        walkTimeText: `${walkTime}분`,
        firstWaitMin,
        firstWaitText: route.priority !== "best_eta"
          ? "기준 아님"
          : (unavailableBusRealtime ? "실시간 미반영" : (firstWaitMin != null ? `${firstWaitMin}분` : "정보 없음")),
        firstWaitSource,
        unavailableBusRealtime,
        transferWaitMin: transferTiming.transferWaitMin,
        transferWaitText: route.priority === "best_eta" ? `${transferTiming.transferWaitMin}분` : "기준 아님",
        transferRiskLevel: transferTiming.transferRiskLevel,
        transferRiskText: transferTiming.transferRiskText,
        firstTransitLabel: firstTransit ? (firstTransit.trafficType === 2 ? (firstTransit.lane?.[0]?.busNo || "버스") : (firstTransit.lane?.[0]?.name || "지하철")) : "도보",
        boardingStopName: firstTransitStartName,
        boardingApproachText: firstTransitStartName
          ? (initialWalkTime > 0 ? `도보 후 ${firstTransitStartName} 탑승` : `${firstTransitStartName} 탑승`)
          : null,
        alightingStopName,
        summarySteps: summarizeCandidateSteps(subPaths),
        note,
        segments: normalizeSegments(subPaths)
      });
    }

    candidates.sort((a, b) => {
      if (a.scoreValue !== b.scoreValue) return a.scoreValue - b.scoreValue;
      if (a.totalTime !== b.totalTime) return a.totalTime - b.totalTime;
      return a.transferCount - b.transferCount;
    });

    return {
      fetchedAt: new Date().toISOString(),
      recommendedId: candidates[0].id,
      recommendation: candidates[0],
      candidates: candidates.slice(0, 4)
    };
  }

  async function refreshRoute(routeId) {
    return refreshRouteWithOptions(routeId, {});
  }

  async function refreshRouteWithOptions(routeId, options = {}) {
    const route = state.routes.find((item) => item.id === routeId);
    if (!route || state.loadingRouteIds.has(routeId)) return;
    const silent = Boolean(options.silent);

    state.loadingRouteIds.add(routeId);
    renderRoutes();

    try {
      const from = route.from?.x != null && route.from?.y != null ? route.from : await resolveStationByName(route.from?.name || "");
      const to = route.to?.x != null && route.to?.y != null ? route.to : await resolveStationByName(route.to?.name || "");
      const params = new URLSearchParams({
        fromX: String(from.x),
        fromY: String(from.y),
        toX: String(to.x),
        toY: String(to.y),
        priority: route.priority,
        transportFilter: route.transportFilter
      });

      let payload;
      try {
        payload = await fetchJson("/api/routes?" + params.toString());
      } catch (error) {
        payload = await fetchRouteRecommendationDirect(route, from, to);
        if (!silent) {
          showToast("서버 호출이 막혀 브라우저 직접 호출로 갱신했습니다");
        }
      }
      const nextRoute = buildRoutePayload(route, from, to);
      nextRoute.lastResult = payload;

      state.routes = state.routes.map((item) => item.id === routeId ? nextRoute : item);
      persistRoutes();
      renderRoutes();
      if (!silent) {
        showToast("추천을 새로 갱신했습니다");
      }
    } catch (error) {
      if (!silent) {
        showToast(error.message || "추천 갱신에 실패했습니다");
      }
      renderRoutes();
    } finally {
      state.loadingRouteIds.delete(routeId);
      renderRoutes();
    }
  }

  function deleteRoute(routeId) {
    state.routes = state.routes.filter((route) => route.id !== routeId);
    state.loadingRouteIds.delete(routeId);
    state.expandedRouteIds.delete(routeId);
    persistRoutes();
    renderRoutes();
    showToast("루트를 삭제했습니다");
  }

  function openModal(routeId = null) {
    state.modalRouteId = routeId;
    state.mapPickerTarget = null;
    const route = state.routes.find((item) => item.id === routeId) || null;

    document.getElementById("modal-title").textContent = route ? "루트 편집" : "새 루트 추가";
    document.getElementById("route-label-input").value = route?.label || "";
    document.getElementById("route-from-input").value = route?.from?.name || "";
    document.getElementById("route-to-input").value = route?.to?.name || "";

    state.autocompleteSelection.from = route?.from?.x != null && route?.from?.y != null ? route.from : null;
    state.autocompleteSelection.to = route?.to?.x != null && route?.to?.y != null ? route.to : null;
    updateMapPickButtons();
    updateLocationPreview("from", state.autocompleteSelection.from);
    updateLocationPreview("to", state.autocompleteSelection.to);

    setOptionGroupValue("priority", route?.priority || "fastest");
    setOptionGroupValue("transport", route?.transportFilter || "all");

    document.getElementById("modal-overlay").classList.add("active");
  }

  function closeModal() {
    state.modalRouteId = null;
    closeMapPicker();
    state.autocompleteSelection.from = null;
    state.autocompleteSelection.to = null;
    updateMapPickButtons();
    clearLocationPreview("from");
    clearLocationPreview("to");
    document.getElementById("route-from-dropdown").classList.remove("open");
    document.getElementById("route-to-dropdown").classList.remove("open");
    document.getElementById("modal-overlay").classList.remove("active");
  }

  function setOptionGroupValue(group, value) {
    document.querySelectorAll('[data-' + group + ']').forEach((card) => {
      const active = card.dataset[group] === value;
      card.classList.toggle("active", active);
      const input = card.querySelector("input");
      if (input) input.checked = active;
    });
  }

  function getSelectedValue(name) {
    return document.querySelector('input[name="' + name + '"]:checked')?.value;
  }

  async function saveRoute() {
    const label = document.getElementById("route-label-input").value.trim() || "루트";
    const fromName = document.getElementById("route-from-input").value.trim();
    const toName = document.getElementById("route-to-input").value.trim();
    const priority = getSelectedValue("priority") || "fastest";
    const transportFilter = getSelectedValue("transport") || "all";

    if (!fromName || !toName) {
      showToast("출발지와 도착지를 입력해주세요");
      return;
    }

    const original = state.routes.find((item) => item.id === state.modalRouteId);

    const from = state.autocompleteSelection.from && state.autocompleteSelection.from.name === fromName
      ? state.autocompleteSelection.from
      : { name: fromName, x: null, y: null };

    const to = state.autocompleteSelection.to && state.autocompleteSelection.to.name === toName
      ? state.autocompleteSelection.to
      : { name: toName, x: null, y: null };

    const route = {
      id: original?.id || uid(),
      label,
      from,
      to,
      priority,
      transportFilter,
      lastResult: original?.lastResult || null,
      createdAt: original?.createdAt || nowStamp()
    };

    if (original) {
      state.routes = state.routes.map((item) => item.id === route.id ? route : item);
      showToast("루트 설정을 저장했습니다");
    } else {
      state.routes = [route, ...state.routes];
      showToast("루트를 저장했습니다");
    }

    persistRoutes();
    renderRoutes();
    closeModal();
  }

  function toggleDetails(routeId) {
    if (state.expandedRouteIds.has(routeId)) {
      state.expandedRouteIds.delete(routeId);
    } else {
      state.expandedRouteIds.add(routeId);
      state.collapsedRouteIds.delete(routeId);
      localStorage.setItem(ROUTE_CARD_COLLAPSED_KEY, JSON.stringify([...state.collapsedRouteIds]));
    }
    renderRoutes();
  }

  function toggleRouteCollapse(routeId) {
    if (state.collapsedRouteIds.has(routeId)) {
      state.collapsedRouteIds.delete(routeId);
    } else {
      state.collapsedRouteIds.add(routeId);
      state.expandedRouteIds.delete(routeId);
    }
    localStorage.setItem(ROUTE_CARD_COLLAPSED_KEY, JSON.stringify([...state.collapsedRouteIds]));
    renderRoutes();
  }

  function bindStaticEvents() {
    document.getElementById("add-route-btn").addEventListener("click", () => openModal());
    document.getElementById("key-settings-btn").addEventListener("click", configureBrowserKey);
    document.getElementById("route-from-map-pick-btn").addEventListener("click", () => openMapPicker("from"));
    document.getElementById("route-to-map-pick-btn").addEventListener("click", () => openMapPicker("to"));
    document.getElementById("modal-close-btn").addEventListener("click", closeModal);
    document.getElementById("modal-cancel-btn").addEventListener("click", closeModal);
    document.getElementById("modal-save-btn").addEventListener("click", saveRoute);
    document.getElementById("map-picker-close-btn").addEventListener("click", closeMapPicker);
    document.getElementById("map-picker-cancel-btn").addEventListener("click", closeMapPicker);
    document.getElementById("map-picker-overlay").addEventListener("click", (event) => {
      if (event.target.id === "map-picker-overlay") closeMapPicker();
    });
    document.getElementById("modal-overlay").addEventListener("click", (event) => {
      if (event.target.id === "modal-overlay") closeModal();
    });

    document.getElementById("route-list").addEventListener("click", (event) => {
      const target = event.target.closest("[data-action]");
      if (!target) return;
      const { action, id } = target.dataset;
      if (action === "refresh") refreshRoute(id);
      if (action === "collapse") toggleRouteCollapse(id);
      if (action === "toggle") toggleDetails(id);
      if (action === "edit") openModal(id);
      if (action === "delete") deleteRoute(id);
    });

    document.querySelectorAll("#priority-options .option-card").forEach((card) => {
      card.addEventListener("click", () => setOptionGroupValue("priority", card.dataset.priority));
    });
    document.querySelectorAll("#transport-options .option-card").forEach((card) => {
      card.addEventListener("click", () => setOptionGroupValue("transport", card.dataset.transport));
    });
  }

  function setupAutocomplete(inputId, dropdownId, selectionKey) {
    const input = document.getElementById(inputId);
    const dropdown = document.getElementById(dropdownId);
    let currentItems = [];
    let focusedIndex = -1;
    let closeTimer = null;
    let pointerInsideDropdown = false;

    const renderDropdownShell = (previewContent, rightContent) => {
      dropdown.innerHTML = `
        <div class="autocomplete-panel">
          <div class="autocomplete-preview${previewContent.empty ? " empty" : ""}" id="route-${selectionKey}-dropdown-preview">${previewContent.html}</div>
          <div class="autocomplete-results">${rightContent}</div>
        </div>
      `;
      dropdown.classList.add("open");
    };

    const renderDropdown = (items, loading = false, warnings = []) => {
      currentItems = items;
      focusedIndex = -1;
      if (loading) {
        renderDropdownShell(
          { empty: true, html: "검색 중..." },
          '<div class="autocomplete-empty">위치 후보를 불러오고 있습니다.</div>'
        );
        return;
      }
      if (!items.length) {
        renderDropdownShell(
          { empty: true, html: "검색 결과가 없어 위치를 미리 볼 수 없습니다." },
          '<div class="autocomplete-empty">검색 결과 없음</div>' + (warnings.length ? `<div class="autocomplete-warning">${escapeHtml(warnings.join(" / "))}</div>` : "")
        );
        return;
      }
      const listHtml = items.map((station, index) => `
        <div class="autocomplete-item ${index === 0 ? "focused" : ""}" data-index="${index}">
          <span class="autocomplete-text">
            <span class="autocomplete-name">${escapeHtml(station.name)}</span>
            ${station.detail ? `<span class="autocomplete-detail">${escapeHtml(station.detail)}</span>` : ""}
          </span>
          <span class="autocomplete-meta">${escapeHtml(station.kind)}</span>
        </div>
      `).join("");

      renderDropdownShell(
        { empty: true, html: "목록에서 항목에 마우스를 올리거나 방향키로 이동하면 위치가 여기에 보입니다." },
        `
          <div class="autocomplete-results-head">
            <strong>검색 결과</strong>
            <span>${items.length}건</span>
          </div>
          <div class="autocomplete-scroll">${listHtml}</div>
          ${warnings.length ? `<div class="autocomplete-warning">${escapeHtml(warnings.join(" / "))}</div>` : ""}
        `
      );
      focusedIndex = 0;
      updateAutocompletePreview(selectionKey, items[0]);
    };

    const closeDropdown = () => {
      clearTimeout(closeTimer);
      closeTimer = null;
      dropdown.classList.remove("open");
      focusedIndex = -1;
      clearAutocompletePreview(selectionKey);
    };

    const scheduleCloseDropdown = () => {
      clearTimeout(closeTimer);
      closeTimer = setTimeout(() => {
        if (pointerInsideDropdown) return;
        closeDropdown();
      }, 180);
    };

    const selectItem = (station) => {
      state.mapPickerTarget = null;
      updateMapPickButtons();
      state.autocompleteSelection[selectionKey] = station;
      input.value = station.name;
      updateLocationPreview(selectionKey, station);
      closeDropdown();
    };

    const debouncedSearch = debounce(async () => {
      const value = input.value.trim();
      if (value.length < AUTOCOMPLETE_MIN_LENGTH) {
        closeDropdown();
        return;
      }
      renderDropdown([], true);
      try {
        const result = await searchStations(value);
        renderDropdown(result.stations, false, result.warnings);
      } catch (error) {
        renderDropdownShell(
          { empty: true, html: "검색을 완료하지 못했습니다." },
          '<div class="autocomplete-empty">' + escapeHtml(error.message || "검색 실패") + '</div>'
        );
      }
    }, 320);

    input.addEventListener("input", () => {
      if (state.mapPickerTarget === selectionKey) {
        state.mapPickerTarget = null;
        updateMapPickButtons();
      }
      state.autocompleteSelection[selectionKey] = null;
      clearLocationPreview(selectionKey);
      debouncedSearch();
    });

    input.addEventListener("keydown", (event) => {
      if (!dropdown.classList.contains("open")) return;
      if (event.key === "ArrowDown") {
        event.preventDefault();
        focusedIndex = Math.min(focusedIndex + 1, currentItems.length - 1);
      } else if (event.key === "ArrowUp") {
        event.preventDefault();
        focusedIndex = Math.max(focusedIndex - 1, 0);
      } else if (event.key === "Enter") {
        if (focusedIndex >= 0 && currentItems[focusedIndex]) {
          event.preventDefault();
          selectItem(currentItems[focusedIndex]);
        }
      } else if (event.key === "Escape") {
        closeDropdown();
      } else {
        return;
      }

      dropdown.querySelectorAll(".autocomplete-item").forEach((item, index) => {
        item.classList.toggle("focused", index === focusedIndex);
      });
      if (focusedIndex >= 0 && currentItems[focusedIndex]) {
        updateAutocompletePreview(selectionKey, currentItems[focusedIndex]);
      }
    });

    dropdown.addEventListener("mousedown", (event) => {
      const item = event.target.closest("[data-index]");
      if (!item) return;
      event.preventDefault();
      selectItem(currentItems[Number(item.dataset.index)]);
    });

    dropdown.addEventListener("mousemove", (event) => {
      const item = event.target.closest("[data-index]");
      if (!item) return;
      const index = Number(item.dataset.index);
      if (!Number.isNaN(index) && currentItems[index]) {
        focusedIndex = index;
        dropdown.querySelectorAll(".autocomplete-item").forEach((node, nodeIndex) => {
          node.classList.toggle("focused", nodeIndex === focusedIndex);
        });
        updateAutocompletePreview(selectionKey, currentItems[index]);
      }
    });

    dropdown.addEventListener("mouseenter", () => {
      pointerInsideDropdown = true;
      clearTimeout(closeTimer);
      closeTimer = null;
    });

    dropdown.addEventListener("mouseleave", () => {
      pointerInsideDropdown = false;
      if (document.activeElement !== input) {
        scheduleCloseDropdown();
      }
    });

    input.addEventListener("focus", () => {
      clearTimeout(closeTimer);
      closeTimer = null;
    });

    input.addEventListener("blur", () => {
      scheduleCloseDropdown();
    });
  }

  function debounce(fn, ms) {
    let timer;
    return (...args) => {
      clearTimeout(timer);
      timer = setTimeout(() => fn(...args), ms);
    };
  }

  if (window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone) {
    document.body.classList.add("is-standalone");
  }

  localStorage.removeItem("transit-station-cache");
  state.routes = migrateAndLoadRoutes();
  bindStaticEvents();
  updateMapPickButtons();
  setupAutocomplete("route-from-input", "route-from-dropdown", "from");
  setupAutocomplete("route-to-input", "route-to-dropdown", "to");
  setOptionGroupValue("priority", "fastest");
  setOptionGroupValue("transport", "all");
  updateClock();
  setInterval(updateClock, 10000);
  renderRoutes();
</script>
</body>
</html>
