  function openMapPicker(selectionKey) {
    state.mapPickerTarget = selectionKey;
    updateMapPickButtons();
    document.getElementById("map-picker-title").textContent = selectionKey === "from" ? "출발지를 지도에서 선택" : "도착지를 지도에서 선택";
    document.getElementById("map-picker-subtitle").textContent = "큰 지도에서 정확한 위치를 누르면 즉시 저장됩니다.";
    document.getElementById("map-picker-status").textContent = "핀을 찍을 지점을 찾은 뒤 지도를 한 번 눌러 선택하세요.";
    document.getElementById("map-picker-overlay").classList.add("active");
    renderMapPicker();
  }

  function closeMapPicker() {
    const existing = state.previewMaps.mapPicker;
    if (existing?.map) {
      existing.map.remove();
    }
    delete state.previewMaps.mapPicker;
    state.mapPickerTarget = null;
    document.getElementById("map-picker-overlay").classList.remove("active");
    updateMapPickButtons();
  }

  function renderMapPicker() {
    const selectionKey = state.mapPickerTarget;
    const mapEl = document.getElementById("map-picker-map");
    if (!selectionKey || !mapEl) return;

    const location = state.autocompleteSelection[selectionKey];
    const lat = location?.y != null ? Number(location.y) : 37.5665;
    const lng = location?.x != null ? Number(location.x) : 126.9780;
    const zoom = location?.y != null && location?.x != null ? 16 : 13;

    requestAnimationFrame(() => {
      let preview = state.previewMaps.mapPicker;
      if (!preview) {
        mapEl.innerHTML = "";
        if (typeof L === "undefined") {
          mapEl.textContent = "지도를 불러오지 못했습니다.";
          return;
        }
        const map = L.map("map-picker-map", {
          zoomControl: true,
          attributionControl: false,
          dragging: true,
          scrollWheelZoom: true,
          doubleClickZoom: true,
          touchZoom: true,
          keyboard: false
        });
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          maxZoom: 19
        }).addTo(map);
        let marker = null;
        if (location?.x != null && location?.y != null) {
          marker = L.marker([lat, lng]).addTo(map);
        }
        map.on("click", (event) => {
          if (!state.mapPickerTarget) return;
          handleMapPick(state.mapPickerTarget, event.latlng.lat, event.latlng.lng);
        });
        preview = { map, marker };
        state.previewMaps.mapPicker = preview;
      } else {
        if (location?.x != null && location?.y != null) {
          if (!preview.marker) {
            preview.marker = L.marker([lat, lng]).addTo(preview.map);
          } else {
            preview.marker.setLatLng([lat, lng]);
          }
        }
      }

      preview.map.setView([lat, lng], zoom);
      preview.map.invalidateSize();
    });
  }

  async function resolveStationByName(name) {
    const normalized = name.trim();
    if (!normalized) throw new Error("역 이름이 비어 있습니다");
    const result = await searchStations(normalized);
    if (!result.stations.length) throw new Error('"' + normalized + '" 검색 결과가 없습니다');
    return result.stations[0];
  }

  function buildRoutePayload(baseRoute, resolvedFrom, resolvedTo) {
      return {
        ...baseRoute,
        from: resolvedFrom,
        to: resolvedTo
      };
  }

  async function refreshRoute(routeId) {
    return refreshRouteWithOptions(routeId, {});
  }

  function getCurrentPositionAsync(options = { enableHighAccuracy: true, maximumAge: 15000, timeout: 8000 }) {
    return new Promise((resolve, reject) => {
      if (!navigator.geolocation) {
        reject(new Error("위치 정보를 사용할 수 없는 환경입니다"));
        return;
      }
      navigator.geolocation.getCurrentPosition(
        (position) => resolve({ x: position.coords.longitude, y: position.coords.latitude }),
        (error) => reject(new Error(error.message || "위치 정보를 가져오지 못했습니다")),
        options
      );
    });
  }

  async function resolveCurrentLocationFrom() {
    if (state.userLocation?.lat != null && state.userLocation?.lng != null) {
      return { name: "현재 위치", isCurrentLocation: true, x: state.userLocation.lng, y: state.userLocation.lat, kind: "현재 위치" };
    }
    const coords = await getCurrentPositionAsync();
    state.userLocation = { lat: coords.y, lng: coords.x };
    return { name: "현재 위치", isCurrentLocation: true, x: coords.x, y: coords.y, kind: "현재 위치" };
  }

  async function refreshRouteWithOptions(routeId, options = {}) {
    const route = state.routes.find((item) => item.id === routeId);
    if (!route || state.loadingRouteIds.has(routeId)) return;
    const silent = Boolean(options.silent);

    state.loadingRouteIds.add(routeId);
    const loadingCard = document.querySelector(`.route-card[data-route-id="${CSS.escape(routeId)}"]`);
    if (loadingCard) loadingCard.classList.add("loading");

    try {
      const from = await resolveCurrentLocationFrom();
      const to = route.to?.x != null && route.to?.y != null ? route.to : await resolveStationByName(route.to?.name || "");
      const params = new URLSearchParams({
        fromX: String(from.x),
        fromY: String(from.y),
        toX: String(to.x),
        toY: String(to.y),
        priority: "overview",
        transportFilter: "bus"
      });

      let payload;
      try {
        payload = tagRoutePicks(await fetchJson("/api/routes?" + params.toString()));
      } catch (error) {
        payload = await fetchRouteRecommendationDirect(route, from, to);
        if (!silent) {
          showToast("서버 호출이 막혀 브라우저 직접 호출로 갱신했습니다");
        }
      }
      const nextRoute = buildRoutePayload(route, from, to);
      nextRoute.lastResult = payload;

      state.routes = state.routes.map((item) => item.id === routeId ? nextRoute : item);
      persistRoutes();
      if (!silent) {
        showToast("추천을 새로 갱신했습니다");
      }
    } catch (error) {
      if (!silent) {
        showToast(error.message || "추천 갱신에 실패했습니다");
      }
    } finally {
      state.loadingRouteIds.delete(routeId);
      renderRoutes();
    }
  }

  function deleteRoute(routeId) {
    state.routes = state.routes.filter((route) => route.id !== routeId);
    state.loadingRouteIds.delete(routeId);
    state.expandedRouteIds.delete(routeId);
    if (state.collapsedRouteIds.delete(routeId)) {
      localStorage.setItem(ROUTE_CARD_COLLAPSED_KEY, JSON.stringify([...state.collapsedRouteIds]));
    }
    delete state.selectedCandidateIds[routeId];
    if (state.activeRouteId === routeId) state.activeRouteId = null;
    clearLiveMapTimer(routeId);
    persistRoutes();
    renderRoutes();
    showToast("루트를 삭제했습니다");
  }

  function openModal(routeId = null) {
    state.modalRouteId = routeId;
    state.mapPickerTarget = null;

  function setOptionGroupValue(group, value) {

      card.classList.toggle("active", active);

  function getSelectedValue(name) {
    return document.querySelector('input[name="' + name + '"]:checked')?.value;
  }

  async function saveRoute() {
    const label = document.getElementById("route-label-input").value.trim() || "루트";
    const toName = document.getElementById("route-to-input").value.trim();
    const priority = getSelectedValue("priority") || "fastest";
    const transportFilter = "bus";

    if (!toName) {
      showToast("목적지를 입력해주세요");
      return;
    }

    const original = state.routes.find((item) => item.id === state.modalRouteId);

    const from = { name: "현재 위치", isCurrentLocation: true, x: null, y: null, kind: "현재 위치" };

    const to = state.autocompleteSelection.to && state.autocompleteSelection.to.name === toName
      ? state.autocompleteSelection.to
      : { name: toName, x: null, y: null };

    const route = {
      id: original?.id || uid(),
      label,
      from,
      to,
      priority,
      transportFilter,
      lastResult: original?.lastResult || null,
      createdAt: original?.createdAt || nowStamp()
    };

    if (original) {
      state.routes = state.routes.map((item) => item.id === route.id ? route : item);
      showToast("루트 설정을 저장했습니다");
    } else {
      state.routes = [route, ...state.routes];
      showToast("루트를 저장했습니다");
    }

    persistRoutes();
    renderRoutes();
    closeModal();
  }

  function toggleDetails(routeId) {
    if (state.expandedRouteIds.has(routeId)) {
      state.expandedRouteIds.delete(routeId);
    } else {
      state.expandedRouteIds.add(routeId);
      state.collapsedRouteIds.delete(routeId);
      localStorage.setItem(ROUTE_CARD_COLLAPSED_KEY, JSON.stringify([...state.collapsedRouteIds]));
    }
    renderRoutes();
  }

  function toggleRouteCollapse(routeId) {
    if (state.collapsedRouteIds.has(routeId)) {
      state.collapsedRouteIds.delete(routeId);
    } else {
      state.collapsedRouteIds.add(routeId);
      state.expandedRouteIds.delete(routeId);
    }
    localStorage.setItem(ROUTE_CARD_COLLAPSED_KEY, JSON.stringify([...state.collapsedRouteIds]));
    renderRoutes();
  }

  function bindStaticEvents() {
    document.getElementById("add-route-btn").addEventListener("click", () => openModal());
    document.getElementById("key-settings-btn").addEventListener("click", configureBrowserKey);
    document.getElementById("header-refresh-btn").addEventListener("click", () => triggerActiveRefresh({ silent: false }));
    document.getElementById("tracking-toggle-btn").addEventListener("click", () => toggleTracking());
    updateOdsayKeyVisibility();
    document.getElementById("route-to-map-pick-btn").addEventListener("click", () => openMapPicker("to"));
    document.getElementById("modal-close-btn").addEventListener("click", closeModal);
    document.getElementById("modal-cancel-btn").addEventListener("click", closeModal);
    document.getElementById("modal-save-btn").addEventListener("click", saveRoute);
    document.getElementById("map-picker-close-btn").addEventListener("click", closeMapPicker);
    document.getElementById("map-picker-cancel-btn").addEventListener("click", closeMapPicker);

      if (event.target.id === "map-picker-overlay") closeMapPicker();

    document.getElementById("modal-overlay").addEventListener("click", (event) => {
      if (event.target.id === "modal-overlay") closeModal();
    });

    bindRouteTabs();
    bindRouteSwipe();

    document.getElementById("route-list").addEventListener("click", (event) => {
      const target = event.target.closest("[data-action]");
      if (!target) return;
      const { action, id } = target.dataset;
      if (action === "refresh") refreshRoute(id);
      if (action === "collapse") toggleRouteCollapse(id);
      if (action === "toggle") toggleDetails(id);
      if (action === "edit") openModal(id);
      if (action === "delete") deleteRoute(id);
      if (action === "select-candidate") selectCandidate(id, target.dataset.candidateId);
      if (action === "start-boarding") {
        const route = state.routes.find((r) => r.id === id);
        const candidate = route ? getSelectedCandidate(route) : null;
        const vehicleKey = event.target.closest("[data-vehicle-key]")?.dataset.vehicleKey;
        if (route && candidate) startBoarding(id, candidate, vehicleKey);
      }
      if (action === "end-boarding") endBoarding("manual");
    });

    document.querySelectorAll("#priority-options .option-card").forEach((card) => {
      card.addEventListener("click", () => setOptionGroupValue("priority", card.dataset.priority));
    });
  }

  function setupAutocomplete(inputId, dropdownId, selectionKey) {
    const input = document.getElementById(inputId);
    const dropdown = document.getElementById(dropdownId);
    let currentItems = [];
    let focusedIndex = -1;
    let closeTimer = null;
    let pointerInsideDropdown = false;

    const renderDropdownShell = (previewContent, rightContent) => {
      dropdown.innerHTML = `
        <div class="autocomplete-panel">
          <div class="autocomplete-preview${previewContent.empty ? " empty" : ""}" id="route-${selectionKey}-dropdown-preview">${previewContent.html}</div>
          <div class="autocomplete-results">${rightContent}</div>
        </div>
      `;
      dropdown.classList.add("open");
    };

    const renderDropdown = (items, loading = false, warnings = []) => {
      currentItems = items;
      focusedIndex = -1;
      if (loading) {
        renderDropdownShell(
          { empty: true, html: "검색 중..." },
          '<div class="autocomplete-empty">위치 후보를 불러오고 있습니다.</div>'
        );
        return;
      }
      if (!items.length) {
        renderDropdownShell(
          { empty: true, html: "검색 결과가 없어 위치를 미리 볼 수 없습니다." },
          '<div class="autocomplete-empty">검색 결과 없음</div>' + (warnings.length ? `<div class="autocomplete-warning">${escapeHtml(warnings.join(" / "))}</div>` : "")
        );
        return;
      }
      const listHtml = items.map((station, index) => `
        <div class="autocomplete-item ${index === 0 ? "focused" : ""}" data-index="${index}">
          <span class="autocomplete-text">
            <span class="autocomplete-name">${escapeHtml(station.name)}</span>
            ${station.detail ? `<span class="autocomplete-detail">${escapeHtml(station.detail)}</span>` : ""}
          </span>
          <span class="autocomplete-meta">${escapeHtml(station.kind)}</span>
        </div>
      `).join("");

      renderDropdownShell(
        { empty: true, html: "목록에서 항목에 마우스를 올리거나 방향키로 이동하면 위치가 여기에 보입니다." },
        `
          <div class="autocomplete-results-head">
            <strong>검색 결과</strong>
            <span>${items.length}건</span>
          </div>
          <div class="autocomplete-scroll">${listHtml}</div>
          ${warnings.length ? `<div class="autocomplete-warning">${escapeHtml(warnings.join(" / "))}</div>` : ""}
        `
      );
      focusedIndex = 0;
      updateAutocompletePreview(selectionKey, items[0]);
    };

    const closeDropdown = () => {
      clearTimeout(closeTimer);
      closeTimer = null;
      dropdown.classList.remove("open");
      focusedIndex = -1;
      clearAutocompletePreview(selectionKey);
    };

    const scheduleCloseDropdown = () => {
      clearTimeout(closeTimer);
      closeTimer = setTimeout(() => {
        if (pointerInsideDropdown) return;
        closeDropdown();
      }, 180);
    };

    const selectItem = (station) => {
      state.mapPickerTarget = null;
      updateMapPickButtons();
      state.autocompleteSelection[selectionKey] = station;
      input.value = station.name;
      updateLocationPreview(selectionKey, station);
      closeDropdown();
    };

    const debouncedSearch = debounce(async () => {
      const value = input.value.trim();
      if (value.length < AUTOCOMPLETE_MIN_LENGTH) {
        closeDropdown();
        return;
      }
      renderDropdown([], true);
      try {
        const result = await searchStations(value);
        renderDropdown(result.stations, false, result.warnings);
      } catch (error) {
        renderDropdownShell(
          { empty: true, html: "검색을 완료하지 못했습니다." },
          '<div class="autocomplete-empty">' + escapeHtml(error.message || "검색 실패") + '</div>'
        );
      }
    }, 320);

    input.addEventListener("input", () => {
      if (state.mapPickerTarget === selectionKey) {
        state.mapPickerTarget = null;
        updateMapPickButtons();
      }
      state.autocompleteSelection[selectionKey] = null;
      clearLocationPreview(selectionKey);
      debouncedSearch();
    });

    input.addEventListener("keydown", (event) => {
      if (!dropdown.classList.contains("open")) return;
      if (event.key === "ArrowDown") {
        event.preventDefault();
        focusedIndex = Math.min(focusedIndex + 1, currentItems.length - 1);
      } else if (event.key === "ArrowUp") {
        event.preventDefault();
        focusedIndex = Math.max(focusedIndex - 1, 0);
      } else if (event.key === "Enter") {
        if (focusedIndex >= 0 && currentItems[focusedIndex]) {
          event.preventDefault();
          selectItem(currentItems[focusedIndex]);
        }
      } else if (event.key === "Escape") {
        closeDropdown();
      } else {
        return;
      }

      dropdown.querySelectorAll(".autocomplete-item").forEach((item, index) => {
        item.classList.toggle("focused", index === focusedIndex);
      });
      if (focusedIndex >= 0 && currentItems[focusedIndex]) {
        updateAutocompletePreview(selectionKey, currentItems[focusedIndex]);
      }
    });

    dropdown.addEventListener("mousedown", (event) => {
      const item = event.target.closest("[data-index]");
      if (!item) return;
      event.preventDefault();
      selectItem(currentItems[Number(item.dataset.index)]);
    });

    dropdown.addEventListener("mousemove", (event) => {
      const item = event.target.closest("[data-index]");
      if (!item) return;
      const index = Number(item.dataset.index);
      if (!Number.isNaN(index) && currentItems[index]) {
        focusedIndex = index;
        dropdown.querySelectorAll(".autocomplete-item").forEach((node, nodeIndex) => {
          node.classList.toggle("focused", nodeIndex === focusedIndex);
        });
        updateAutocompletePreview(selectionKey, currentItems[index]);
      }
    });

    dropdown.addEventListener("mouseenter", () => {
      pointerInsideDropdown = true;
      clearTimeout(closeTimer);
      closeTimer = null;
    });

    dropdown.addEventListener("mouseleave", () => {
      pointerInsideDropdown = false;
      if (document.activeElement !== input) {
        scheduleCloseDropdown();
      }
    });

    input.addEventListener("focus", () => {
      clearTimeout(closeTimer);
      closeTimer = null;
    });

    input.addEventListener("blur", () => {
      scheduleCloseDropdown();
    });
  }

  function debounce(fn, ms) {
    let timer;
    return (...args) => {
      clearTimeout(timer);
      timer = setTimeout(() => fn(...args), ms);
    };
  }

  if (window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone) {
    document.body.classList.add("is-standalone");
  }

  localStorage.removeItem("transit-station-cache");
  bindStaticEvents();
  updateMapPickButtons();
  setupAutocomplete("route-to-input", "route-to-dropdown", "to");
  setOptionGroupValue("priority", "fastest");
  updateClock();
  setInterval(updateClock, 10000);
  renderRoutes();
  maybeInitialAutoRefresh();

  function tickCountdowns() {
    const nowMs = Date.now();

    document.querySelectorAll("[data-arrive-at]").forEach((node) => {
      if (!node.classList.contains("promoted")) {
        const deadline = node.getAttribute("data-fallback-deadline");
        const fbArrive = node.getAttribute("data-fallback-arrive-at");
        if (deadline && fbArrive && new Date(deadline).getTime() <= nowMs) {
          node.setAttribute("data-arrive-at", fbArrive);
          node.classList.add("promoted");
          const label = node.querySelector("[data-arrive-label]");
          if (label) label.textContent = `${formatClock(fbArrive)} 도착`;
          const note = node.querySelector("[data-journey-note]");
          if (note) note.textContent = "첫 차 놓침 · 같은 노선 다음 차 기준";
          document.querySelectorAll(`[data-fallback-row][data-fallback-deadline="${deadline}"]`).forEach((row) => {
            row.classList.add("consumed");
          });
        }
      }

      const iso = node.getAttribute("data-arrive-at");
      const cd = formatCountdown(iso, nowMs);
      const badge = node.querySelector("[data-countdown-arrive]");
      if (!badge) return;
      badge.textContent = cd.text;
      badge.classList.remove("urgent", "missed");
      if (cd.state === "urgent") badge.classList.add("urgent");
      if (cd.state === "missed") badge.classList.add("missed");
    });

    document.querySelectorAll("[data-countdown-eta]").forEach((node) => {
      const iso = node.getAttribute("data-countdown-eta");
      const target = new Date(iso).getTime();
      if (Number.isNaN(target)) return;
      const diffSec = Math.round((target - nowMs) / 1000);
      const parent = node.closest(".bus-line-bus");
      if (diffSec < 0) {
        node.textContent = `${Math.max(1, Math.ceil(-diffSec / 60))}분 전 통과`;
        if (parent) parent.classList.add("uncatchable");
      } else if (diffSec < 60) {
        node.textContent = `${diffSec}초 후`;
      } else if (diffSec < 300) {
        node.textContent = `${Math.floor(diffSec / 60)}분 ${diffSec % 60}초 후`;
      } else {
        node.textContent = `${Math.round(diffSec / 60)}분 후`;
      }
    });
  }

  tickCountdowns();
  setInterval(tickCountdowns, 1000);
</script>
</body>
</html>
