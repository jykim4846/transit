<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f2ece1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Transit">
<title>Transit</title>
<link rel="icon" href="data:,">
<link rel="manifest" href="/site.webmanifest">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --bg: #fff8f5;
    --bg-strong: #ffeee7;
    --paper: rgba(255, 255, 255, 0.92);
    --paper-strong: #ffffff;
    --line: rgba(255, 169, 173, 0.18);
    --text: #3a2c2b;
    --text-muted: #8a7674;
    --accent: #79cdb8;
    --accent-strong: #56b39c;
    --accent-soft: rgba(121, 205, 184, 0.18);
    --orange: #ffb479;
    --orange-soft: rgba(255, 180, 121, 0.22);
    --blue: #93bcff;
    --blue-soft: rgba(147, 188, 255, 0.22);
    --danger: #ff8a9a;
    --shadow: 0 22px 50px rgba(255, 169, 173, 0.18);
    --radius-xl: 28px;
    --radius-lg: 20px;
    --radius-md: 14px;
    --mono: "Space Mono", monospace;
    /* 코지팝 파스텔 팔레트 — 더 밝고 비비드 */
    --pastel-pink: #ffe3ec;
    --pastel-pink-strong: #ffc1d4;
    --pastel-sky: #dff0ff;
    --pastel-sky-strong: #b8dcff;
    --pastel-yellow: #fff4c4;
    --pastel-mint: #d5f3e6;
    --pastel-lavender: #ece1ff;
    --cheek-pink: #ffc0cf;
  }

  * {
    box-sizing: border-box;
  }

  html, body {
    margin: 0;
    min-height: 100%;
    background: var(--bg);
    overflow-x: hidden;
  }

  body {
    font-family: "Gowun Dodum", "IBM Plex Sans KR", sans-serif;
    color: var(--text);
    min-height: 100dvh;
    overscroll-behavior-y: none;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    background:
      radial-gradient(circle at top left, rgba(147, 188, 255, 0.18), transparent 30%),
      radial-gradient(circle at top right, rgba(255, 195, 212, 0.22), transparent 28%),
      radial-gradient(circle at bottom right, rgba(213, 243, 230, 0.25), transparent 32%),
      linear-gradient(180deg, #fff8f5 0%, #fffaf6 100%);
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image:
      linear-gradient(rgba(255, 255, 255, 0.15) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255, 255, 255, 0.15) 1px, transparent 1px);
    background-size: 28px 28px;
    mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.25), transparent 80%);
    opacity: 0.25;
  }

  .app-shell {
    width: min(860px, calc(100vw - 28px));
    margin: 0 auto;
    padding: calc(26px + env(safe-area-inset-top, 0px)) 0 calc(48px + env(safe-area-inset-bottom, 0px));
    position: relative;
    z-index: 1;
    overflow-x: clip;
  }

  body.is-standalone .app-shell {
    padding-top: calc(18px + env(safe-area-inset-top, 0px));
  }

  .hero {
    background: linear-gradient(135deg, rgba(255, 250, 242, 0.92), rgba(255, 246, 232, 0.82));
    border: 1px solid rgba(71, 57, 29, 0.08);
    border-radius: 32px;
    padding: 26px 24px 22px;
    box-shadow: var(--shadow);
    backdrop-filter: blur(18px);
  }

  .hero-top {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    align-items: flex-start;
    margin-bottom: 22px;
  }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.7);
    color: var(--text-muted);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .hero h1 {
    margin: 12px 0 10px;
    font-size: clamp(30px, 6vw, 46px);
    line-height: 1.03;
    letter-spacing: -0.04em;
  }

  .hero p {
    margin: 0;
    max-width: 560px;
    color: var(--text-muted);
    line-height: 1.6;
    font-size: 14px;
  }

  .hero-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
  }

  .clock-badge {
    font-family: var(--mono);
    font-size: 13px;
    padding: 12px 14px;
    border-radius: 16px;
    background: rgba(32, 24, 16, 0.05);
    color: var(--accent-strong);
    border: 1px solid rgba(30, 122, 95, 0.12);
    min-width: 104px;
    text-align: center;
  }

  .hero-note {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 10px;
  }

  .hero-note-card {
    background: rgba(255, 255, 255, 0.7);
    border: 1px solid rgba(71, 57, 29, 0.08);
    border-radius: 18px;
    padding: 14px;
  }

  .hero-note-card strong {
    display: block;
    margin-bottom: 6px;
    font-size: 13px;
  }

  .hero-note-card span {
    color: var(--text-muted);
    font-size: 13px;
    line-height: 1.45;
  }

  .section {
    margin-top: 24px;
  }

  .section-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }

  .section-head h2 {
    margin: 0;
    font-size: 18px;
    letter-spacing: -0.03em;
  }

  .section-head span {
    color: var(--text-muted);
    font-size: 13px;
  }

  .route-list {
    display: block;
  }

  @keyframes card-fade-in {
    from {
      opacity: 0;
      transform: translateY(6px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .route-list > .route-card {
    display: none;
  }

  .route-list > .route-card.active {
    display: block;
    animation: card-fade-in 0.24s ease both;
  }

  .route-tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin: 8px 0 12px;
  }

  .route-tabs:empty { display: none; }

  .route-tab {
    flex: 0 0 auto;
    padding: 8px 14px;
    border-radius: 999px;
    background: rgba(255, 252, 247, 0.82);
    border: 1px solid var(--line);
    color: var(--text-muted);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.16s ease, color 0.16s ease, border-color 0.16s ease, transform 0.14s ease;
  }

  .route-tab:hover {
    background: rgba(255, 252, 247, 0.96);
    border-color: rgba(71, 57, 29, 0.22);
    color: var(--text);
    transform: translateY(-1px);
  }

  .route-tab:active {
    transform: translateY(0);
  }

  .route-tab.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
    box-shadow: 0 6px 16px rgba(30, 122, 95, 0.24);
    transform: none;
  }

  .route-card {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow);
    backdrop-filter: blur(14px);
    overflow: hidden;
  }

  .route-card.loading {
    opacity: 0.76;
  }

  .route-card.collapsed .route-main {
    padding-bottom: 22px;
  }

  .route-card.commute-pinned {
    border-color: rgba(59, 130, 246, 0.55);
    box-shadow: 0 8px 24px rgba(59, 130, 246, 0.18), var(--shadow);
  }

  .commute-pin-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 8px;
    margin-left: 6px;
    border-radius: 999px;
    background: rgba(59, 130, 246, 0.12);
    color: #1d4ed8;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: -0.2px;
  }

  .route-main {
    padding: 22px 22px 18px;
  }

  .route-main-top {
    display: flex;
    justify-content: space-between;
    gap: 14px;
    align-items: flex-start;
  }

  .route-names {
    min-width: 0;
  }

  .route-kicker {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 10px;
  }

  .pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
    line-height: 1;
    border: 1px solid transparent;
  }

  .pill.label {
    background: rgba(32, 24, 16, 0.06);
    color: var(--text);
  }

  .pill.priority-fastest,
  .pill.priority-best_eta {
    background: var(--accent-soft);
    color: var(--accent-strong);
    border-color: rgba(30, 122, 95, 0.12);
  }

  .pill.priority-fewest_transfers {
    background: var(--blue-soft);
    color: var(--blue);
    border-color: rgba(28, 91, 183, 0.12);
  }

  .pill.transport {
    background: var(--orange-soft);
    color: var(--orange);
    border-color: rgba(197, 99, 31, 0.12);
  }

  .route-title {
    font-size: clamp(21px, 4vw, 28px);
    line-height: 1.18;
    letter-spacing: -0.04em;
    word-break: keep-all;
  }

  .route-title .arrow {
    color: var(--text-muted);
    margin: 0 8px;
  }

  .route-subtitle {
    margin-top: 10px;
    color: var(--text-muted);
    font-size: 14px;
    line-height: 1.5;
  }

  .route-overview {
    align-items: center;
  }

  .route-overview-copy {
    min-width: 0;
  }

  .route-overview-copy p {
    margin: 6px 0 0;
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.5;
  }

  .route-footer {
    margin-top: 24px;
    padding: 18px;
    border-radius: 18px;
    background: var(--paper);
    border: 1px solid var(--line);
  }

  .route-footer h2 {
    margin: 0;
    font-size: 16px;
    letter-spacing: -0.03em;
  }

  .route-footer h2 span {
    font-size: 13px;
    font-weight: 400;
    color: var(--text-muted);
    margin-left: 8px;
  }

  .route-footer p {
    margin: 6px 0 0;
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.5;
  }

  .route-toolbar {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    justify-content: flex-end;
  }

  .route-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: flex-end;
  }

  button {
    font: inherit;
  }

  .btn {
    border: none;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease, border-color 0.15s ease, opacity 0.15s ease;
  }

  .btn:hover {
    transform: translateY(-1px);
  }

  .btn:active {
    transform: translateY(0) scale(0.98);
    transition-duration: 0.08s;
  }

  .btn:disabled {
    cursor: wait;
    opacity: 0.64;
    transform: none;
  }

  .btn-primary {
    background: var(--accent);
    color: white;
    padding: 14px 18px;
    border-radius: 16px;
    font-weight: 700;
  }

  .btn-secondary,
  .btn-ghost {
    background: rgba(255, 255, 255, 0.75);
    color: var(--text);
    border: 1px solid var(--line);
    padding: 11px 14px;
    border-radius: 14px;
    font-weight: 600;
  }

  .btn-ghost {
    padding: 10px 12px;
    font-size: 13px;
  }

  .btn-danger {
    color: var(--danger);
  }

  .summary-board {
    margin-top: 18px;
    background: var(--paper-strong);
    border: 1px solid rgba(71, 57, 29, 0.08);
    border-radius: 22px;
    padding: 18px;
  }

  .summary-head {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    align-items: flex-start;
  }

  .summary-head strong {
    display: block;
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .summary-line {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
  }

  .score-inline {
    text-align: right;
    flex-shrink: 0;
  }

  .score-inline .label {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .score-inline .value {
    font-family: var(--mono);
    font-size: clamp(22px, 4vw, 30px);
    font-weight: 700;
    line-height: 1.1;
  }

  .summary-line .transit-label {
    font-size: clamp(28px, 6vw, 38px);
    font-weight: 700;
    line-height: 1.1;
    letter-spacing: -0.02em;
  }

  .summary-line .transit-label.bus {
    color: var(--blue);
  }

  .summary-line .transit-label.subway {
    color: var(--accent);
  }

  .summary-stop-flow {
    margin-top: 8px;
    font-size: 14px;
    color: var(--text);
    line-height: 1.5;
    padding: 8px 12px;
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.72);
    border: 1px solid rgba(71, 57, 29, 0.08);
  }

  .summary-stop-flow .flow-arrow {
    color: var(--text-muted);
    margin: 0 2px;
  }

  .summary-note {
    margin-top: 10px;
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.5;
  }

  .summary-subline {
    margin-top: 10px;
    padding: 10px 12px;
    border-radius: 14px;
    background: rgba(255, 255, 255, 0.72);
    border: 1px solid rgba(71, 57, 29, 0.08);
    font-size: 13px;
    color: var(--text);
    line-height: 1.45;
  }

  .summary-subline strong {
    color: var(--text-muted);
    margin-right: 6px;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .score-badge {
    min-width: 120px;
    padding: 10px 12px;
    border-radius: 16px;
    background: rgba(32, 24, 16, 0.05);
    text-align: right;
  }

  .score-badge .label {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .score-badge .value {
    display: block;
    margin-top: 6px;
    font-family: var(--mono);
    font-size: 24px;
    font-weight: 700;
  }

  .metric-grid {
    display: flex;
    margin-top: 16px;
    border-radius: 14px;
    background: rgba(255, 255, 255, 0.72);
    border: 1px solid rgba(71, 57, 29, 0.08);
    overflow: hidden;
  }

  .metric {
    flex: 1;
    padding: 10px 0;
    text-align: center;
    min-width: 0;
  }

  .metric + .metric {
    border-left: 1px solid rgba(71, 57, 29, 0.08);
  }

  .metric .label {
    display: block;
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    padding: 0 6px;
  }

  .metric .value {
    display: block;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.03em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    padding: 0 6px;
  }

  .metric-inline {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 10px;
    padding: 6px 12px;
    border-radius: 10px;
    background: rgba(255, 255, 255, 0.5);
    font-size: 13px;
    color: var(--text-muted);
  }

  .metric-inline .stamp {
    font-family: var(--mono);
    font-size: 11px;
    flex-shrink: 0;
    margin-left: 12px;
  }

  .boarding-card { margin-top: 12px; padding: 12px; border-radius: 12px; background: rgba(30,122,95,.08); border:1px solid rgba(30,122,95,.2);}
  .boarding-title { font-size:12px; color:var(--text-muted); font-weight:600; }
  .boarding-main { margin-top:4px; font-weight:700; font-size:14px; }
  .boarding-pill { display:inline-block; margin-top:8px; padding:4px 10px; border-radius:999px; background:rgba(197,99,31,.14); color:var(--orange); font-weight:700; font-size:12px;}
  .compact-details { margin-top: 12px; }
  .compact-details summary { cursor:pointer; font-size:13px; font-weight:600; color:var(--blue);}
  .compact-details .segment-list { margin-top:8px; }

  .arrival-headline {
    margin-top: 12px;
    padding: 14px 16px;
    border-radius: 16px;
    background: linear-gradient(135deg, rgba(30, 122, 95, 0.12), rgba(28, 91, 183, 0.10));
    border: 1px solid rgba(30, 122, 95, 0.18);
  }

  .arrival-headline .row-main {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }

  .arrival-headline .depart {
    font-family: var(--mono);
    font-size: 14px;
    color: var(--text-muted);
    letter-spacing: 0.02em;
  }

  .arrival-headline .arrow {
    flex: 1;
    position: relative;
    min-width: 40px;
    height: 2px;
    margin: 0 10px;
    background: linear-gradient(90deg, rgba(30, 122, 95, 0.35), rgba(28, 91, 183, 0.45));
    border-radius: 1px;
    align-self: center;
  }

  .arrival-headline .arrow::after {
    content: "";
    position: absolute;
    right: -2px;
    top: -3px;
    width: 0;
    height: 0;
    border-top: 4px solid transparent;
    border-bottom: 4px solid transparent;
    border-left: 6px solid rgba(28, 91, 183, 0.55);
  }

  .arrival-headline .arrive {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 700;
    color: var(--text-strong, #1f2937);
    letter-spacing: 0.01em;
  }

  .arrival-headline .row-sub {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-top: 8px;
    font-size: 12px;
    color: var(--text-muted);
  }

  .arrival-headline .countdown {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-muted);
  }

  .arrival-headline .countdown.urgent {
    color: var(--orange);
    font-weight: 600;
  }

  .arrival-headline .countdown.missed {
    color: #9b1c1c;
    font-weight: 600;
  }

  .arrival-headline.promoted {
    background: linear-gradient(135deg, rgba(197, 99, 31, 0.14), rgba(28, 91, 183, 0.10));
    border-color: rgba(197, 99, 31, 0.35);
  }

  .arrival-headline .promoted-tag {
    display: none;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--orange);
    padding: 2px 8px;
    border-radius: 999px;
    background: rgba(197, 99, 31, 0.14);
    margin-right: 8px;
  }

  .arrival-headline.promoted .promoted-tag {
    display: inline-block;
  }

  .alt-row.fallback.consumed {
    display: none;
  }

  .alt-row {
    grid-template-columns: auto 1fr auto auto;
    grid-template-rows: auto auto;
  }

  .alt-row > .alt-line {
    grid-column: 1 / -1;
    grid-row: 2;
    margin-top: 10px;
  }

  .journey-line {
    position: relative;
    display: flex;
    width: 100%;
    height: 18px;
    border-radius: 999px;
    overflow: hidden;
    background: rgba(71, 57, 29, 0.06);
  }

  .journey-line .seg {
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 600;
    color: rgba(255, 255, 255, 0.95);
    min-width: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: clip;
  }

  .journey-line .seg.wait {
    background: repeating-linear-gradient(
      45deg,
      rgba(71, 57, 29, 0.10),
      rgba(71, 57, 29, 0.10) 4px,
      rgba(71, 57, 29, 0.22) 4px,
      rgba(71, 57, 29, 0.22) 8px
    );
    color: rgba(55, 55, 55, 0.88);
    font-weight: 600;
  }

  .journey-line .seg.walk {
    background: rgba(120, 120, 120, 0.5);
    color: rgba(55, 55, 55, 0.9);
  }

  .journey-line .seg.bus {
    background: linear-gradient(90deg, rgba(197, 99, 31, 0.9), rgba(197, 99, 31, 0.75));
  }

  .journey-line .seg.subway {
    background: linear-gradient(90deg, rgba(28, 91, 183, 0.9), rgba(28, 91, 183, 0.75));
  }

  .journey-line .seg:not(:last-child) {
    border-right: 1px solid rgba(255, 255, 255, 0.6);
  }

  .journey-line-caption {

    font-size: 13px;
    line-height: 1.45;
  }

  .toast {
    position: fixed;
    left: 50%;
    bottom: 24px;
    transform: translateX(-50%) translateY(16px);
    background: rgba(32, 24, 16, 0.9);
    color: white;
    padding: 13px 16px;
    border-radius: 999px;
    font-size: 13px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease, transform 0.2s ease;
    z-index: 60;
    white-space: nowrap;
  }

    opacity: 1;
    transform: translateX(-50%) translateY(0);

  body {
    background: var(--bg);
  }

  body::before {
    display: none;
  }

  .fast-shell {
    width: min(430px, calc(100vw - 24px));
    margin: 0 auto;
    min-height: 100dvh;
    padding: calc(18px + env(safe-area-inset-top, 0px)) 0 calc(28px + env(safe-area-inset-bottom, 0px));
  }

  .fast-phone {
    position: relative;
    min-height: calc(100dvh - 38px);
    overflow: hidden;
    border-radius: 34px;
    background: var(--bg-strong);
    padding: 20px;
    box-shadow: 0 26px 70px rgba(68, 51, 30, 0.14);
  }

  .fast-phone::before,
  .fast-phone::after {
    content: "";
    position: absolute;
    border-radius: 999px;
    pointer-events: none;
  }

  .fast-phone::before {
    width: 210px;
    height: 210px;
    right: -76px;
    top: -56px;
    background: rgba(30, 122, 95, 0.09);
    animation: ambient-drift-a 10s ease-in-out infinite;
  }

  .fast-phone::after {
    width: 180px;
    height: 180px;
    left: -92px;
    top: 360px;
    background: rgba(28, 91, 183, 0.07);
    animation: ambient-drift-b 12s ease-in-out infinite;
  }

  @keyframes ambient-drift-a {
    0%, 100% { transform: translate3d(0, 0, 0) scale(1); }
    50% { transform: translate3d(-10px, 12px, 0) scale(1.04); }
  }

  @keyframes ambient-drift-b {
    0%, 100% { transform: translate3d(0, 0, 0) scale(1); }
    50% { transform: translate3d(12px, -8px, 0) scale(1.03); }
  }

  .fast-content {

    z-index: 1;

    padding: 2px 0 18px;

  .fast-brand strong {

    letter-spacing: -0.03em;
    color: transparent;

    -webkit-background-clip: text;
    background-clip: text;

  .fast-brand span {

    margin-top: 5px;
    color: var(--text-muted);
    font-size: 11px;
    font-weight: 600;

  .live-badge {

    align-items: center;
    gap: 8px;

    border: 1px solid rgba(30, 122, 95, 0.16);
    padding: 9px 13px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.02em;

    border-radius: 999px;

  .fast-actions .btn-compact {
    padding: 10px 14px;
    font-size: 12px;
    line-height: 1;
    flex: 0 0 auto;
  }

  .fast-actions .btn-primary {
    background: linear-gradient(135deg, var(--accent-strong) 0%, var(--accent) 100%);
    padding: 14px 16px;
    box-shadow: 0 10px 24px rgba(30, 122, 95, 0.28);

  .fast-actions .btn-primary:hover {
    box-shadow: 0 14px 32px rgba(30, 122, 95, 0.36);
  }

  .fast-actions .btn-secondary {
    padding: 12px 13px;
    background: rgba(255, 252, 247, 0.82);
    border: 1px solid rgba(71, 57, 29, 0.12);
    color: var(--text-muted);
    backdrop-filter: blur(14px);
  }

  .fast-actions .btn-secondary:hover {
    background: rgba(255, 252, 247, 0.96);

  .route-list {

  .fast-trip-panel {

  .fast-trip-head {

  .fast-icon-btn {
    width: 34px;

    backdrop-filter: blur(12px);

  .fast-icon-btn:hover {

    color: var(--text);
    border-color: rgba(71, 57, 29, 0.22);

  .fast-metrics {
    display: grid;
    grid-template-columns: 1.25fr 0.8fr 0.8fr;
    gap: 8px;
    margin-top: 10px;
  }

  .fast-metric {
    min-width: 0;
    border: 1px solid var(--line);
    border-radius: 22px;
    padding: 13px 12px;
  }

  /* 도착·분 = blue (시간 = 정보성, 중립-파랑) */
  .fast-metric.arrive {
    background: rgba(28, 91, 183, 0.07);
    border-color: rgba(28, 91, 183, 0.12);
  }
  /* 환승 = orange (주의/행동 필요) */
  .fast-metric.transfer {
    background: var(--orange-soft);
    border-color: rgba(197, 99, 31, 0.12);
  }
  /* 도보 = green (긍정/건강) */
  .fast-metric.walk {
    background: var(--accent-soft);
    border-color: rgba(30, 122, 95, 0.12);
  }

  .fast-metric strong {
    display: block;
    font-family: var(--mono);
    line-height: 1;
    font-weight: 700;
    letter-spacing: -0.02em;

  .fast-metric.arrive strong { color: var(--blue); font-size: 28px; }
  .fast-metric.transfer strong { color: var(--orange); font-size: 28px; }
  .fast-metric.walk strong { color: var(--accent-strong); font-size: 28px; }

  .fast-metric span {

  .fast-metric.transfer span { color: var(--orange); opacity: 0.7; }
  .fast-metric.walk span { color: var(--accent-strong); opacity: 0.7; }

  .fast-next-action {
    margin-top: 10px;
    border-radius: 22px;
    background: linear-gradient(135deg, var(--text) 0%, var(--accent-strong) 100%);

    box-shadow: 0 12px 28px rgba(30, 122, 95, 0.24);

  .fast-next-action .label {

  .fast-next-row strong {

  .fast-flow {

    border: 1px solid var(--line);

    font-weight: 700;

  .kakao-bus-overlay {
    position: relative;
    width: 58px;
    height: 42px;
    border: 4px solid #fff;
    border-radius: 18px 18px 13px 13px;
    background:
      /* 눈 왼쪽 */
      radial-gradient(ellipse 4px 5px at 16px 17px, #1d3a6b 0%, #1d3a6b 60%, transparent 70%),
      /* 눈 오른쪽 */
      radial-gradient(ellipse 4px 5px at 43px 17px, #1d3a6b 0%, #1d3a6b 60%, transparent 70%),
      /* 눈 하이라이트 왼쪽 */
      radial-gradient(circle at 18px 14px, rgba(255,255,255,0.9) 0 1.2px, transparent 2px),
      /* 눈 하이라이트 오른쪽 */
      radial-gradient(circle at 45px 14px, rgba(255,255,255,0.9) 0 1.2px, transparent 2px),
      /* 바디 그라디언트 */
      linear-gradient(160deg, #93c5fd 0%, #60a5fa 40%, #2563eb 100%);
    box-shadow: 0 16px 30px rgba(37, 99, 235, 0.26), 0 0 0 9px rgba(200, 230, 245, 0.14);
    animation: cute-float 2.2s ease-in-out infinite;
  }

  .kakao-bus-overlay::before {
    content: "";
    position: absolute;
    left: 9px;
    right: 9px;
    top: 8px;
    height: 12px;
    border-radius: 8px;
    background:
      /* 뺨 홍조 왼쪽 */
      radial-gradient(ellipse 6px 4px at 12px 20px, rgba(245, 184, 196, 0.72) 0%, transparent 100%),
      /* 뺨 홍조 오른쪽 */
      radial-gradient(ellipse 6px 4px at calc(100% - 12px) 20px, rgba(245, 184, 196, 0.72) 0%, transparent 100%),
      /* 유리창 두 칸 */
      linear-gradient(90deg, rgba(255, 255, 255, 0.92) 0 42%, rgba(200, 230, 245, 0.4) 42% 48%, rgba(255, 255, 255, 0.92) 48% 100%);
  }

  .kakao-bus-overlay::after {
    content: "";
    position: absolute;
    left: 10px;
    right: 10px;
    bottom: -6px;
    height: 9px;
    border-radius: 999px;
    background:
      radial-gradient(circle at 15% 50%, #0f172a 0 4px, transparent 5px),
      radial-gradient(circle at 85% 50%, #0f172a 0 4px, transparent 5px);
  }

  .kakao-bus-overlay.secondary {
    opacity: 0.84;
    transform: scale(0.82);
    transform-origin: center;
    box-shadow: 0 10px 22px rgba(37, 99, 235, 0.18);

  .kakao-dot-overlay {

    height: 20px;

    height: 10px;

    height: 20px;

  .kakao-stop-dot.alighting {

    height: 16px;

    box-shadow: 0 0 0 3px rgba(197, 99, 31, 0.14), 0 3px 8px rgba(197, 99, 31, 0.2);

  .kakao-bus-overlay .kakao-bus-label {

    box-shadow: 0 6px 14px rgba(15, 23, 42, 0.18);

  .fast-flow-head {

    z-index: 6;
    left: 12px;
    right: 12px;
    top: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 0;
    border-radius: 18px;

  .fast-flow-timeline {

    border-radius: 999px;

  .fast-flow-nodes {

    align-items: flex-start;
    justify-content: space-between;
    width: 100%;
    min-height: 80px;

    flex: 1;
    min-width: 0;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }

  .fast-flow-dot {
    position: relative;
    z-index: 2;
    width: 18px;
    height: 18px;
    border: 3px solid var(--paper-strong);
    border-radius: 999px;
    box-shadow: 0 2px 6px rgba(68, 51, 30, 0.14);
  }

  /* walk = 중립 회갈색 */
  .fast-flow-dot.walk { background: rgba(71, 57, 29, 0.28); }
  /* bus = blue (탑승 개념) */
  .fast-flow-dot.bus { background: var(--blue); }
  /* wait = orange (주의/대기) */
  .fast-flow-dot.wait { background: var(--orange); }
  /* subway = accent green */

  .fast-flow-label {

  .fast-flow-glow {

  /* active = 선택됨 = accent green (not blue — blue is for bus/boarding) */

  .boarding-panel {

  .boarding-panel-mascot .bm-shadow {

  .boarding-panel-mascot .bm-wheels {

  .boarding-panel-mascot .bm-sparkles text:nth-child(3) {

  @keyframes bus-hop {

    40% { transform: translateY(-5px); }
    55% { transform: translateY(-5px); }

  @keyframes bus-wobble {

    50% { transform: rotate(3deg); }

  @keyframes shadow-pulse {

  @keyframes sparkle-twinkle {

    border: 1px solid var(--line);

  /* ====================================================
     코지팝 귀여운 스타일 레이어 — 2nd pass
     ==================================================== */

  /* 키프레임 */
  @keyframes cute-float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-6px); }
  }

  @keyframes cute-blink {
    0%, 90%, 100% { transform: scaleY(1); }
    95% { transform: scaleY(0.05); }
  }

  @keyframes cute-breathe {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.04); }
  }

  @keyframes cute-wiggle {
    0%, 100% { transform: rotate(0deg); }
    25% { transform: rotate(-2deg); }
    75% { transform: rotate(2deg); }
  }

  @keyframes cute-bounce-in {
    0% { transform: translateY(0px) scale(1); }
    40% { transform: translateY(-5px) scale(1.04); }
    70% { transform: translateY(2px) scale(0.98); }
    100% { transform: translateY(0px) scale(1); }
  }

  @keyframes cute-spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  @keyframes cute-pulse-boarding {
    0% { box-shadow: 0 0 0 0 rgba(249, 208, 216, 0.8), 0 4px 12px rgba(28, 91, 183, 0.24); }
    70% { box-shadow: 0 0 0 10px rgba(249, 208, 216, 0), 0 4px 12px rgba(28, 91, 183, 0.24); }
    100% { box-shadow: 0 0 0 0 rgba(249, 208, 216, 0), 0 4px 12px rgba(28, 91, 183, 0.24); }
  }

  @keyframes cute-star-spin {
    0% { transform: rotate(0deg) scale(1); }
    50% { transform: rotate(180deg) scale(1.1); }
    100% { transform: rotate(360deg) scale(1); }
  }

  @keyframes cute-tab-bounce {
    0%, 100% { transform: translateY(0) scale(1); }
    30% { transform: translateY(-3px) scale(1.06); }
    60% { transform: translateY(1px) scale(0.97); }
  }

  @keyframes empty-wave {
    0%, 100% { transform: rotate(-8deg); }
    50% { transform: rotate(8deg); }
  }

  /* ---- 브랜드 마스코트 ---- */
  .brand-mascot {
    display: inline-block;
    animation: cute-float 3s ease-in-out infinite;
    flex-shrink: 0;
  }

  .fast-brand {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* ---- 버스 오버레이 귀엽게 ---- */
  .kakao-bus-overlay {
    border-radius: 22px 22px 16px 16px;
    box-shadow: 0 18px 32px rgba(37, 99, 235, 0.28), 0 0 0 9px rgba(200, 230, 245, 0.18);
    animation: cute-float 2.2s ease-in-out infinite;
  }

  .kakao-bus-overlay.secondary {
    animation-delay: 0.4s;
    animation-duration: 2.6s;
  }

  /* 버스 얼굴 - ::before 는 유리창, 귀여운 눈은 SVG로 대체 (overlay 내부에 SVG 주입됨) */

  /* ---- 탑승 정류장 — 하트 핀 느낌 ---- */
  .kakao-stop-dot.boarding {
    animation: cute-pulse-boarding 1.8s ease-out infinite;
    /* 하트 실루엣 강조 */

<script type="module">
  import { uid, nowStamp, escapeHtml, formatTime, relativeTime, minuteNumber, formatClock, formatCountdown } from "./js/util.js";
  import { STORAGE_KEY, LEGACY_STORAGE_KEY, ROUTE_CARD_COLLAPSED_KEY, ODSAY_BROWSER_KEY_STORAGE, KAKAO_MAP_KEY_STORAGE, AUTOCOMPLETE_MIN_LENGTH, ODSAY_API_ROOT, PRIORITY_META, priorityLabel } from "./js/constants.js";
  import { state, persistRoutes } from "./js/state.js";
  import { getBrowserOdsayKey, setBrowserOdsayKey, fetchJson, fetchOdsayDirect, searchStations, normalizeSegments, fetchRouteRecommendationDirect, tagRoutePicks } from "./js/api.js";
  import { setKakaoMapKey, getKakaoMapKey, resolveKakaoMapKey, loadKakaoMaps } from "./js/live-map-keys.js";
  import {
    describeRecommendation,
    iconSvg,
    getCandidateTone,
    getCandidateTitle,
    getFirstAction,
    getFastFlowStops,
    getFastFlowStatus,
    inferSegmentType,
    segmentMinutes,
    getJourneyStepLabel,
    candidateRiskLabel,
    renderJourneyFlow,
    renderSegments,
    renderFastFlow,
    renderFastCandidate,
    renderCandidate,
    renderBusApproachPreview,
    updateBoardingPanelDOM
  } from "./js/render.js";

  function getSelectedCandidate(route) {
    const result = route?.lastResult;
    if (!result) return null;
    const candidates = result.candidates || [];
    const selectedId = state.selectedCandidateIds[route.id];
    if (selectedId) {
      const match = candidates.find((c) => c.id === selectedId);
      if (match) return match;
    }
    return result.recommendation || candidates[0] || null;
  }

  function selectCandidate(routeId, candidateId) {
    const route = state.routes.find((item) => item.id === routeId);
    if (!route) return;
    const candidates = route.lastResult?.candidates || [];
    const exists = candidates.some((c) => c.id === candidateId);
    if (!exists) return;
    if (state.selectedCandidateIds[routeId] === candidateId) return;
    state.selectedCandidateIds[routeId] = candidateId;
    renderRoutes();
  }

  function clearLocationPreview(selectionKey) {
    const mapId = "route-" + selectionKey + "-preview-map";
    const labelId = "route-" + selectionKey + "-preview-label";
    const mapEl = document.getElementById(mapId);
    const labelEl = document.getElementById(labelId);
    if (!mapEl || !labelEl) return;

    const existing = state.previewMaps[selectionKey];
    if (existing?.map) {
      existing.map.remove();
    }
    delete state.previewMaps[selectionKey];

    mapEl.classList.add("empty");
    mapEl.innerHTML = "검색 결과를 선택하면 지도로 위치를 확인할 수 있습니다.";
    labelEl.textContent = "위치를 선택하면 이곳에 지도가 보입니다.";
  }

  function updateLocationPreview(selectionKey, location) {
    const mapId = "route-" + selectionKey + "-preview-map";
    const labelId = "route-" + selectionKey + "-preview-label";
    const mapEl = document.getElementById(mapId);
    const labelEl = document.getElementById(labelId);
    if (!mapEl || !labelEl) return;

    if (!location || location.x == null || location.y == null) {
      clearLocationPreview(selectionKey);
      return;
    }

    mapEl.classList.remove("empty");
    labelEl.textContent = [location.kind, location.detail].filter(Boolean).join(" · ") || location.name;

    const lat = Number(location.y);
    const lng = Number(location.x);
    if (!Number.isFinite(lat) || !Number.isFinite(lng)) {
      clearLocationPreview(selectionKey);
      return;
    }

    requestAnimationFrame(() => {
      let preview = state.previewMaps[selectionKey];
      if (!preview) {
        mapEl.innerHTML = "";
        if (typeof L === "undefined") {
          mapEl.classList.add("empty");
          mapEl.textContent = `${location?.name || "선택한 위치"} (${lat.toFixed(5)}, ${lng.toFixed(5)})`;
          return;
        }
        const map = L.map(mapId, {
          zoomControl: false,
          attributionControl: false,
          dragging: false,
          scrollWheelZoom: false,
          doubleClickZoom: false,
          touchZoom: false,
          keyboard: false
        });
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          maxZoom: 19
        }).addTo(map);
        const marker = L.circleMarker([lat, lng], {
          radius: 8,
          color: "#165c47",
          weight: 2,
          fillColor: "#1e7a5f",
          fillOpacity: 0.9
        }).addTo(map);
        preview = { map, marker };
        state.previewMaps[selectionKey] = preview;
      } else {
        preview.marker.setLatLng([lat, lng]);
      }

      preview.map.getContainer().style.cursor = "default";
      preview.map.setView([lat, lng], 15);
      preview.map.invalidateSize();
    });
  }

  function clearAutocompletePreview(selectionKey) {
    const previewId = "route-" + selectionKey + "-dropdown-preview";
    const previewEl = document.getElementById(previewId);
    if (!previewEl) return;

    const existing = state.previewMaps["dropdown-" + selectionKey];
    if (existing?.map) {
      existing.map.remove();
    }
    delete state.previewMaps["dropdown-" + selectionKey];

    previewEl.classList.add("empty");
    previewEl.innerHTML = "목록에서 항목에 마우스를 올리거나 방향키로 이동하면 위치가 여기에 보입니다.";
  }

  function updateAutocompletePreview(selectionKey, location) {
    const previewId = "route-" + selectionKey + "-dropdown-preview";
    const previewEl = document.getElementById(previewId);
    if (!previewEl) return;

    if (!location || location.x == null || location.y == null) {
      clearAutocompletePreview(selectionKey);
      return;
    }

    previewEl.classList.remove("empty");

    const lat = Number(location.y);
    const lng = Number(location.x);
    if (!Number.isFinite(lat) || !Number.isFinite(lng)) {
      clearAutocompletePreview(selectionKey);
      return;
    }

    requestAnimationFrame(() => {
      let preview = state.previewMaps["dropdown-" + selectionKey];
      if (!preview) {
        previewEl.innerHTML = "";
        if (typeof L === "undefined") {
          previewEl.classList.add("empty");
          previewEl.textContent = `${location.name} (${lat.toFixed(5)}, ${lng.toFixed(5)})`;
          return;
        }
        const map = L.map(previewId, {
          zoomControl: false,
          attributionControl: false,
          dragging: false,
          scrollWheelZoom: false,
          doubleClickZoom: false,
          touchZoom: false,
          keyboard: false
        });
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          maxZoom: 19
        }).addTo(map);
        const marker = L.circleMarker([lat, lng], {
          radius: 8,
          color: "#1c5bb7",
          weight: 2,
          fillColor: "#3c7ad1",
          fillOpacity: 0.9
        }).addTo(map);
        preview = { map, marker };
        state.previewMaps["dropdown-" + selectionKey] = preview;
      } else {
        preview.marker.setLatLng([lat, lng]);
      }

      preview.map.setView([lat, lng], 15);
      preview.map.invalidateSize();
    });
  }

  function updateClock() {
    const now = new Date();
    document.getElementById("clock").textContent = now.toLocaleTimeString("ko-KR", {
      hour: "2-digit",
      minute: "2-digit"
    });
    const phase = getCommuteContext(now)?.phase || null;
    if (state.routes.length > 0 && phase !== state.lastCommutePhase) {
      renderRoutes();
    }
  }

  function toLatLngPoint(location) {
    const lat = Number(location?.y ?? location?.lat);
    const lng = Number(location?.x ?? location?.lng);
    if (!Number.isFinite(lat) || !Number.isFinite(lng)) return null;
    return { lat, lng };
  }

  function toPathPoint(value) {
    const lat = Number(value?.lat ?? value?.y);
    const lng = Number(value?.lng ?? value?.x);
    if (!Number.isFinite(lat) || !Number.isFinite(lng)) return null;
    return { lat, lng };
  }

  function dedupePathPoints(points) {
    const result = [];
    points.filter(Boolean).forEach((point) => {
      const prev = result[result.length - 1];
      if (prev && Math.abs(prev.lat - point.lat) < 0.000001 && Math.abs(prev.lng - point.lng) < 0.000001) return;
      result.push(point);
    });
    return result;
  }

  function interpolatePoint(a, b, ratio) {
    return {
      lat: a.lat + (b.lat - a.lat) * ratio,
      lng: a.lng + (b.lng - a.lng) * ratio
    };
  }

  function pointAtSeq(stops, seq) {
    const sorted = stops
      .map((stop) => ({ ...stop, point: toPathPoint(stop), seq: Number(stop.seq) }))
      .filter((stop) => stop.point && Number.isFinite(stop.seq))
      .sort((a, b) => a.seq - b.seq);
    if (!sorted.length || !Number.isFinite(Number(seq))) return sorted[0]?.point || null;
    const target = Number(seq);
    let prev = sorted[0];
    let next = sorted[sorted.length - 1];
    for (let index = 0; index < sorted.length; index += 1) {
      if (sorted[index].seq <= target) prev = sorted[index];
      if (sorted[index].seq >= target) {
        next = sorted[index];
        break;
      }
    }
    if (!prev || !next || prev.seq === next.seq) return (next || prev)?.point || null;
    return interpolatePoint(prev.point, next.point, (target - prev.seq) / (next.seq - prev.seq));
  }

  function getFirstBusSegment(candidate) {
    return (candidate?.segments || []).find((segment) => inferSegmentType(segment) === "bus") || null;
  }

  function getBoardingSeq(preview) {
    const explicitSeq = Number(preview?.boardingStationSeq);
    if (Number.isFinite(explicitSeq)) return explicitSeq;
    const boardingStop = (preview?.stops || []).find((stop) => stop.isBoarding);
    const inferredSeq = Number(boardingStop?.seq);
    return Number.isFinite(inferredSeq) ? inferredSeq : null;
  }

  function getBoardingStopPoint(candidate, origin) {
    const stops = candidate?.busApproachPreview?.stops || [];
    const boarding = stops.find((stop) => stop.isBoarding)
      || stops.find((stop) => Number(stop.seq) === Number(candidate?.busApproachPreview?.boardingStationSeq))
      || stops[stops.length - 1];
    const previewPoint = toPathPoint(boarding);
    if (previewPoint) return previewPoint;

    const firstBus = getFirstBusSegment(candidate);
    const segmentPoint = toPathPoint(firstBus?.pathPoints?.[0]);
    if (segmentPoint) return segmentPoint;

    return origin;
  }

  function getApproachStopPoints(candidate) {
    const preview = candidate?.busApproachPreview;
    const stops = preview?.stops || [];
    const boardingSeq = getBoardingSeq(preview);
    const sortedStops = stops
      .filter((stop) => toPathPoint(stop))
      .sort((a, b) => Number(a.seq) - Number(b.seq));
    let boardingIndex = sortedStops.findIndex((stop) => stop.isBoarding);
    if (boardingIndex < 0) {
      boardingIndex = sortedStops.findIndex((stop) => Number(stop.seq) === boardingSeq);
    }
    const approachStops = Number.isFinite(boardingSeq)
      ? sortedStops.filter((stop) => Number(stop.seq) <= boardingSeq)
      : (boardingIndex >= 0 ? sortedStops.slice(0, boardingIndex + 1) : []);
    return dedupePathPoints(approachStops.map(toPathPoint));
  }

  function getRealtimeBusPoints(candidate) {
    const preview = candidate?.busApproachPreview;
    const boardingSeq = getBoardingSeq(preview);
    if (!preview?.stops?.length || !preview?.vehicles?.length) return [];
    return preview.vehicles
      .filter((vehicle) => boardingSeq == null || Number(vehicle.progressSeq) < boardingSeq)
      .slice(0, 3)
      .map((vehicle, index) => ({
        index,
        label: vehicle.label || (index === 0 ? "다음" : `${index + 1}번째`),
        remainingStops: vehicle.remainingStops,
        etaMinutes: vehicle.etaMinutes,
        point: pointAtSeq(preview.stops, vehicle.progressSeq)
      }))
      .filter((bus) => bus.point);
  }

  function buildLiveTransitPoints(route, candidate) {
    const origin = toLatLngPoint(route?.from) || { lat: 37.4979, lng: 127.0276 };
    const destination = toLatLngPoint(route?.to) || null;
    const user = state.userLocation || origin;
    const hasBusLeg = (candidate?.segments || []).some((segment) => inferSegmentType(segment) === "bus");
    const boarding = getBoardingStopPoint(candidate, origin);
    const approachPoints = getApproachStopPoints(candidate);
    const approachingBuses = getRealtimeBusPoints(candidate);
    if (!hasBusLeg) {
      return {
        canRenderMap: false,
        fallbackReason: "no_bus",
        fallbackMessage: "실시간 차량 추적 없음",
        origin,
        destination,
        user,
        boardingStop: boarding,
        busPoints: [],
        approachPolylinePoints: []
      };
    }
    if (approachPoints.length < 2) {
      return {
        canRenderMap: false,
        fallbackReason: "no_approach",
        fallbackMessage: "실시간 차량 방향 정보를 확인 중이에요",
        origin,
        destination,
        user,
        boardingStop: boarding,
        busPoints: [],
        approachPolylinePoints: []
      };
    }
    return {
      canRenderMap: true,
      origin,
      destination,
      user,
      boardingStop: boarding,
      busPoints: approachingBuses,
      approachPolylinePoints: approachPoints
    };
  }

  function renderLiveMapFallback(container, route, candidate, reason) {
    const fallback = container.querySelector("[data-live-map-fallback]");
    if (!fallback) return;
    const canvas = container.querySelector(".live-map-canvas");
    if (canvas) canvas.style.display = "none";
    fallback.classList.toggle("no-bus", reason === "no_bus");
    fallback.style.display = "grid";

    const boardingName = candidate?.boardingStopName || "탑승 정류장 정보 없음";
    const alightingName = candidate?.alightingStopName || "도착 정류장 정보 없음";
    const transit = candidate?.firstTransitLabel || "이동";
    const totalMin = minuteNumber(candidate?.journeyMinutes || candidate?.scoreDisplay || candidate?.totalTime);
    const segmentLine = (candidate?.segments || [])
      .filter((segment) => segment && (segment.kind === "버스" || segment.kind === "지하철" || (segment.kind === "도보" && minuteNumber(segment.time) > 0)))
      .slice(0, 4)
      .map((segment) => `${segment.label || segment.kind} ${segment.time || ""}`.trim())
      .join(" · ");

    if (reason === "no_bus") {
      fallback.innerHTML = `
        <strong>${escapeHtml(transit)} 중심 경로 · 실시간 차량 추적 없음</strong>
        <span>${escapeHtml(route.from?.name || "출발지")} → ${escapeHtml(route.to?.name || "도착지")} · 총 ${escapeHtml(totalMin || "--")}분</span>
        ${segmentLine ? `<span>${escapeHtml(segmentLine)}</span>` : ""}
        <span>지하철·도보 중심이라 지도 위에 실시간 버스를 표시하지 않습니다.</span>
      `;
    } else if (reason === "timeout" || reason === "error") {
      fallback.innerHTML = `
        <strong>실시간 차량 위치를 불러오지 못했어요</strong>
        <span>경로 정보는 계속 볼 수 있어요 · ${escapeHtml(boardingName)} → ${escapeHtml(alightingName)}</span>
        ${segmentLine ? `<span>${escapeHtml(segmentLine)}</span>` : ""}
        <span>잠시 후 "실시간으로 다시 계산"을 눌러 새로 가져와 보세요.</span>
      `;
    } else {
      fallback.innerHTML = `
        <strong>이 노선은 실시간 위치 정보가 없어요</strong>
        <span>${escapeHtml(boardingName)} → ${escapeHtml(alightingName)} · 노선 매핑이 수집되면 자동으로 표시됩니다.</span>
        ${segmentLine ? `<span>${escapeHtml(segmentLine)}</span>` : ""}
        <span>경로 정보는 계속 사용할 수 있어요.</span>
      `;
    }
  }

  function clearLiveMapTimer(routeId) {
    const timer = state.liveMapTimers[routeId];
    if (timer) {
      clearTimeout(timer);
      delete state.liveMapTimers[routeId];
    }
  }

  function startUserLocationWatch() {
    if (state.locationWatchId != null || !navigator.geolocation) return;
    state.locationWatchId = navigator.geolocation.watchPosition(
      (position) => {
        state.userLocation = {
          lat: position.coords.latitude,
          lng: position.coords.longitude
        };
        Object.values(state.liveMaps).forEach((entry) => {
          if (!entry?.maps || !entry.userOverlay) return;
          entry.userOverlay.setPosition(new entry.maps.LatLng(state.userLocation.lat, state.userLocation.lng));
        });
      },
      () => {},
      { enableHighAccuracy: true, maximumAge: 15000, timeout: 8000 }
    );
  }

  function overlayContent(html, className = "") {
    const el = document.createElement("div");
    el.className = className;
    el.innerHTML = html;
    return el;
  }

  function easeInOutCubic(t) {
    return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
  }

  const LIVE_MAP_LOAD_TIMEOUT_MS = 5000;

  async function initLiveTransitMaps() {
    const containers = Array.from(document.querySelectorAll("[data-live-map]"));
    if (!containers.length) return;

    containers.forEach((container) => {
      const routeId = container.dataset.routeId;
      if (!routeId) return;
      const route = state.routes.find((item) => item.id === routeId);
      const candidate = route ? getSelectedCandidate(route) : null;
      const points = candidate ? buildLiveTransitPoints(route, candidate) : null;

      if (!points || !points.canRenderMap) {
        renderLiveMapFallback(container, route, candidate, points?.fallbackReason || "no_approach");
        return;
      }

      clearLiveMapTimer(routeId);
      state.liveMapTimers[routeId] = setTimeout(() => {
        if (state.liveMaps[routeId]) return;
        renderLiveMapFallback(container, route, candidate, "timeout");
      }, LIVE_MAP_LOAD_TIMEOUT_MS);
    });

    let maps;
    try {
      maps = await loadKakaoMaps();
    } catch (_) {
      containers.forEach((container) => {
        const routeId = container.dataset.routeId;
        clearLiveMapTimer(routeId);
        const route = state.routes.find((item) => item.id === routeId);
        const candidate = route ? getSelectedCandidate(route) : null;
        renderLiveMapFallback(container, route, candidate, "error");
      });
      return;
    }
    startUserLocationWatch();

    containers.forEach((container) => {
      const routeId = container.dataset.routeId;
      if (!routeId || state.liveMaps[routeId]) return;
      const canvas = container.querySelector(".live-map-canvas");
      const fallback = container.querySelector("[data-live-map-fallback]");
      const route = state.routes.find((item) => item.id === routeId);
      if (!canvas || !route) {
        clearLiveMapTimer(routeId);
        return;
      }

      const candidate = getSelectedCandidate(route);
      const points = candidate ? buildLiveTransitPoints(route, candidate) : null;
      if (!points || !points.canRenderMap) {
        clearLiveMapTimer(routeId);
        renderLiveMapFallback(container, route, candidate, points?.fallbackReason || "no_approach");
        return;
      }
      clearLiveMapTimer(routeId);
      canvas.style.display = "";
      const map = new maps.Map(canvas, {
        center: new maps.LatLng(points.boardingStop.lat, points.boardingStop.lng),
        level: 5
      });
      const approachPath = points.approachPolylinePoints.map((point) => new maps.LatLng(point.lat, point.lng));
      const approachPolyline = new maps.Polyline({
        path: approachPath,
        strokeWeight: 7,
        strokeColor: "#2563eb",
        strokeOpacity: 0.74,
        strokeStyle: "solid"
      });
      approachPolyline.setMap(map);

      const ridingStops = candidate?.busApproachPreview?.ridingStops || [];
      const ridingPathPoints = ridingStops
        .map((stop) => ({ lat: Number(stop.lat), lng: Number(stop.lng) }))
        .filter((p) => Number.isFinite(p.lat) && Number.isFinite(p.lng));
      let ridingPolyline = null;
      if (ridingPathPoints.length >= 2) {
        ridingPolyline = new maps.Polyline({
          path: ridingPathPoints.map((p) => new maps.LatLng(p.lat, p.lng)),
          strokeWeight: 7,
          strokeColor: "#16a34a",
          strokeOpacity: 0.82,
          strokeStyle: "solid"
        });
        ridingPolyline.setMap(map);
      }

      const previewStops = candidate?.busApproachPreview?.stops || [];
      const stopsForMarkers = new Map();
      [...previewStops, ...ridingStops].forEach((stop) => {
        const lat = Number(stop.lat);
        const lng = Number(stop.lng);
        if (!Number.isFinite(lat) || !Number.isFinite(lng)) return;
        const key = String(stop.stationId || `${lat},${lng}`);
        if (!stopsForMarkers.has(key)) stopsForMarkers.set(key, { ...stop, lat, lng });
      });
      const stopOverlays = Array.from(stopsForMarkers.values()).map((stop) => {
        const cls = stop.isBoarding ? "kakao-stop-dot boarding"
          : stop.isAlighting ? "kakao-stop-dot alighting"
          : "kakao-stop-dot";
        const overlay = new maps.CustomOverlay({
          position: new maps.LatLng(stop.lat, stop.lng),
          content: overlayContent("", cls),
          xAnchor: 0.5,
          yAnchor: 0.5,
          zIndex: stop.isBoarding ? 3 : stop.isAlighting ? 3 : 2
        });
        overlay.setMap(map);
        return overlay;
      });

      const userOverlay = new maps.CustomOverlay({
        position: new maps.LatLng(points.user.lat, points.user.lng),
        content: overlayContent("", "kakao-dot-overlay"),
        xAnchor: 0.5,
        yAnchor: 0.5
      });
      userOverlay.setMap(map);

      const initialVehicles = candidate?.busApproachPreview?.vehicles || [];
      const busOverlays = initialVehicles.map((vehicle, index) => {
        const pos = vehicleLatLng(vehicle, previewStops) || points.boardingStop;
        const boarded = isBoardedVehicle(vehicle, route.id);
        const className = vehicleClassFor(vehicle, index, route.id);
        const overlay = new maps.CustomOverlay({
          position: new maps.LatLng(pos.lat, pos.lng),
          content: overlayContent(busLabelHtml(vehicle, boarded), className),
          xAnchor: 0.5,
          yAnchor: 0.5,
          zIndex: boarded ? 100 : 10 - index
        });
        overlay.setMap(map);
        return { key: vehicle.key, index, overlay, position: { ...pos } };
      });

      const bounds = new maps.LatLngBounds();
      [
        ...approachPath,
        ...ridingPathPoints.map((p) => new maps.LatLng(p.lat, p.lng)),
        new maps.LatLng(points.user.lat, points.user.lng),
        ...busOverlays.map((b) => new maps.LatLng(b.position.lat, b.position.lng))
      ].forEach((point) => bounds.extend(point));
      map.setBounds(bounds, 24, 24, 24, 24);
      if (fallback) fallback.style.display = "none";

      const entry = {
        maps, map, container, userOverlay, stopOverlays, busOverlays,
        approachPolyline, ridingPolyline,
        previewStops, animationFrame: null, pollTimer: null
      };
      state.liveMaps[routeId] = entry;
      startBusPolling(routeId, candidate);
    });
  }

  function vehicleLatLng(vehicle, stops) {
    if (vehicle?.gpsLat != null && vehicle?.gpsLng != null) {
      const lat = Number(vehicle.gpsLat);
      const lng = Number(vehicle.gpsLng);
      if (Number.isFinite(lat) && Number.isFinite(lng)) return { lat, lng };
    }
    return pointAtSeq(stops || [], vehicle?.progressSeq);
  }

  function busLabelHtml(vehicle, isBoarded = false) {
    const parts = [];
    if (isBoarded) {
      parts.push("🎒 탑승 중");
    } else {
      parts.push(escapeHtml(vehicle.label || "다음"));
    }
    if (vehicle.catchable === false) {
      parts.push(`${escapeHtml(vehicle.remainingStops || 0)}정거장 뒤`);
    } else {
      parts.push(`${escapeHtml(vehicle.remainingStops || 0)}정거장 전`);
    }
    if (vehicle.etaMinutes != null) {
      parts.push(vehicle.catchable === false
        ? `${escapeHtml(vehicle.passedAgoMinutes ?? vehicle.etaMinutes)}분 전 통과`
        : `${escapeHtml(vehicle.etaMinutes)}분 후`);
    }
    return `<span class="kakao-bus-label${isBoarded ? " boarded" : ""}">${parts.join(" · ")}</span>`;
  }

  function isBoardedVehicle(vehicle, routeId) {
    const trip = state.boardedTrip;
    return Boolean(trip && trip.routeId === routeId && String(vehicle.key) === String(trip.vehicleKey));
  }

  function startBusPolling(routeId, candidate) {
    stopBusPolling(routeId);
    if (!candidate?.busRouteId || !candidate?.boardingStationId) return;
    const params = new URLSearchParams({
      routeId: String(candidate.busRouteId),
      boardingStationId: String(candidate.boardingStationId),
      alightingStationId: candidate.alightingStationId ? String(candidate.alightingStationId) : "",
      walkMinutes: String(candidate.initialWalkTime || 0)
    });
    const url = `/api/bus-positions?${params.toString()}`;
    const poll = async () => {
      const entry = state.liveMaps[routeId];
      if (!entry?.map) return;
      try {
        const response = await fetch(url, { cache: "no-store" });
        if (!response.ok) return;
        const data = await response.json();
        updateLiveVehicles(routeId, data?.preview);
      } catch {}
    };
    state.liveMaps[routeId].pollTimer = setInterval(poll, 20000);
  }

  function stopBusPolling(routeId) {
    const entry = state.liveMaps[routeId];
    if (entry?.pollTimer) {
      clearInterval(entry.pollTimer);
      entry.pollTimer = null;
    }
  }

  function tweenOverlayPosition(maps, overlay, fromPos, toPos, durationMs = 700) {
    const startMs = performance.now();
    const step = (now) => {
      const ratio = Math.min(1, (now - startMs) / durationMs);
      const eased = easeInOutCubic(ratio);
      const lat = fromPos.lat + (toPos.lat - fromPos.lat) * eased;
      const lng = fromPos.lng + (toPos.lng - fromPos.lng) * eased;
      overlay.setPosition(new maps.LatLng(lat, lng));
      if (ratio < 1) requestAnimationFrame(step);
    };
    requestAnimationFrame(step);
  }

  function vehicleClassFor(vehicle, index, routeId) {
    const trip = state.boardedTrip;
    const isBoarded = trip?.routeId === routeId && String(vehicle.key) === String(trip.vehicleKey);
    const dimmed = trip?.routeId === routeId && !isBoarded;
    return [
      "kakao-bus-overlay",
      index > 0 ? "secondary" : "",
      isBoarded ? "boarded" : "",
      dimmed ? "dimmed" : ""
    ].filter(Boolean).join(" ");
  }

  function updateLiveVehicles(routeId, preview) {
    const entry = state.liveMaps[routeId];
    if (!entry || !preview?.vehicles) return;
    const vehicles = preview.vehicles;
    const stops = preview.stops || entry.previewStops || [];
    const nextOverlays = [];
    vehicles.forEach((vehicle, index) => {
      const targetPos = vehicleLatLng(vehicle, stops);
      if (!targetPos) return;
      const boarded = isBoardedVehicle(vehicle, routeId);
      const className = vehicleClassFor(vehicle, index, routeId);
      const existing = entry.busOverlays.find((b) => b.key === vehicle.key);
      if (existing) {
        const content = existing.overlay.getContent();
        content.className = className;
        const labelEl = content.querySelector(".kakao-bus-label");
        if (labelEl) labelEl.outerHTML = busLabelHtml(vehicle, boarded);
        tweenOverlayPosition(entry.maps, existing.overlay, existing.position, targetPos);
        existing.position = targetPos;
        nextOverlays.push(existing);
      } else {
        const overlay = new entry.maps.CustomOverlay({
          position: new entry.maps.LatLng(targetPos.lat, targetPos.lng),
          content: overlayContent(busLabelHtml(vehicle, boarded), className),
          xAnchor: 0.5,
          yAnchor: 0.5,
          zIndex: boarded ? 100 : 10 - index
        });
        overlay.setMap(entry.map);
        nextOverlays.push({ key: vehicle.key, index, overlay, position: { ...targetPos } });
      }
    });
    entry.busOverlays.forEach((bus) => {
      if (!nextOverlays.find((next) => next.key === bus.key)) bus.overlay.setMap(null);
    });
    entry.busOverlays = nextOverlays;

    const trip = state.boardedTrip;
    if (trip?.routeId === routeId) {
      const matched = vehicles.find((v) => String(v.key) === String(trip.vehicleKey));
      if (matched) {
        trip.remainingStops = Math.max(0, Number(matched.remainingStops || 0));
        trip.etaMinutes = matched.etaMinutes;
        trip.lastProgressSeq = Number(matched.progressSeq) || trip.lastProgressSeq;
        updateBoardingPanelDOM(routeId, trip);
        if (trip.alightingSeq != null && trip.lastProgressSeq >= trip.alightingSeq - 0.1) {
          endBoarding("alighting");
        }
      } else if (trip.alightingSeq != null && trip.lastProgressSeq >= trip.alightingSeq - 1) {
        endBoarding("alighting");
      }
    }
  }

  function renderEmptyCard() {
    return `
      <div class="empty-state">
        <!-- 빈 상태 일러스트 — 버스 정류장에서 기다리는 캐릭터 -->
        <div class="empty-state-illust" aria-hidden="true">
          <svg width="110" height="110" viewBox="0 0 110 110" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- 하늘 배경 원 -->
            <circle cx="55" cy="55" r="50" fill="#f0f8ff" opacity="0.6"/>
            <!-- 구름 -->
            <ellipse cx="28" cy="28" rx="12" ry="7" fill="white" opacity="0.9"/>
            <ellipse cx="38" cy="25" rx="9" ry="6" fill="white" opacity="0.9"/>
            <ellipse cx="22" cy="30" rx="7" ry="5" fill="white" opacity="0.8"/>
            <!-- 땅 -->

  function renderRouteCard(route, commuteCtx) {
    const ctx = commuteCtx === undefined ? getCommuteContext() : commuteCtx;
    const pinned = isCommutePinned(route, ctx);
    const loading = state.loadingRouteIds.has(route.id);
    const expanded = state.expandedRouteIds.has(route.id);
    const result = route.lastResult;
    const recommendation = result?.recommendation || null;
    const fetchedAt = result?.fetchedAt || null;
    const compareCandidates = result?.candidates || [];
    const primary = getSelectedCandidate(route);
    const selectedId = primary?.id || null;
    const recommendedId = result?.recommendedId || null;
    const isAlternateActive = Boolean(primary && recommendedId && primary.id !== recommendedId);
    const totalMin = primary ? minuteNumber(primary.journeyMinutes || primary.scoreDisplay || primary.totalTime) : "--";
    const transfer = primary ? Number(primary.transferCount || 0) : "--";
    const walk = primary ? minuteNumber(primary.walkTime || primary.walkTimeText) : "--";
    const note = primary
      ? (primary.note || describeRecommendation(route, primary))
      : "출발지와 도착지를 저장한 뒤 실시간으로 다시 계산하세요.";
    const selectionBadge = isAlternateActive
      ? `<div class="fast-selection-hint">선택한 대안 후보로 표시 중이에요${recommendation ? ` · 추천(${escapeHtml(getCandidateTitle(recommendation))})로 돌아가려면 추천 카드를 누르세요` : ""}</div>`
      : "";
    const tripStatus = getBoardingStatusForRoute(route.id);
    const isBoardedHere = Boolean(tripStatus);
    const boardingPanel = (() => {
      if (isBoardedHere) {
        const remain = Math.max(0, Number(tripStatus.remainingStops || 0));
        const eta = tripStatus.etaMinutes;
        return `
          <div class="boarding-panel boarded" data-route-id="${escapeHtml(route.id)}">
            <div class="boarding-panel-mascot" aria-hidden="true">
              <svg width="52" height="48" viewBox="0 0 52 48" xmlns="http://www.w3.org/2000/svg">
                <ellipse class="bm-shadow" cx="26" cy="42" rx="18" ry="3" fill="rgba(58, 44, 43, 0.16)"/>
                <g class="bm-body">
                  <rect x="6" y="8" width="40" height="28" rx="10" fill="#ffd6a0" stroke="#3a2c2b" stroke-width="2"/>
                  <rect x="10" y="13" width="14" height="10" rx="3" fill="#fff8e7"/>
                  <rect x="28" y="13" width="14" height="10" rx="3" fill="#fff8e7"/>
                  <g class="bm-passenger">
                    <circle cx="17" cy="18" r="2.6" fill="#3a2c2b"/>
                    <rect x="15" y="19.5" width="4" height="3" rx="1" fill="#79cdb8"/>
                    <path class="bm-arm" d="M19 19 L23 16" stroke="#3a2c2b" stroke-width="1.6" stroke-linecap="round"/>
                  </g>
                  <circle cx="16" cy="28" r="1.6" fill="#ff8aa6"/>
                  <circle cx="36" cy="28" r="1.6" fill="#ff8aa6"/>
                  <path d="M21 29 q5 3 10 0" stroke="#3a2c2b" stroke-width="1.6" stroke-linecap="round" fill="none"/>
                  <circle cx="20" cy="22" r="1.3" fill="#3a2c2b"/>
                  <circle cx="32" cy="22" r="1.3" fill="#3a2c2b"/>
                  <circle cx="20.5" cy="21.4" r="0.4" fill="#fff"/>
                  <circle cx="32.5" cy="21.4" r="0.4" fill="#fff"/>
                </g>
                <g class="bm-wheels">
                  <circle cx="14" cy="38" r="4" fill="#3a2c2b"/>
                  <circle cx="38" cy="38" r="4" fill="#3a2c2b"/>
                  <circle cx="14" cy="38" r="1.6" fill="#fff"/>
                  <circle cx="38" cy="38" r="1.6" fill="#fff"/>
                </g>
                <g class="bm-sparkles">
                  <text x="2" y="14" font-size="8" fill="#ffb479">✦</text>
                  <text x="44" y="10" font-size="9" fill="#ff8aa6">✦</text>
                  <text x="46" y="36" font-size="7" fill="#93bcff">✦</text>
                </g>
              </svg>
            </div>
            <div class="boarding-panel-info">
              <span class="boarding-panel-tag">🎒 탑승 중</span>
              <strong>${escapeHtml(tripStatus.alightingName || "하차 정류장")}까지 ${remain}정거장</strong>
              ${eta != null ? `<span>약 ${escapeHtml(eta)}분 후 하차</span>` : '<span>버스 위치 추적 중…</span>'}
            </div>
            <button type="button" class="boarding-panel-btn end" data-action="end-boarding">하차</button>
          </div>
        `;
      }
      const previewVehicles = primary?.busApproachPreview?.vehicles || [];
      if (!previewVehicles.length) return "";
      const nextCatchable = previewVehicles.find((v) => v.catchable !== false);
      const offered = nextCatchable || previewVehicles[0];
      const isCatchable = offered.catchable !== false;
      const routeNo = primary?.routeNo || "버스";
      const vehicleLabel = offered.label || "다음";
      const vehicleKeyAttr = offered.key != null ? ` data-vehicle-key="${escapeHtml(String(offered.key))}"` : "";
      if (isCatchable) {
        const etaText = offered.etaMinutes != null ? `${offered.etaMinutes}분 후 도착` : "곧 도착";
        return `
          <div class="boarding-panel">
            <div class="boarding-panel-info">
              <span class="boarding-panel-tag">🚌 탑승 시작</span>
              <strong>${escapeHtml(routeNo)} · ${escapeHtml(vehicleLabel)} ${escapeHtml(etaText)}</strong>

      const passedValue = offered.passedAgoMinutes ?? offered.etaMinutes;
      const etaTextUncatchable = passedValue != null ? `${passedValue}분 전 통과` : "방금 통과";
      return `
        <div class="boarding-panel">
          <div class="boarding-panel-info">

            <span>예상보다 빨리 도착했다면 이 버스를 선택하세요</span>
          </div>
          <button type="button" class="boarding-panel-btn primary" data-action="start-boarding" data-id="${escapeHtml(route.id)}"${vehicleKeyAttr}>이 버스 탑승</button>
        </div>
      `;
    })();
    const detailsHtml = result ? `
      <div class="detail-block">
        <h3>${isAlternateActive ? "선택 후보 상세" : "추천 상세"}</h3>
        ${renderSegments(primary?.segments)}
      </div>
      <div class="detail-block">
        <h3>후보 메모</h3>
        <div class="candidate-list">
          ${compareCandidates.map((candidate) => renderCandidate(candidate, candidate.id === result.recommendedId)).join("")}
        </div>
      </div>
    ` : `
      <div class="detail-block">
        <h3>다음 단계</h3>
        <div class="empty-state">
          <strong>루트는 저장되었지만 추천 데이터는 아직 없습니다</strong>
          추천 갱신 버튼을 누르면 현재 기준으로 후보를 하나 골라 저장합니다.
        </div>
      </div>
    `;

    return `
      <article class="route-card fast-card ${loading ? "loading" : ""} ${expanded ? "expanded" : ""} ${pinned ? "commute-pinned" : ""}">
        <div class="route-main">
          <section class="fast-trip-panel">
            <div class="fast-trip-head">
              <div class="fast-trip-title">
                ${iconSvg("map", 16)}
                <strong>${escapeHtml(route.from?.name || "출발지")} → ${escapeHtml(route.to?.name || "도착지")}</strong>
              </div>
              <div class="fast-trip-menu">
                <button class="fast-icon-btn" data-action="edit" data-id="${escapeHtml(route.id)}" aria-label="편집">${iconSvg("edit", 15)}</button>
                <button class="fast-icon-btn" data-action="delete" data-id="${escapeHtml(route.id)}" aria-label="삭제">${iconSvg("trash", 15)}</button>
              </div>
            </div>
            ${primary ? renderFastFlow(primary, { routeId: route.id }) : ""}
            <div class="fast-metrics">
              <div class="fast-metric arrive">
                <strong>${escapeHtml(totalMin)}</strong>
                <span>도착 · 분</span>
              </div>
              <div class="fast-metric transfer">
                <strong>${escapeHtml(transfer)}</strong>
                <span>환승 · 회</span>
              </div>
              <div class="fast-metric walk">
                <strong>${escapeHtml(walk)}</strong>
                <span>도보 · 분</span>
              </div>
            </div>
            <div class="fast-next-action">
              <div class="label">먼저 할 일</div>
              <div class="fast-next-row">
                <strong>${escapeHtml(getFirstAction(primary))}</strong>
                <span>→</span>
              </div>
            </div>
            <div class="fast-note">${iconSvg("clock", 15)} <span>${escapeHtml(note)} · ${escapeHtml(relativeTime(fetchedAt))}</span></div>
            ${selectionBadge}
            ${boardingPanel}
          </section>
          <section class="fast-candidates">
            ${compareCandidates.length ? compareCandidates.slice(0, 4).map((candidate, index) => renderFastCandidate(
              candidate,
              index,
              candidate.id === result?.recommendedId,
              { routeId: route.id, isSelected: candidate.id === selectedId }
            )).join("") : ""}
          </section>
          <section class="fast-detail">
            <button class="fast-detail-toggle" data-action="toggle" data-id="${escapeHtml(route.id)}">
              <div>
                <strong>상세 경로</strong>
                <span>필요할 때만 펼쳐서 확인</span>
              </div>
              ${iconSvg("chevron", 20)}
            </button>
            <div class="route-details">${detailsHtml}</div>
          </section>
        </div>
      </article>
    `;
  }

  function getCommuteContext(date = new Date()) {
    const hour = date.getHours();
    if (hour >= 5 && hour < 12) return { phase: "morning", keyword: "출근", badge: "출근 시간" };
    if (hour >= 16 && hour < 23) return { phase: "evening", keyword: "퇴근", badge: "퇴근 시간" };
    return null;
  }

  function isCommutePinned(route, ctx) {
    if (!ctx) return false;
    return (route.label || "").includes(ctx.keyword);
  }

  function getOrderedRoutes() {
    const ctx = getCommuteContext();
    if (!ctx) return state.routes;
    const pinned = [];
    const rest = [];
    for (const r of state.routes) {
      if (isCommutePinned(r, ctx)) pinned.push(r);
      else rest.push(r);
    }
    return pinned.length ? [...pinned, ...rest] : state.routes;
  }

  function teardownLiveMaps() {
    Object.entries(state.liveMaps).forEach(([routeId, entry]) => {
      if (entry?.animationFrame) cancelAnimationFrame(entry.animationFrame);
      if (entry?.pollTimer) clearInterval(entry.pollTimer);
      try {
        entry?.approachPolyline?.setMap?.(null);
        entry?.ridingPolyline?.setMap?.(null);
        entry?.userOverlay?.setMap?.(null);
        (entry?.stopOverlays || []).forEach((overlay) => { try { overlay?.setMap?.(null); } catch {} });
        (entry?.busOverlays || []).forEach((bus) => { try { bus?.overlay?.setMap?.(null); } catch {} });
      } catch {}
    });
    state.liveMaps = {};
    Object.keys(state.liveMapTimers).forEach((routeId) => clearLiveMapTimer(routeId));
  }

  function renderRoutes() {
    const list = document.getElementById("route-list");
    const tabs = document.getElementById("route-tabs");
    document.getElementById("route-count").textContent = state.routes.length + "개 루트";
    if (state.routes.length === 0) {
      list.innerHTML = renderEmptyCard();
      if (tabs) tabs.innerHTML = "";
      state.lastCommutePhase = getCommuteContext()?.phase || null;
      teardownLiveMaps();
      return;
    }
    const ctx = getCommuteContext();
    teardownLiveMaps();
    const orderedRoutes = getOrderedRoutes();
    if (!orderedRoutes.find((route) => route.id === state.activeRouteId)) {
      const pinned = orderedRoutes.find((route) => isCommutePinned(route, ctx));
      state.activeRouteId = (pinned || orderedRoutes[0]).id;
    }
    list.innerHTML = orderedRoutes.map((route) => {
      const html = renderRouteCard(route, ctx);
      return html.replace('<article class="route-card', `<article data-route-id="${escapeHtml(route.id)}" class="route-card${route.id === state.activeRouteId ? " active" : ""}`);
    }).join("");
    renderRouteTabs(orderedRoutes);
    requestAnimationFrame(initLiveTransitMaps);
    state.lastCommutePhase = ctx?.phase || null;
  }

  function renderRouteTabs(routes) {
    const tabs = document.getElementById("route-tabs");
    if (!tabs) return;
    if (!routes?.length) {
      tabs.innerHTML = "";
      return;
    }
    tabs.innerHTML = routes
      .map((route) => `<button type="button" class="route-tab${route.id === state.activeRouteId ? " active" : ""}" data-route-tab="${escapeHtml(route.id)}">${escapeHtml(route.label || "루트")}</button>`)
      .join("");
  }

  function setActiveRoute(routeId) {
    if (!routeId || state.activeRouteId === routeId) return;
    if (!state.routes.find((route) => route.id === routeId)) return;
    state.activeRouteId = routeId;
    renderRoutes();
  }

  async function triggerActiveRefresh(options = {}) {
    const routeId = state.activeRouteId || (state.routes[0] && state.routes[0].id);
    if (!routeId) {
      if (!options.silent) showToast("새로고침할 루트가 없습니다");
      return;
    }
    const btn = document.getElementById("header-refresh-btn");
    if (btn) {
      btn.classList.add("spinning");
      btn.setAttribute("aria-busy", "true");
    }
    try {
      await refreshRouteWithOptions(routeId, options);
    } finally {
      if (btn) {
        btn.classList.remove("spinning");
        btn.removeAttribute("aria-busy");
      }
    }
  }

  function setTrackingButton(active) {
    const btn = document.getElementById("tracking-toggle-btn");
    if (btn) btn.setAttribute("aria-pressed", active ? "true" : "false");
  }

  function toggleTracking() {
    if (state.trackingActive) {
      if (state.trackingTimer) clearInterval(state.trackingTimer);
      state.trackingTimer = null;
      state.trackingActive = false;
      setTrackingButton(false);
      showToast("이동 트래킹을 끕니다");
      return;
    }
    if (!state.routes.length) {
      showToast("저장된 루트가 없어요");
      return;
    }
    state.trackingActive = true;
    setTrackingButton(true);
    startUserLocationWatch();
    showToast("이동 트래킹을 시작합니다");
    triggerActiveRefresh({ silent: true });
    state.trackingTimer = setInterval(() => {
      triggerActiveRefresh({ silent: true });
    }, 60000);
  }

  function startBoarding(routeId, candidate, vehicleKey) {
    const vehicles = candidate?.busApproachPreview?.vehicles || [];
    const explicit = vehicleKey != null
      ? vehicles.find((v) => String(v.key) === String(vehicleKey))
      : null;
    const target = explicit || vehicles.find((v) => v.catchable !== false) || vehicles[0];
    if (!target || !target.key) {
      showToast("탑승할 수 있는 버스가 없어요");
      return;
    }
    state.boardedTrip = {
      routeId,
      candidateId: candidate.id,
      vehicleKey: String(target.key),
      vehicleLabel: target.label || "다음",
      routeNo: candidate.routeNo,
      startedAt: Date.now(),
      alightingSeq: candidate.busApproachPreview?.alightingStationSeq || null,
      alightingName: candidate.busApproachPreview?.alightingStopName || candidate.alightingStopName || null,
      lastProgressSeq: Number(target.progressSeq) || 0,
      remainingStops: target.remainingStops,
      etaMinutes: target.etaMinutes
    };
    showToast(`${candidate.routeNo || "버스"} 탑승을 시작합니다`);
    renderRoutes();
  }

  function endBoarding(reason = "manual") {
    if (!state.boardedTrip) return;
    const name = state.boardedTrip.alightingName;
    state.boardedTrip = null;
    if (reason === "alighting") {
      showToast(name ? `${name} 도착! 하차 준비하세요` : "하차 정류장에 도착했어요");
    } else if (reason === "manual") {
      showToast("탑승을 종료했어요");
    }
    renderRoutes();
  }

  function getBoardingStatusForRoute(routeId) {
    const trip = state.boardedTrip;
    if (!trip || trip.routeId !== routeId) return null;
    return trip;
  }

  function maybeInitialAutoRefresh() {
    if (state.initialRefreshDone) return;
    if (!state.routes.length) return;
    state.initialRefreshDone = true;
    triggerActiveRefresh({ silent: true });
  }

  function bindRouteTabs() {
    const tabs = document.getElementById("route-tabs");
    if (!tabs) return;
    tabs.addEventListener("click", (event) => {
      const target = event.target.closest("[data-route-tab]");
      if (!target) return;
      setActiveRoute(target.dataset.routeTab);
    });
  }

  function shiftActiveRoute(direction) {
    const routes = getOrderedRoutes();
    if (routes.length < 2) return;
    const currentIdx = routes.findIndex((route) => route.id === state.activeRouteId);
    if (currentIdx < 0) return;
    const nextIdx = direction > 0
      ? Math.min(routes.length - 1, currentIdx + 1)
      : Math.max(0, currentIdx - 1);
    if (nextIdx !== currentIdx) setActiveRoute(routes[nextIdx].id);
  }

  function bindRouteSwipe() {
    const list = document.getElementById("route-list");
    if (!list) return;
    const SWIPE_MIN_X = 45;
    let startX = 0;
    let startY = 0;
    let tracking = false;
    list.addEventListener("pointerdown", (event) => {
      if (event.pointerType === "mouse" && event.button !== 0) return;
      if (event.target.closest(".live-map, .fast-candidate, button, [data-action], a, input, textarea")) {
        tracking = false;
        return;
      }
      tracking = true;
      startX = event.clientX;
      startY = event.clientY;
    }, { passive: true });
    const finish = (event) => {
      if (!tracking) return;
      tracking = false;
      const dx = event.clientX - startX;
      const dy = event.clientY - startY;
      if (Math.abs(dx) < SWIPE_MIN_X || Math.abs(dx) <= Math.abs(dy)) return;
      shiftActiveRoute(dx < 0 ? 1 : -1);
    };
    list.addEventListener("pointerup", finish, { passive: true });
    list.addEventListener("pointercancel", () => { tracking = false; }, { passive: true });
  }

  function showToast(message) {

    toast.textContent = message;
    toast.classList.add("show");

    showToast._timer = setTimeout(() => toast.classList.remove("show"), 2200);

  function updateMapPickButtons() {
    ["from", "to"].forEach((selectionKey) => {
      const button = document.getElementById(`route-${selectionKey}-map-pick-btn`);
      if (!button) return;
      const active = state.mapPickerTarget === selectionKey;

  async function reverseGeocode(lat, lng) {
    try {
      const payload = await fetchJson(`/api/reverse-geocode?lat=${encodeURIComponent(lat)}&lon=${encodeURIComponent(lng)}`);
      return payload.location || null;
    } catch {
      return null;
    }
  }

  async function handleMapPick(selectionKey, lat, lng) {
    const location = await reverseGeocode(lat, lng);
    const fallbackName = selectionKey === "from" ? "지도 선택 출발지" : "지도 선택 도착지";
    const picked = {
      name: location?.name || fallbackName,
      detail: location?.detail || `${lat.toFixed(5)}, ${lng.toFixed(5)}`,
      kind: location?.kind || "지도 선택",
      x: lng,
      y: lat,
      stationID: null
    };

    state.autocompleteSelection[selectionKey] = picked;
    const input = document.getElementById(`route-${selectionKey}-input`);
    if (input) input.value = picked.name;
    closeMapPicker();
    updateMapPickButtons();
    updateLocationPreview(selectionKey, picked);
    showToast(`${selectionKey === "from" ? "출발지" : "도착지"}를 지도에서 선택했습니다`);
